<script>
(function(){
  if (typeof updateSidebarCompositionCard !== 'function' || typeof bindSidebarCompositionCard !== 'function') return;

  function refreshCompositionDrivenPreview() {
    updateSidebarCompositionCard();
    if (typeof refreshSidebarLivePreview === 'function') {
      refreshSidebarLivePreview();
    }
  }

  function bindLivePreviewChangeHandlers() {
    $('.include-transliteration, .insert-sefaria-link, .insert-citation, .wants-vowels, .wants-cantillation, .wants-pesukim, .include-translation-source-info')
      .off('change.compositionMatch')
      .on('change.compositionMatch', function () {
        refreshCompositionDrivenPreview();
      });
  }

  function syncCompactPills() {
    var linkOn = $('.insert-sefaria-link').is(':checked');
    var citationOn = $('.insert-citation').is(':checked');
    var vowelsOn = $('.wants-vowels').is(':checked');
    var cantOn = $('.wants-cantillation').is(':checked');
    var translitOn = $('.include-transliteration').is(':checked');
    var linesOn = $('.wants-pesukim').is(':checked');
    var detailsOn = $('.include-translation-source-info').is(':checked');

    $('#sidebar-composition-title-toggle').toggleClass('is-linked is-active', linkOn).attr('aria-pressed', linkOn ? 'true' : 'false');
    $('#sidebar-citation-toggle').toggleClass('is-active', citationOn).attr('aria-pressed', citationOn ? 'true' : 'false');
    $('#sidebar-vowels-toggle').toggleClass('is-active', vowelsOn).attr('aria-pressed', vowelsOn ? 'true' : 'false');
    $('#sidebar-cantillation-toggle').toggleClass('is-active', cantOn).attr('aria-pressed', cantOn ? 'true' : 'false');
    $('#sidebar-transliteration-pill').toggleClass('is-active', translitOn).attr('aria-pressed', translitOn ? 'true' : 'false');
    $('#sidebar-lines-toggle').toggleClass('is-active', linesOn).attr('aria-pressed', linesOn ? 'true' : 'false');
    $('#sidebar-translation-details-toggle').toggleClass('is-active', detailsOn).attr('aria-pressed', detailsOn ? 'true' : 'false');
  }

  var __origUpdateSidebarCompositionCard = updateSidebarCompositionCard;
  updateSidebarCompositionCard = function() {
    __origUpdateSidebarCompositionCard();
    syncCompactPills();
    var scheme = $('.include-transliteration').is(':checked') ? getSidebarTransliterationLabel(getSidebarTransliterationScheme()) : 'Aא Translit';
    $('#sidebar-transliteration-toggle').text(scheme).toggleClass('is-none', !$('.include-transliteration').is(':checked'));
  };

  var __origBindSidebarCompositionCard = bindSidebarCompositionCard;
  bindSidebarCompositionCard = function() {
    __origBindSidebarCompositionCard();

    $('#sidebar-composition-title-toggle').off('click.compact').on('click.compact', function () {
      $('.insert-sefaria-link').prop('checked', !$('.insert-sefaria-link').is(':checked')).trigger('change');
      refreshCompositionDrivenPreview();
    });

    $('#sidebar-citation-toggle').off('click.compact').on('click.compact', function () {
      $('.insert-citation').prop('checked', !$('.insert-citation').is(':checked')).trigger('change');
      refreshCompositionDrivenPreview();
    });

    $('#sidebar-vowels-toggle').off('click.compact').on('click.compact', function () {
      $('.wants-vowels').prop('checked', !$('.wants-vowels').is(':checked')).trigger('change');
      refreshCompositionDrivenPreview();
    });

    $('#sidebar-cantillation-toggle').off('click.compact').on('click.compact', function () {
      $('.wants-cantillation').prop('checked', !$('.wants-cantillation').is(':checked')).trigger('change');
      refreshCompositionDrivenPreview();
    });

    $('#sidebar-transliteration-pill').off('click.compact').on('click.compact', function () {
      $('.include-transliteration').prop('checked', !$('.include-transliteration').is(':checked')).trigger('change');
      refreshCompositionDrivenPreview();
    });

    $('#sidebar-lines-toggle').off('click.compact').on('click.compact', function () {
      $('.wants-pesukim').prop('checked', !$('.wants-pesukim').is(':checked')).trigger('change');
      refreshCompositionDrivenPreview();
    });

    $('#sidebar-translation-details-toggle').off('click.compact').on('click.compact', function () {
      $('.include-translation-source-info').prop('checked', !$('.include-translation-source-info').is(':checked')).trigger('change');
      refreshCompositionDrivenPreview();
    });

    $('#sidebar-transliteration-toggle').off('click.compactMenu').on('click.compactMenu', function (event) {
      event.preventDefault();
      event.stopPropagation();
      $('#sidebar-transliteration-menu').toggleClass('hidden');
      $(this).attr('aria-expanded', $('#sidebar-transliteration-menu').hasClass('hidden') ? 'false' : 'true');
    });

    $('.sidebar-transliteration-option').off('click.compact').on('click.compact', function () {
      var value = $(this).attr('data-value');
      if (value === 'none') {
        $('.include-transliteration').prop('checked', false);
        effectivePreferences.transliteration_scheme = getSidebarTransliterationScheme();
        $('.include-transliteration').trigger('change');
      } else {
        $('.include-transliteration').prop('checked', true);
        effectivePreferences.transliteration_scheme = value;
        refreshCompositionDrivenPreview();
        saveSidebarPreference({ include_transliteration_default: true, transliteration_scheme: value }, function () {
          effectivePreferences.transliteration_scheme = value;
          refreshCompositionDrivenPreview();
          if (hasResolvedReference && data && data.ref) refreshSelectedResult();
        });
      }
      closeSidebarTransliterationMenu();
    });

    bindLivePreviewChangeHandlers();
    refreshCompositionDrivenPreview();
  };

  bindSidebarCompositionCard();
  bindLivePreviewChangeHandlers();
  refreshCompositionDrivenPreview();
})();
</script>
