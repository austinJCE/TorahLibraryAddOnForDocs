<style>
  @import url("https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Frank+Ruhl+Libre:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap");

  /* =========================
     1. DESIGN TOKENS
     ========================= */
  :root {
    --bg: #fbfbfa;
    --border: #d9d8d3;
    --card: #f3f1ed;
    --muted: #666;
    --panel: #fff;
    --selected: #18345d;
    --selected-hover: #22426f;
    --selected-soft: #ddeeff;
    --text: #222;
    --sefaria-blue: #18345d;
    --lighter-grey: #ededec;

    --tanakh-teal: #004e5f;
    --mishnah-blue: #5a99b7;
    --talmud-gold: #ccb479;
    --midrash-green: #5d956f;
    --halakhah-red: #802f3e;
    --kabbalah-purple: #594176;
    --liturgy-rose: #ab4e66;
    --philosophy-purple: #7f85a9;
    --chasidut-green: #97b386;
    --musar-purple: #7c416f;
    --commentary-blue: #4b71b7;
    --reference-orange: #d4896c;
    --modern-works-blue: #b8d4d3;
    --apocrypha-pink: #c6a7b4;
    --tanaitic-green: #00827f;
  }

  /* =========================
     2. BASE / PAGE
     ========================= */
  aside {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 5;
    display: none;
    width: 100%;
    height: 100%;
    background: #fff;
    color: #000;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Roboto", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  main {
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 0;
    height: 100vh;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
    padding: 12px 12px 0;
  }

  .unified-sidebar {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--bg);
  }

  .sidebar-scroll {
    display: flex;
    flex: 1 1 auto;
    flex-direction: column;
    min-height: 0;
    overflow-x: hidden;
    overflow-y: auto;
    padding-bottom: 16px;
  }

  .sidebar-footer {
    position: sticky;
    right: 0;
    bottom: 0;
    left: 0;
    flex: 0 0 auto;
    padding: 8px 12px 10px;
    background: var(--lighter-grey);
    border-top: 1px solid var(--border);
    box-shadow: 0 -1px 0 rgba(24, 52, 93, 0.03);
  }

  body.custom-mode .default-only,
  body.default-mode .advanced-only,
  body.default-mode .custom-only,
  body.default-mode details.sidebar-accordion[open] > .accordion-panel.custom-sensitive,
  body.smart-mode .advanced-only,
  .ui-hidden-checkbox,
  select.visually-hidden,
  input.visually-hidden {
    display: none !important;
  }

  /* =========================
     3. GENERIC UTILITIES
     ========================= */
  .alef {
    font-size: 1.15em;
  }

  .branding-text {
    padding-top: 0.5em;
  }

  .helper-text,
  .experience-copy,
  .experience-note,
  .advanced-version-note {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.35;
  }

  .helper-text {
    margin: 4px 0 0;
  }

  .section-label {
    margin: 14px 0 8px;
    color: #444;
    font-size: 13px;
    font-weight: 600;
  }

  .subsection-label,
  .compact-section-label,
  .session-library-title {
    color: #4d596d;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .subsection-label {
    margin: 12px 0 6px;
    color: #5d6878;
  }

  .section-muted {
    opacity: 0.55;
  }

  .brand-header {
    margin-bottom: 10px;
    padding: 14px 14px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
  }

  .brand-eyebrow {
    margin-bottom: 4px;
    color: var(--sefaria-blue);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .brand-title {
    margin: 0;
    color: var(--sefaria-blue);
    font-family: "Frank Ruhl Libre", "Noto Serif Hebrew", serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1.15;
  }

  .brand-subtitle {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.45;
  }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    border: 0;
    clip: rect(0, 0, 0, 0);
  }

  [class="hide"] > img {
    position: absolute;
    top: 48%;
    left: 48%;
  }

  /* =========================
     4. PANELS / SHELLS
     ========================= */
  .unified-search-row,
  .results-panel,
  .display-layout-shell,
  .versions-section,
  .preview-section,
  .session-library-panel {
    padding: 10px;
    background: #fff;
    border: 1px solid var(--lighter-grey);
    border-radius: 14px;
    box-shadow: 0 1px 0 rgba(24, 52, 93, 0.03);
  }

  .results-panel,
  .session-library-panel,
  .versions-section > details,
  .display-layout-shell > details,
  .preview-section > details {
    box-shadow: 0 1px 0 rgba(24, 52, 93, 0.05);
  }

  .options-panel,
  .preview-panel,
  .versions-panel {
    padding: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .results-panel {
    position: relative;
    z-index: 1;
    display: block;
    margin-top: 12px;
    overflow: visible;
  }

  .recent-results-panel {
    margin-top: 12px;
    padding: 10px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .preview-panel {
    min-height: 160px;
    max-height: 280px;
    overflow: hidden;
    padding-right: 0;
    background: #fff;
    border: 1px solid #ece9e3;
    border-radius: 12px;
  }

  #previewContainer,
  .preview-panel .suggestions {
    background: #fff;
    border-radius: 12px;
  }

  .preview-panel .suggestions {
    max-height: 246px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .versions-panel,
  .more-options-card {
    background: #fff;
    border: 1px solid #ece7df;
    border-radius: 12px;
  }

  .versions-panel.more-options-card {
    background: #fcfcfb;
    border-color: #ece9e3;
  }

  .display-layout-section {
    display: grid;
    gap: 8px;
  }

  .display-layout-shell,
  .versions-section,
  .preview-section {
    margin-top: 10px;
  }

  .nested-accordion {
    margin-top: 12px;
  }

  /* =========================
     5. FORMS / INPUTS / SELECTS
     ========================= */
  .filter-field label,
  .version-label {
    display: block;
    margin-bottom: 4px;
    color: #555;
    font-size: 12px;
    font-weight: 600;
  }

  .filter-field label {
    color: #666;
    font-size: 11px;
  }

  .input {
    display: block;
    box-sizing: border-box;
    width: 100%;
    margin: 0;
    padding: 10px 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: "EB Garamond", Georgia, serif;
    font-size: 18px;
    height: auto;
  }

  .search-filter-select,
  .search-sort-select,
  .translation-filter-input,
  .translation-version-select,
  .versioning-select,
  .results-tool,
  .translation-language-toggle,
  .corpus-filter-select,
  .session-library-filter-select {
    box-sizing: border-box;
    width: 100%;
    background: #f8f6f2;
    border: 1px solid #dbd7cf;
    border-radius: 10px;
    color: #445267;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
    min-height: 32px;
    padding: 8px 10px;
  }

  .search-filter-select,
  .search-sort-select {
    appearance: none;
    background-image: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    font-size: 13px;
  }

  .search-filter-select[multiple] {
    min-height: 132px;
    padding: 6px;
  }

  .search-filter-select:focus,
  .search-filter-select:hover,
  .search-sort-select:focus,
  .search-sort-select:hover {
    background: #fff;
    border-color: var(--selected);
  }

  .search-sort-select {
    width: auto;
    min-width: 74px;
    max-width: 74px;
    height: 28px;
    min-height: 28px;
    padding: 0 10px;
    border-radius: 14px;
    font-weight: 700;
  }

  .translation-version-select {
    min-height: 150px;
    margin-top: 6px;
    padding: 4px;
    text-indent: 0;
  }

  .translation-version-select option,
  .he-version-selection option {
    padding-left: 6px;
    text-indent: 0;
  }

  .translation-version-select option {
    margin-left: 0;
  }

  .translation-version-select option.translation-unavailable {
    color: #7a7a7a;
    font-style: italic;
  }

  .he-version-selection {
    text-indent: 0;
  }

  .corpus-filter-select {
    min-width: 124px;
    max-width: 124px;
  }

  .session-library-filter-select {
    min-width: 132px;
    max-width: 132px;
  }

  .translation-selected-display {
    max-height: 88px;
    margin-top: 6px;
    padding: 6px 8px;
    overflow: auto;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.4;
    white-space: normal;
    word-break: break-word;
  }

  .version-control + .version-control {
    margin-top: 10px;
  }

  .version-control-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  .version-count {
    color: var(--muted);
    font-size: 11px;
  }

  /* =========================
     6. MULTI-SELECT / LANGUAGE MENU
     ========================= */
  .multi-select-dropdown,
  .translation-language-compact {
    position: relative;
    width: 100%;
    min-width: 0;
  }

  .multi-select-button {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    width: 100%;
    min-height: 38px;
    padding: 8px 10px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .multi-select-button-text,
  .translation-language-button-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .multi-select-caret {
    color: #666;
    font-size: 12px;
  }

  .multi-select-dropdown.open .multi-select-menu {
    display: block;
  }

  .multi-select-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    left: 0;
    z-index: 15;
    display: none;
    max-height: 240px;
    overflow-y: auto;
    padding: 6px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
  }

  .multi-select-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    cursor: pointer;
    border-radius: 8px;
    font-size: 13px;
  }

  .multi-select-option:hover {
    background: #f4f6f9;
  }

  .multi-select-option input,
  .translation-language-row input {
    margin: 0;
  }

  .translation-language-toggle {
    min-width: 68px;
    max-width: 82px;
    padding-inline: 8px;
  }

  .lang-tool-button,
  .results-tool.lang-tool-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-width: 74px;
    max-width: 74px;
    height: 28px;
    min-height: 28px;
    padding: 0 10px;
    border-radius: 14px;
  }

  .translation-language-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    left: auto;
    z-index: 40;
    width: min(220px, calc(100vw - 56px));
    min-width: 190px;
    margin-top: 0;
    padding: 10px;
    background: #fff;
    border: 1px solid #d8d2c8;
    border-radius: 14px;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
  }

  .translation-language-menu.hidden,
  .translation-language-more.hidden {
    display: none;
  }

  .translation-language-top-list,
  .translation-language-more,
  .translation-language-common,
  .translation-language-primary {
    display: grid;
    gap: 2px;
  }

  .translation-language-top-list,
  .translation-language-more {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #ebe6dc;
  }

  .translation-language-top-list {
    margin-top: 0;
    padding-top: 0;
    border-top: 0;
  }

  .translation-language-primary,
  .translation-language-more {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .translation-language-choice,
  .translation-language-more-toggle {
    appearance: none;
    -webkit-appearance: none;
    min-width: 0;
    min-height: 30px;
    height: 24px;
    margin: 0;
    padding: 0 7px;
    color: #1f3b68;
    cursor: pointer;
    white-space: nowrap;
    background: #fff;
    border: 1px solid #d8d6d0;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
  }

  .translation-language-choice[data-lang="any"] {
    padding-inline: 8px;
  }

  .translation-language-choice[data-lang="jrb"],
  .translation-language-choice[data-lang="lad"],
  .translation-language-choice[data-lang="itk"] {
    padding-inline: 6px;
  }

  .translation-language-choice.active,
  .translation-language-choice:hover,
  .translation-language-more-toggle:hover {
    background: #e8eef7;
    border-color: #bfd0ea;
    color: #1f3b68;
  }

  .translation-language-more-toggle {
    width: 24px;
    font-size: 12px;
  }

  .translation-language-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    color: #243b67;
    cursor: pointer;
    font-size: 13px;
  }

  /* =========================
     7. SEARCH / FILTER LAYOUT
     ========================= */
  .query-hint {
    color: var(--muted);
    font-size: 12px;
  }

  .query-intel-row,
  .results-header-actions {
    display: none;
  }

  .reference-row,
  .reference-row.unified-search-row {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .reference-row.unified-search-row {
    padding: 0;
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
  }

  .reference-input-shell {
    position: relative;
    display: flex;
    flex: 1 1 auto;
    align-items: center;
    min-width: 0;
    min-height: 56px;
    padding: 0 16px 0 14px;
    overflow: hidden;
    background: #f5f3ef;
    border: 1px solid var(--border);
    border-left: 0;
    border-radius: 24px;
    box-shadow: none;
  }

  .reference-input-shell::before {
    display: block;
    width: 5px;
    height: 34px;
    margin-right: 14px;
    content: "";
    background: var(--tanakh-teal);
    border-radius: 3px;
  }


  .mode-voices .reference-input-shell::before {
    display: none;
  }

  .reference-row .input,
  .reference-input-shell .input {
    margin: 0;
    padding: 0;
    background: transparent;
    border: 0;
    box-shadow: none;
    font-family: "EB Garamond", Georgia, serif;
    font-size: 18px;
  }

  .reference-input-shell .input:focus,
  .reference-row .input:focus {
    outline: none;
    box-shadow: none;
  }

  .reference-row .input::placeholder {
    color: #7d7d7d;
  }

  .search-control-row {
    display: grid;
    grid-template-columns: 1fr;
    align-items: stretch;
    gap: 8px;
    margin-top: 8px;
  }

  .search-filter-card {
    display: grid;
    gap: 8px;
    padding: 10px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .search-filter-grid {
    display: grid;
    align-items: start;
    gap: 8px;
    grid-template-columns: minmax(0, 1fr) 110px;
  }

  .search-filter-grid.refined-search-filter-grid {
    grid-template-columns: minmax(0, 1fr) 120px;
  }

  .search-filter-header {
    margin: 0;
    color: #444;
    font-size: 12px;
    font-weight: 700;
  }

  .search-filter-toggles {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .translation-language-panel {
    margin-top: -2px;
  }

  .refined-search-toggles {
    display: grid;
    gap: 10px;
    margin-top: 10px;
  }

  .dual-toggle-grid,
  .dual-toggle-grid.hebrew-options-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .dual-toggle-grid .toggle-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 8px;
  }

  .dual-toggle-grid .toggle-row > label:first-child,
  .dual-toggle-grid.hebrew-options-row .compact-option-toggle-row > label:first-child {
    margin: 0;
    white-space: nowrap;
  }

  .dual-toggle-grid .switch,
  .dual-toggle-grid.hebrew-options-row .switch {
    margin-left: 0;
    flex: 0 0 auto;
  }

  .dual-toggle-grid.hebrew-options-row .compact-option-toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
  }

  .dual-toggle-grid.hebrew-options-row .compact-option-toggle-row > label:first-child {
    font-size: 14px;
  }

  .option-toggle-row,
  .translation-filter-row {
    margin: 0;
    min-height: 36px;
  }

  .unified-search-row {
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 6px;
    overflow: visible;
    background: #fff;
    border: 1px solid #dcd8d0;
    border-radius: 18px;
    box-shadow: 0 1px 0 rgba(24, 52, 93, 0.05);
  }

  .search-submit,
  #run-sefaria {
    display: inline-flex;
    flex: 0 0 42px;
    align-items: center;
    justify-content: center;
    min-width: 42px;
    min-height: 42px;
    padding: 0;
    color: #fff;
    background: #18345d;
    border: 1px solid #18345d;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
  }

  .search-submit:hover,
  #run-sefaria:not(:disabled):hover {
    background: #22426f;
    border-color: #22426f;
  }

  .search-submit-icon {
    display: inline-block;
    font-size: 15px;
    line-height: 1;
    transform: translateY(1px);
  }

  .mode-voices .text-mode-only,
  .mode-voices .display-layout-shell,
  .mode-voices .versions-section,
  .mode-voices .preview-section,
  .mode-voices .library-results,
  .mode-voices .results-lists > .text-mode-only {
    display: none !important;
  }

  .mode-voices .search-results-label::before {
    content: "Source Sheets";
  }

  .mode-voices .search-results {
    margin-top: 0;
  }

  .mode-voices .reference-row .input {
    padding-left: 0 !important;
  }

  .voices-only .helper-text {
    margin-top: 0;
  }

  .mode-context-note {
    margin-top: -2px;
    margin-bottom: 8px;
  }

  .mode-context-note .helper-text,
  .experience-note {
    padding: 8px 10px;
    background: #fff;
    border: 1px solid var(--lighter-grey);
    border-radius: 10px;
  }

  /* =========================
     8. BUTTONS / PRIMARY ACTIONS
     ========================= */
  #insert-source,
  #open-on-sefaria,
  #run-sefaria,
  .primary-action-button,
  .secondary-action-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    font-weight: 700;
  }

  #insert-source,
  #open-on-sefaria {
    width: 100%;
    min-height: 44px;
    margin-top: 12px;
    font-size: 14px;
  }

  #insert-source,
  #run-sefaria,
  .primary-action-button {
    color: #fff;
    background: var(--selected);
    border: 1px solid var(--selected);
  }

  #open-on-sefaria,
  .secondary-action-button {
    color: #456184;
    background: #f8fbff;
    border: 1px solid #8fa9c8;
    font-family: "Frank Ruhl Libre", "Noto Serif Hebrew", Georgia, serif;
  }

  #insert-source:disabled,
  #open-on-sefaria:disabled,
  #run-sefaria:disabled,
  .primary-action-button[disabled],
  .secondary-action-button[disabled] {
    opacity: 0.55;
  }

  #insert-source:not(:disabled):hover,
  .primary-action-button:hover {
    background: var(--selected-hover);
  }

  #open-on-sefaria:not(:disabled):hover {
    background: var(--selected-soft);
    border-color: #5b7094;
    color: #28598c;
  }

  .primary-actions {
    display: grid;
    grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
    gap: 6px;
    padding: 4px;
    background: var(--lighter-grey);

  .toggle-row,

  .switch {
    position: relative;
    display: inline-block;
    flex: 0 0 auto;
    width: 42px;
    height: 24px;
  }

  .switch input {
    position: absolute;
    width: 0;
    height: 0;
    opacity: 0;
  }

  .slider {
    position: absolute;
    inset: 0;
    cursor: pointer;
    background: #c7c7c7;
    border-radius: 999px;
    transition: 0.2s;
  }

  .slider::before {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    content: "";
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    transition: 0.2s;
  }

  .switch input:checked + .slider {
    background: var(--selected);
  }

  .switch input:checked + .slider::before {
    transform: translateX(18px);
  }

  .compact-option-toggle-row {
    min-width: 0;
    min-height: 30px;
  }

  .compact-option-toggle-row > label:first-child {

    white-space: nowrap;
  }

  .compact-option-toggle-row .switch {
    width: 34px;
    height: 18px;
  }

  .compact-option-toggle-row .slider::before {
    top: 3px;
    left: 3px;
    width: 12px;
    height: 12px;
  }

  .compact-option-toggle-row .switch input:checked + .slider::before {
    transform: translateX(16px);
  }

.display-layout-section {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.display-choice-dropdown {
  position: relative;
}

.display-choice-dropdown > summary {
  cursor: pointer;
  pointer-events: auto;
  list-style: none;
}

.display-choice-dropdown > summary::-webkit-details-marker {
  display: none;
}

.display-choice-summary {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 6px;
}

.display-choice-label {
  color: var(--sefaria-blue);
  font-family: "Frank Ruhl Libre", "Noto Serif Hebrew", serif;
  font-size: 13px;
  font-weight: 700;
}

.display-choice-selected {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 7px 10px;
  color: #18345d;
  background: #fff;
  border: 1px solid #d9d3c7;
  border-radius: 12px;
}

.display-choice-dropdown[open] .display-choice-selected {
  border-color: #b9c8dd;
  box-shadow: 0 0 0 2px rgba(51, 95, 150, 0.08);
}

#display-choice-summary-text::after,
#layout-choice-summary-text::after {
  content: "▾";
  margin-left: 8px;
  color: #6c7d93;
  font-size: 11px;
}

#display-choice-summary-text[data-mode='en'] .both,
#display-choice-summary-text[data-mode='he'] .both {
  display: none;
}

#display-choice-summary-text[data-mode='en']::before {
  content: 'A';
  font-size: 20px;
  font-weight: 700;
}

#display-choice-summary-text[data-mode='he']::before {
  content: 'א';
  font-size: 20px;
  font-weight: 700;
}

#display-choice-summary-text[data-mode='both']::before,
#layout-choice-summary-text[data-layout='he-right']::before,
#layout-choice-summary-text[data-layout='he-left']::before,
#layout-choice-summary-text[data-layout='he-top']::before {
  content: '';
}

#layout-choice-summary-text .layout-icon {
  width: 34px;
}

.display-choice-dropdown:not([open]) .mode-card-group,
.display-choice-dropdown:not([open]) .layout-option-group {
  display: none;
}

.display-choice-dropdown[open] .mode-card-group,
.display-choice-dropdown[open] .layout-option-group {
  margin-top: 8px;
}

.result-pin-button {
  opacity: 0.45;
  transition: opacity 0.15s ease, transform 0.15s ease;
}

.result-item:hover .result-pin-button,
.result-pin-button:focus-visible,
.result-pin-button.is-pinned {
  opacity: 1;
}

.result-pin-button.is-pinned {
  transform: scale(1.05);
}


.session-library-modal-card {
  width: min(560px, calc(100vw - 24px));
  max-height: min(88vh, 900px);
}

.session-library-panel {
  min-height: 420px;
}

.session-library-corpus-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.session-corpus-accordion {
  background: #fbfaf8;
  border: 1px solid #e7e1d7;
  border-radius: 12px;
}

.session-corpus-accordion > summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  cursor: pointer;
  list-style: none;
  font-weight: 700;
}

.session-corpus-accordion > summary::-webkit-details-marker {
  display: none;
}

.session-corpus-body {
  padding: 0 10px 10px;
}

.session-subsection-title {
  margin: 10px 2px 6px;
  color: #6b7280;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.session-library-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.session-library-item.is-pinned {
  border-color: #cfdff3;
  background: #f8fbff;
}

.session-library-remove {
  margin-left: 10px;
}

.session-library-primary-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.session-library-primary-button .footer-icon,
.open-sefaria-icon,
.sidebar-footer .submit {
  vertical-align: middle;
}

.session-library-primary-button .footer-icon {
  line-height: 1;
}

.open-ai-lesson-tool.is-inactive-feature {
  opacity: 0.8;
}

.sidebar-toast {
  position: fixed;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  z-index: 9999;
  padding: 10px 14px;
  color: #fff;
  background: rgba(24, 52, 93, 0.94);
  border-radius: 999px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
  opacity: 0;
  transition: opacity 0.18s ease;
}

.sidebar-toast.is-visible {
  opacity: 1;
}

.sidebar-notice-backdrop {
  position: fixed;
  inset: 0;
  z-index: 9998;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(15, 23, 42, 0.26);
}

.sidebar-notice-card {
  width: min(360px, calc(100vw - 32px));
  padding: 16px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 18px 48px rgba(0, 0, 0, 0.18);
}

.sidebar-notice-card h2 {
  margin: 0 0 8px;
  font-size: 16px;
}

.sidebar-notice-message {
  margin: 0 0 12px;
  line-height: 1.45;
}

.sidebar-notice-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.sidebar-notice-backdrop[hidden] {
  display: none !important;
}

 /* =========================================================
   FOOTER CONSOLIDATION OVERRIDE
   Put this at the very end of the stylesheet
   ========================================================= */

.sidebar-footer {
  --footer-row-bg: var(--lighter-grey);
  --footer-divider: #d8d6d1;
  --footer-button-text: #445267;
  --footer-button-hover-text: #18345d;
  --footer-button-hover-bg: rgba(255, 255, 255, 0.72);
  --footer-button-height: 40px;
  --footer-button-radius: 10px;
  --footer-row-radius: 12px;
  --footer-row-padding-y: 3px;
  --footer-row-padding-x: 4px;
}

/* Keep the footer itself stable */
.sidebar-footer {
  display: grid;
  gap: 6px;
}

.sidebar-footer > section {
  margin: 0;
  min-width: 0;
}

/* ---------- shared row shell ---------- */
.sidebar-footer .primary-actions,
.sidebar-footer .sidebar-footer-tools,
.sidebar-footer .session-override-buttons {
  display: grid;
  gap: 0;
  align-items: stretch;
  margin: 0;
  padding: var(--footer-row-padding-y) var(--footer-row-padding-x);
  overflow: hidden;
  background: var(--footer-row-bg);
  border: 0;
  border-radius: var(--footer-row-radius);
  box-sizing: border-box;
}

/* Primary row: Add Source | Open in Sefaria */
.sidebar-footer .primary-actions {
  grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
  gap: 6px;
}

/* Quick actions row */
.sidebar-footer .sidebar-footer-tools {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

/* Settings row buttons */
.sidebar-footer .session-override-buttons {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

/* Divider lines inside each row */
.sidebar-footer .primary-actions > * + *,
.sidebar-footer .sidebar-footer-tools > * + *,
.sidebar-footer .session-override-buttons > * + * {
  border-left: 1px solid var(--footer-divider);
}

/* ---------- universal footer button reset ---------- */
.sidebar-footer .primary-action-button,
.sidebar-footer .secondary-action-button,
.sidebar-footer .tertiary-action-button,
.sidebar-footer .footer-tool-button,
.sidebar-footer .session-library-primary-button,
.sidebar-footer #insert-source,
.sidebar-footer #open-on-sefaria,
.sidebar-footer #open-session-library,
.sidebar-footer .session-override-buttons .footer-tool-button {
  appearance: none;
  -webkit-appearance: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  align-self: stretch;
  width: 100%;
  min-width: 0;
  height: var(--footer-button-height);
  min-height: var(--footer-button-height);
  max-height: var(--footer-button-height);
  margin: 0;
  padding: 0 10px;
  box-sizing: border-box;
  background: transparent !important;
  border: 0 !important;
  border-radius: var(--footer-button-radius);
  box-shadow: none !important;
  color: var(--footer-button-text);
  cursor: pointer;
  line-height: 1;
  vertical-align: middle;
  text-decoration: none;
  font-weight: 700;
}

/* Hover/focus */
.sidebar-footer .primary-action-button:hover:not(:disabled),
.sidebar-footer .secondary-action-button:hover:not(:disabled),
.sidebar-footer .tertiary-action-button:hover:not(:disabled),
.sidebar-footer .footer-tool-button:hover:not(:disabled),
.sidebar-footer .session-library-primary-button:hover:not(:disabled),
.sidebar-footer #insert-source:hover:not(:disabled),
.sidebar-footer #open-on-sefaria:hover:not(:disabled),
.sidebar-footer #open-session-library:hover:not(:disabled) {
  background: var(--footer-button-hover-bg) !important;
  color: var(--footer-button-hover-text);
}

.sidebar-footer .primary-action-button:focus-visible,
.sidebar-footer .secondary-action-button:focus-visible,
.sidebar-footer .tertiary-action-button:focus-visible,
.sidebar-footer .footer-tool-button:focus-visible,
.sidebar-footer .session-library-primary-button:focus-visible,
.sidebar-footer #insert-source:focus-visible,
.sidebar-footer #open-on-sefaria:focus-visible,
.sidebar-footer #open-session-library:focus-visible {
  outline: 2px solid rgba(24, 52, 93, 0.28);
  outline-offset: -2px;
}

/* Disabled still aligned */
.sidebar-footer .primary-action-button:disabled,
.sidebar-footer .secondary-action-button:disabled,
.sidebar-footer .tertiary-action-button:disabled,
.sidebar-footer .footer-tool-button:disabled,
.sidebar-footer .session-library-primary-button:disabled,
.sidebar-footer #insert-source:disabled,
.sidebar-footer #open-on-sefaria:disabled,
.sidebar-footer #open-session-library:disabled {
  opacity: 0.48;
  cursor: default;
}

/* ---------- primary row specifics ---------- */
.sidebar-footer #insert-source,
.sidebar-footer .primary-action-button {
  font-size: 14px;
}

.sidebar-footer #open-session-library,
.sidebar-footer .session-library-primary-button,
.sidebar-footer #open-on-sefaria,
.sidebar-footer .secondary-action-button,
.sidebar-footer .tertiary-action-button {
  padding-left: 0;
  padding-right: 0;
  font-size: 18px;
}

/* Fix the session library button alignment */
.sidebar-footer #open-session-library,
.sidebar-footer .session-library-primary-button {
  place-self: stretch;
}

.sidebar-footer .session-library-primary-button .footer-icon,
.sidebar-footer #open-session-library .footer-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  font-size: 17px;
  line-height: 1;
  transform: none;
}

/* Force Open in Sefaria to match row background behavior */
.sidebar-footer #open-on-sefaria,
.sidebar-footer .secondary-action-button {
  color: var(--footer-button-text) !important;
  background: transparent !important;
  border: 0 !important;
  font-family: inherit;
}

.sidebar-footer .open-sefaria-label,
.sidebar-footer .open-sefaria-label.icon-only,
.sidebar-footer .open-sefaria-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  vertical-align: middle;
}

.sidebar-footer .open-sefaria-label.icon-only {
  width: 18px;
  height: 18px;
  gap: 0;
  font-size: 0;
}

.sidebar-footer .open-sefaria-icon {
  width: 18px;
  height: 18px;
  object-fit: contain;
}

/* ---------- quick actions row ---------- */
.sidebar-footer .sidebar-footer-tools,
.sidebar-footer .quick-actions-row {
  margin-top: 0;
}

.sidebar-footer .footer-tool-button {
  gap: 4px;
  font-size: 18px;
}

.sidebar-footer .footer-icon,
.sidebar-footer .tool-icon-stack,
.sidebar-footer .footer-tool-button .footer-gear-icon,
.sidebar-footer .footer-tool-button .samekh-sized,
.sidebar-footer .footer-tool-button .sefaria-badge.samekh,
.sidebar-footer .samekh-sized {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.sidebar-footer .footer-tool-button .footer-gear-icon,
.sidebar-footer .footer-tool-button .samekh-sized,
.sidebar-footer .footer-tool-button .sefaria-badge.samekh,
.sidebar-footer .samekh-sized {
  font-size: 18px;
}

.sidebar-footer .tool-icon-stack {
  gap: 2px;
  font-size: 14px;
}

.sidebar-footer .tool-arrow {
  margin: 0 1px;
  font-size: 11px;
  line-height: 1;
}

.sidebar-footer .footer-tool-button .link-emoji {
  font-size: 15px;
  line-height: 1;
}

.sidebar-footer .footer-gear-icon {
  font-weight: 800;
}

/* AI button should visually match others even when inactive */
.sidebar-footer .open-ai-lesson-tool,
.sidebar-footer .open-ai-lesson-tool[disabled],
.sidebar-footer .open-ai-lesson-tool.is-inactive-feature {
  opacity: 1;
}

/* ---------- settings row ---------- */
.sidebar-footer .footer-settings-row,
.sidebar-footer .session-override-actions {
  display: grid !important;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  gap: 8px;
  margin-top: 0;
  padding: 10px;
  background: #fff;
  border: 1px solid var(--lighter-grey);
  border-radius: 14px;
  box-sizing: border-box;
}

.sidebar-footer .session-override-label {
  margin: 0;
  color: #4d596d;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}

.sidebar-footer .session-override-buttons .footer-tool-button {
  font-size: 18px;
}

/* ---------- footer links row ---------- */
.sidebar-footer .footer,
.sidebar-footer .footer-inline {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 2px;
  padding-top: 4px;
  min-height: 20px;
}

.sidebar-footer .footer-inline a,
.sidebar-footer .footer-inline span,
.sidebar-footer .footer a {
  line-height: 1;
}

.sidebar-footer .footer a {
  color: #5a6880;
  font-size: 12px;
}

.sidebar-footer .footer-logo-inline img {
  display: block;
  width: auto;
  height: 18px;
}

/* ---------- hidden backdrop consistency ---------- */
.sidebar-notice-backdrop[hidden] {
  display: none !important;
}

/* ---------- responsive ---------- */
@media (max-width: 420px) {
  .sidebar-footer .primary-actions {
    grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
    gap: 6px;
  }

  .sidebar-footer .footer-settings-row,
  .sidebar-footer .session-override-actions {
    grid-template-columns: 1fr;
  }

  .sidebar-footer .session-override-label {
    white-space: normal;
  }
}
/* ===== Compact results toolbar ===== */

.library-results-heading-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 8px;
  margin: 0 0 6px;
}

.library-results-label {
  margin: 0;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.library-results-toolbar {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  min-width: 0;
  flex-wrap: nowrap;

.toolbar-control-group {
  display: inline-flex;
  align-items: center;

.library-results-toolbar .translation-language-compact {
  width: auto !important;

.library-results-toolbar .translation-language-toggle,

}

.restore-corpus-row,
#restore-corpus-wrap {
  display: none !important;
}

.restore-corpus-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  min-width: 28px;
  height: 28px;
  min-height: 28px;
  padding: 0;
  border-radius: 999px;
  font-size: 16px;

.restore-corpus-button[disabled] {

.restore-corpus-button:not([disabled]):hover,

}

.restore-corpus-select.visually-hidden {
  position: absolute !important;
  width: 1px !important;
  height: 1px !important;
  margin: -1px !important;
  padding: 0 !important;

  clip: rect(0, 0, 0, 0) !important;

}

.translation-language-menu {
  right: 0 !important;
  left: auto !important;
  max-width: min(280px, calc(100vw - 32px));

@media (max-width: 420px) {
  .library-results-heading-row {
    grid-template-columns: 1fr;
    align-items: stretch;
  }

  .library-results-label {
    white-space: normal;
  }

  .library-results-toolbar {
    justify-content: flex-start;
    flex-wrap: wrap;
  }
}

/* Base restore button (always visible) */
.restore-corpus-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 999px;
  font-size: 16px;
  line-height: 1;

  /* smooth transitions */
  transition: opacity 0.15s ease, transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

/* DIM (inactive) */
.restore-corpus-button[disabled] {
  opacity: 0.35;
  cursor: default;
  pointer-events: none;
}

/* ACTIVE (has something to restore) */
.restore-corpus-button.is-active {
  opacity: 1;
  cursor: pointer;
}

/* Hover only when active */
.restore-corpus-button.is-active:hover,
.restore-corpus-button.is-active:focus {
  background: #fff;
  border-color: var(--selected);
  color: var(--selected);
  transform: translateY(-1px);
}

/* Optional subtle “available” cue */
.restore-corpus-button.is-active::after {
  content: '';
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--selected);
  border-radius: 50%;
  top: 4px;
  right: 4px;
}

@keyframes restorePulse {
  0% { transform: scale(1); }
  40% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.restore-corpus-button.is-active {
  animation: restorePulse 0.25s ease;
}

  position: absolute;
  right: 0;
  top: 100%;

  min-width: 140px;
  max-width: 220px;
  background: var(--panel);

  text-align: left;
  font-size: 12px;
  cursor: pointer;
  color: var(--text);
}
.restore-corpus-menu-item:hover {
