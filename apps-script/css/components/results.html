<style>
/*
 * components/results.css — results panel, result items, library toolbar,
 *                          session library, corpus accents, skeleton loaders
 */

/* =============================================================
   RESULTS PANEL HEADER
   .results-header is hidden in favour of .library-results-heading-row.
   Keep the display:none so any lingering HTML doesn't show it.
   ============================================================= */

.results-header {
  display: none;
}

.results-header-tools {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  margin-left: auto;
  flex-wrap: wrap;
  row-gap: 8px;
}

.results-header-tools .results-tool,
.results-header-tools select,
.results-header-tools button {
  text-align: center;
  align-items: center;
  justify-content: center;
}

.results-header-actions {
  display: none;
}

/* Session library header alignment */
.session-library-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #ece9e3;
}

/* =============================================================
   LIBRARY RESULTS HEADING ROW + TOOLBAR
   ============================================================= */

.library-results-heading-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 8px;
  margin: 0 0 6px;
}

.library-results-label {
  margin: 0;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.library-results-toolbar {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  min-width: 0;
  flex-wrap: nowrap;
}

.toolbar-control-group {
  display: inline-flex;
  flex: 0 1 auto;
  align-items: center;
  min-width: 0;
}

/* Toolbar-context lang toggle and sort select: fixed compact sizing */
.library-results-toolbar .translation-language-toggle,
.library-results-toolbar .lang-tool-button,
.library-results-toolbar .results-tool.lang-tool-button {
  width: auto;
  min-width: 90px;
  max-width: 120px;
  height: 28px;
  min-height: 28px;
  padding: 0 10px;
  border-radius: 14px;
}

.library-results-toolbar .search-sort-select {
  flex: 0 0 auto;
  width: auto;
  min-width: 72px;
  max-width: 90px;
  height: 28px;
  min-height: 28px;
  padding: 0 10px;
  border-radius: 14px;
}

/* Deprecated: restore-corpus row is replaced by the icon button */
.restore-corpus-row,
#restore-corpus-row,
#restore-corpus-wrap {
  display: none !important;
}

/* =============================================================
   RESTORE CORPUS BUTTON
   ============================================================= */

.restore-corpus-button {
  position: relative;
  display: inline-flex;
  flex: 0 0 auto;
  align-items: center;
  justify-content: center;
  vertical-align: middle;
  width: 28px;
  min-width: 28px;
  height: 28px;
  min-height: 28px;
  padding: 0;
  border-radius: 999px;
  font-size: 15px;
  line-height: 1;
  transition:
    opacity 0.15s ease,
    transform 0.15s ease,
    background 0.15s ease,
    border-color 0.15s ease,
    color 0.15s ease,
    box-shadow 0.15s ease;
}

.restore-corpus-button[disabled] {
  opacity: 0.35;
  cursor: default;
  pointer-events: none;
}

.restore-corpus-button.is-active {
  opacity: 1;
  cursor: pointer;
  animation: restorePulse 0.25s ease;
}

.restore-corpus-button.is-active:hover,
.restore-corpus-button.is-active:focus-visible {
  background: #fff;
  border-color: var(--selected);
  color: var(--selected);
  transform: translateY(-1px);
  box-shadow: 0 0 0 2px rgba(24, 52, 93, 0.08);
}

/* Subtle dot indicator when there's a corpus to restore */
.restore-corpus-button.is-active::after {
  content: "";
  position: absolute;
  top: 4px;
  right: 4px;
  width: 6px;
  height: 6px;
  background: var(--selected);
  border-radius: 50%;
}

/* Visually-hidden select paired with the icon button for accessibility */
.restore-corpus-select.visually-hidden {
  position: absolute !important;
  width: 1px !important;
  height: 1px !important;
  margin: -1px !important;
  padding: 0 !important;
  overflow: hidden !important;
  clip: rect(0, 0, 0, 0) !important;
  white-space: nowrap !important;
  border: 0 !important;
}

/* =============================================================
   RESTORE CORPUS MENU (dropdown)
   ============================================================= */

.restore-corpus-menu {
  position: absolute;
  top: 100%;
  right: 0;
  z-index: 20;
  min-width: 140px;
  max-width: 220px;
  padding: 4px 0;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
}

.restore-corpus-menu.hidden {
  display: none;
}

.restore-corpus-menu-item {
  display: block;
  width: 100%;
  padding: 6px 12px;
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  text-align: left;
}

.restore-corpus-menu-item:hover {
  background: var(--selected-soft);
}

/* =============================================================
   RESULTS LISTS
   ============================================================= */

.results-lists {
  display: block;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #f0efec;
}

.results-panel .result-list {
  overflow: visible;
}

.result-list {
  margin: 0;
  padding: 0;
  list-style: none;
}

.result-list + .result-group-label {
  margin-top: 10px;
}

/* =============================================================
   RESULT GROUPS & LABELS
   ============================================================= */

.result-group-label {
  margin: 0 0 6px;
  color: #555;
  font-size: 18px;
  font-weight: 500;
  line-height: 1.15;
}

.result-group-label.text-mode-only,
.search-results-label {
  display: none; /* Deprecated: label content is in library-results-heading-row */
}

.results-lists .result-group-label {
  margin-top: 12px;
  margin-bottom: 6px;
  font-size: 14px;
}

.result-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  padding: 6px 10px;
  border: 1px solid rgba(0, 0, 0, 0.04);
  border-radius: 10px;
}

.result-cluster-label {
  flex: 1 1 auto;
  margin: 8px 0 4px;
  color: #667;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.result-group-remove {
  width: auto;
  min-width: 0;
  margin: 0;
  padding: 0;
  color: #6f7684;
  cursor: pointer;
  background: transparent;
  border: 0;
  box-shadow: none;
  font-size: 13px;
  line-height: 1;
}

.result-group-remove[disabled] {
  opacity: 0.45;
  cursor: default;
}

/* =============================================================
   RESULT ITEMS
   ============================================================= */

.result-item {
  display: block;
  box-sizing: border-box;
  width: 100%;
  margin-bottom: 6px;
  padding: 10px 12px;
  cursor: pointer;
  text-align: left;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
}

.result-item:hover {
  background: #f8fbff;
}

.result-item.is-nav-target {
  box-shadow: inset 0 0 0 2px #89a3cc;
}

.result-item.selected {
  background: var(--selected-soft);
  border-color: var(--selected);
  box-shadow: inset 0 0 0 1px var(--selected);
}

.recent-results .result-item {
  margin-bottom: 0;
}

.result-item.session-library-item {
  padding-right: 8px;
}

.result-row-main {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* =============================================================
   RESULT TEXT CONTENT
   ============================================================= */

.results-title {
  display: none !important; /* Deprecated element hidden globally */
}

.result-title {
  flex: 1 1 auto;
  min-width: 0;
  margin-bottom: 2px;
  color: #18345d;
  font-size: 13px;
  font-weight: 700;
  overflow-wrap: anywhere;
}

.result-snippet,
.result-subtitle {
  color: #566273;
  font-size: 12px;
  overflow-wrap: anywhere;
}

.result-meta {
  color: #5b6677;
  font-size: 11px;
}

.result-meta span {
  display: inline-block;
}

.result-type {
  display: inline-block;
  margin-bottom: 4px;
  color: #5d6878;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* =============================================================
   RESULT PIN BUTTON
   ============================================================= */

.result-pin-button {
  display: inline;
  flex: 0 0 auto;
  width: auto;
  min-width: 0;
  margin: 0 2px 0 0;
  padding: 0;
  color: #335f96;
  cursor: pointer;
  background: transparent;
  border: 0;
  box-shadow: none;
  font-size: 13px;
  line-height: 1;
  opacity: 0.45;
  transition: opacity 0.15s ease, transform 0.15s ease;
  vertical-align: middle;
}

.result-item:hover .result-pin-button,
.result-pin-button:focus-visible,
.result-pin-button.is-pinned {
  opacity: 1;
}

.result-pin-button.is-pinned {
  transform: scale(1.05);
}

/* =============================================================
   RESULTS REFINE ROW
   ============================================================= */

.results-refine-row {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin: 4px 0;
}

.results-refine-row .search-sort-select {
  width: auto;
  min-width: 34px;
  height: 18px;
  min-height: 18px;
  padding: 0 2px;
  color: #6e7890;
  background: transparent;
  border: 0;
  box-shadow: none;
  font-size: 11px;
  font-weight: 700;
}

.results-refine-row .search-sort-select:focus,
.results-refine-row .search-sort-select:hover {
  background: transparent;
  border: 0;
}

.results-toggle-button {
  width: auto;
  max-width: 100%;
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
}

.results-toggle-row {
  margin: 2px 0 6px;
}

.results-hint {
  display: none;
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 12px;
}

/* =============================================================
   SELECTED RESULT SUMMARY
   ============================================================= */

.selected-result-summary {
  margin-bottom: 8px;
  padding: 8px 10px;
  color: #444;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  overflow-wrap: anywhere;
  word-wrap: break-word;
}

.selected-result-summary strong {
  display: block;
  margin-bottom: 2px;
  color: var(--text);
  font-size: 13px;
  overflow-wrap: anywhere;
}

/* =============================================================
   RESULT FILTER STRIP (corpus accent chips)
   ============================================================= */

.result-filter-strip {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}

.result-filter-chip {
  padding: 4px 8px;
  border-left: 3px solid transparent;
  border-radius: 999px;
}

.result-filter-chip.corpus-accent-commentary { border-left-color: var(--commentary-blue); }
.result-filter-chip.corpus-accent-halakhah   { border-left-color: var(--halakhah-red); }
.result-filter-chip.corpus-accent-midrash    { border-left-color: var(--midrash-green); }
.result-filter-chip.corpus-accent-mishnah   { border-left-color: var(--mishnah-blue); }
.result-filter-chip.corpus-accent-talmud    { border-left-color: var(--talmud-gold); }
.result-filter-chip.corpus-accent-tanakh    { border-left-color: var(--tanakh-teal); }

.result-filter-chip.removed {
  color: #777;
  background: #f0f0f0;
  border-left-color: #b6b6b6;
}

/* =============================================================
   CORPUS ACCENT ROW BACKGROUNDS (result-row / result-group-header)
   ============================================================= */

.result-row.corpus-accent-tanakh,     .result-group-header.corpus-accent-tanakh     { background: rgba(58, 91, 149, 0.08); }
.result-row.corpus-accent-mishnah,    .result-group-header.corpus-accent-mishnah    { background: rgba(99, 120, 87, 0.08); }
.result-row.corpus-accent-talmud,     .result-group-header.corpus-accent-talmud     { background: rgba(147, 110, 61, 0.08); }
.result-row.corpus-accent-midrash,    .result-group-header.corpus-accent-midrash    { background: rgba(123, 91, 140, 0.08); }
.result-row.corpus-accent-halakhah,   .result-group-header.corpus-accent-halakhah   { background: rgba(76, 122, 113, 0.08); }
.result-row.corpus-accent-liturgy,    .result-group-header.corpus-accent-liturgy    { background: rgba(140, 88, 88, 0.08); }
.result-row.corpus-accent-kabbalah,   .result-group-header.corpus-accent-kabbalah   { background: rgba(95, 74, 140, 0.08); }
.result-row.corpus-accent-philosophy, .result-group-header.corpus-accent-philosophy { background: rgba(89, 108, 145, 0.08); }
.result-row.corpus-accent-chasidut,   .result-group-header.corpus-accent-chasidut   { background: rgba(141, 112, 72, 0.08); }
.result-row.corpus-accent-musar,      .result-group-header.corpus-accent-musar      { background: rgba(106, 120, 73, 0.08); }
.result-row.corpus-accent-commentary, .result-group-header.corpus-accent-commentary { background: rgba(97, 97, 97, 0.08); }
.result-row.corpus-accent-reference,  .result-group-header.corpus-accent-reference  { background: rgba(84, 104, 126, 0.08); }
.result-row.corpus-accent-modernworks,.result-group-header.corpus-accent-modernworks{ background: rgba(116, 103, 140, 0.08); }
.result-row.corpus-accent-apocrypha,  .result-group-header.corpus-accent-apocrypha  { background: rgba(136, 95, 72, 0.08); }
.result-row.corpus-accent-tanaitic,   .result-group-header.corpus-accent-tanaitic   { background: rgba(111, 122, 79, 0.08); }

/* =============================================================
   LANGUAGE FILTER CHIPS
   ============================================================= */

.lang-filter-strip-label {
  flex-shrink: 0;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.lang-filter-chip {
  padding: 4px 8px;
  background: #eef2ff;
  border: none;
  border-radius: 999px;
  color: inherit;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
}

.lang-filter-chip:hover {
  background: #d8e4ff;
}

.lang-filter-clear-chip {
  padding: 4px 8px;
  background: #f0f0f0;
  border: none;
  border-radius: 999px;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
}

.lang-filter-clear-chip:hover {
  background: #e0e0e0;
}

/* =============================================================
   SESSION LIBRARY MODAL — backdrop + card
   ============================================================= */

.session-library-modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(17, 24, 39, 0.4);
}

.session-library-modal-card {
  display: flex;
  flex-direction: column;
  width: clamp(480px, 90vw, 640px);
  max-height: 80vh;
  overflow: hidden;
  background: #fff;
  border: 1px solid #e3dfd8;
  border-radius: 10px;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
}

.modal-backdrop[hidden] {
  display: none !important;
}

/* =============================================================
   SESSION LIBRARY MODAL — header
   ============================================================= */

.sl-modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 22px 14px;
  border-bottom: 1px solid #e5e7eb;
  flex-shrink: 0;
}

.sl-modal-header-text {
  min-width: 0;
}

.sl-modal-title {
  margin: 0 0 2px;
  color: #18345d;
  font-family: Georgia, serif;
  font-size: 18px;
  font-weight: 600;
  line-height: 1.2;
}

.sl-modal-subtitle {
  margin: 0;
  color: #6b7280;
  font-size: 12px;
}

.sl-modal-close {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  padding: 0;
  color: #6b7280;
  cursor: pointer;
  background: transparent;
  border: 0;
  border-radius: 6px;
  font-size: 18px;
  line-height: 32px;
  text-align: center;
}

.sl-modal-close:hover {
  background: #f3f4f6;
  color: #111827;
}

/* =============================================================
   SESSION LIBRARY MODAL — toolbar
   ============================================================= */

.sl-toolbar {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 22px;
  border-bottom: 1px solid #e5e7eb;
  flex-shrink: 0;
}

.sl-toolbar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.sl-search-input {
  flex: 1;
  min-width: 0;
  height: 32px;
  padding: 0 10px;
  color: #111827;
  background: #f9fafb;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-family: inherit;
  font-size: 13px;
  box-sizing: border-box;
}

.sl-search-input:focus {
  background: #fff;
  border-color: #18345d;
  outline: none;
  box-shadow: 0 0 0 2px rgba(24, 52, 93, 0.12);
}

.sl-action-btn {
  flex-shrink: 0;
  height: 32px;
  padding: 0 10px;
  cursor: pointer;
  background: transparent;
  border: 0;
  border-radius: 4px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}

.sl-action-btn--destructive {
  color: #b91c1c;
}

.sl-action-btn--destructive:hover:not(:disabled) {
  background: #fef2f2;
  color: #991b1b;
  text-decoration: underline;
}

.sl-action-btn:disabled {
  opacity: 0.35;
  cursor: default;
}

.sl-filter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  flex: 1;
  min-width: 0;
}

.sl-filter-chip {
  height: 26px;
  padding: 0 10px;
  color: #374151;
  cursor: pointer;
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 13px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}

.sl-filter-chip:hover {
  background: #f3f4f6;
  border-color: #d1d5db;
}

.sl-filter-chip--active {
  color: #18345d;
  background: #ddeeff;
  border-color: #93bde8;
}

.sl-toolbar-extras {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.sl-sort-select {
  height: 26px;
  padding: 0 6px;
  color: #374151;
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-family: inherit;
  font-size: 11px;
}

.sl-density-btn {
  width: 28px;
  height: 26px;
  padding: 0;
  color: #6b7280;
  cursor: pointer;
  background: transparent;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 14px;
  line-height: 1;
}

.sl-density-btn:hover {
  background: #f3f4f6;
  border-color: #d1d5db;
  color: #374151;
}

/* =============================================================
   SESSION LIBRARY MODAL — confirmation banner
   ============================================================= */

.sl-confirmation {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 22px;
  border-bottom: 1px solid transparent;
  flex-shrink: 0;
}

.sl-confirmation[hidden] {
  display: none !important;
}

.sl-confirmation--warning {
  background: #fffbeb;
  border-left: 3px solid #f59e0b;
  border-bottom-color: #fde68a;
}

.sl-confirmation--danger {
  background: #fef2f2;
  border-left: 3px solid #dc2626;
  border-bottom-color: #fecaca;
}

.sl-confirmation-message {
  flex: 1;
  margin: 0;
  color: #374151;
  font-size: 12px;
  line-height: 1.45;
}

.sl-confirmation-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

/* =============================================================
   SESSION LIBRARY MODAL — content (scrollable)
   ============================================================= */

.sl-content {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 14px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background:
    linear-gradient(white 30%, rgba(255,255,255,0)) top    / 100% 20px no-repeat local,
    linear-gradient(rgba(255,255,255,0), white 70%) bottom / 100% 20px no-repeat local,
    radial-gradient(farthest-side at 50% 0,   rgba(0,0,0,.05), transparent) top    / 100% 8px no-repeat scroll,
    radial-gradient(farthest-side at 50% 100%, rgba(0,0,0,.05), transparent) bottom / 100% 8px no-repeat scroll;
}

/* =============================================================
   SESSION LIBRARY MODAL — sections
   ============================================================= */

.sl-section {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.sl-section--pinned {
  padding: 8px 10px;
  background: #fffcf5;
  border: 1px solid #fde68a;
  border-left: 3px solid #f59e0b;
  border-radius: 6px;
}

.sl-section-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-bottom: 5px;
  border-bottom: 1px solid #f3f4f6;
  margin-bottom: 2px;
}

.sl-section--pinned .sl-section-header {
  border-bottom-color: #fde68a;
}

.sl-section-label {
  color: #6b7280;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  user-select: none;
}

.sl-section-count {
  color: #9ca3af;
  font-size: 10px;
  user-select: none;
}

.sl-section-menu-wrap {
  position: relative;
  margin-left: auto;
}

.sl-section-menu-btn {
  width: 22px;
  height: 22px;
