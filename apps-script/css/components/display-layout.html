<style>
/*
 * components/display-layout.css — display-layout section grid, mode cards,
 *                                  layout options, composition card centering
 *
 * BUG FIX: .display-layout-section was using auto-fit which trapped opened
 * dropdowns in a single narrow column. It is now an explicit 2-column grid.
 * An open .display-choice-detail or .display-choice-dropdown spans both
 * columns so its controls fill the available sidebar width.
 */

/* =============================================================
   DISPLAY LAYOUT SECTION GRID
   ============================================================= */

/*
 * Two closed selector controls sit side-by-side.
 * Dropdowns float their options panel absolutely so neither trigger shifts position.
 * Only non-dropdown details elements span both columns when open.
 */
.display-layout-section {
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  align-items: start;
}

.display-layout-section .display-choice-detail[open]:not(.display-choice-dropdown) {
  grid-column: 1 / -1;
}

/*
 * Reset the position:relative from accordion.html so the containing block for
 * the absolutely-positioned options panel is .display-layout-section (full width).
 */
.display-layout-section .display-choice-dropdown {
  position: static;
}

/*
 * Options panel floats below the trigger row as an overlay, full-section width.
 * margin-top:0 overrides the in-flow margin from accordion.html.
 */
.display-layout-section .display-choice-dropdown[open] .mode-card-group,
.display-layout-section .display-choice-dropdown[open] .layout-option-group {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  z-index: 20;
  margin-top: 0;
  padding: 8px 10px;
  background: #fbfaf8;
  border: 1px solid #ebe6dc;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
}

/* =============================================================
   MODE CARD GROUP
   ============================================================= */

.compact-mode-card-group,
.mode-card-group,
.layout-option-group {
  display: grid;
  gap: 6px;
}

.mode-card-group.compact-mode-card-group {
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 18px;
}

/* Default 3-column layout inside dropdown */
.display-choice-dropdown[open] .mode-card-group {
  grid-template-columns: repeat(3, minmax(30px, 1fr));
}

/* Layout options: auto-fill so narrow cells wrap rather than clip icons */
.display-choice-dropdown[open] .layout-option-group {
  grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
}

/* Standalone (non-dropdown) 3-column groups */
.mode-card-group,
.layout-option-group {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

/* =============================================================
   MODE CARDS
   ============================================================= */

.mode-card,
.layout-option {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  width: 100%;
  min-width: 0;
  min-width: 34px;
  height: 62px;
  min-height: 62px;
  padding: 0 8px;
  color: var(--text);
  cursor: pointer;
  overflow: hidden;
  text-align: center;
  vertical-align: middle;
}

.mode-card {
  background: #fff;
  border: 0;
  border-radius: 0;
}

.mode-card:hover {
  background: #f8fbff;
}

.mode-card.selected {
  background: #eef2f8;
  border-color: #6e8ab2;
  box-shadow: inset 0 0 0 1px rgba(24, 52, 93, 0.08);
}

.mode-card:focus-visible {
  outline: 2px solid var(--selected);
  outline-offset: 2px;
}

/* =============================================================
   LAYOUT OPTIONS
   ============================================================= */

.layout-option {
  min-width: 44px;
  background: transparent;
  border: 0;
  border-radius: 10px;
}

.layout-option:hover {
  background: #f8fbff;
  border-color: #9fb3cc;
}

.layout-option.selected,
.layout-option.is-active,
.layout-option[aria-checked="true"] {
  background: #eef2f8;
  border-color: #6e8ab2;
  box-shadow: inset 0 0 0 1px rgba(24, 52, 93, 0.08);
}

.layout-option:focus-visible {
  outline: 2px solid var(--selected);
  outline-offset: 2px;
}

/* =============================================================
   MODE CARD CONTENT & LABELS
   ============================================================= */

.mode-card-content,
.mode-card-content.both {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-height: 20px;
  line-height: 1;
  text-decoration: none;
  white-space: nowrap;
}

.mode-card-indicator {
  display: none;
}

.mode-card-label {
  color: inherit;
  font-size: 11px;
  font-weight: 600;
}

.mode-card-plus {
  margin-top: 1px;
  color: currentColor;
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
}

.mode-card-symbol {
  display: inline-block;
  flex: 0 0 auto;
  color: currentColor;
  font-family: "SBL Hebrew", "Ezra SIL", "Frank Ruhl Libre", serif;
  font-size: 23px;
  line-height: 1;
  text-decoration: none;
  transform: translateY(-1px);
}

.mode-card-symbol.latin {
  font-family: "Crimson Text", "EB Garamond", Georgia, serif;
  font-size: 21px;
  font-weight: 700;
}

/* Layout label text is hidden; icon communicates layout type */
.layout-label {
  display: none !important;
  font-size: 11px;
  font-weight: 700;
}

/* =============================================================
   LAYOUT ICON (visual schematic inside layout-option)
   ============================================================= */

.layout-icon {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  width: 38px;
  min-width: 38px;
  height: 24px;
  margin: 0 auto;
  background: #f7f7f5;
  border: 1px solid #bcb8b1;
  border-radius: 4px;
}

/* In the selected-display preview, the icon can be a bit wider */
.display-choice-selected .layout-icon {
  width: 38px;
  min-width: 38px;
  height: 24px;
}

.layout-icon.side-by-side,
.layout-icon.side-by-side.reverse {
  flex-direction: row;
}

.layout-icon.stacked {
  flex-direction: column;
}

.layout-col,
.layout-row {
  display: block;
  background: #bdb8b0;
  border-radius: 2px;
}

.layout-col {
  width: 10px;
  height: 24px;
}

.layout-row {
  width: 30px;
  height: 7px;
}

/* Hebrew column/row accent colors */
.layout-col.he,
.layout-row.he,
.layout-option.is-active .layout-col.he,
.layout-option.is-active .layout-row.he {
  background: #24406f;
}

.layout-option[data-layout="he-right"] .layout-col.en,
.layout-option[data-layout="he-left"] .layout-col.he,
.layout-option[data-layout="he-top"] .layout-row.he {
  background: #6f89b8;
}

.layout-option[data-layout="he-right"] .layout-col.he,
.layout-option[data-layout="he-left"] .layout-col.en,
.layout-option[data-layout="he-top"] .layout-row.en {
  background: #1f3f75;
}

/* =============================================================
   COMPOSITION CARD CENTERING (#composition-card-container)
   ============================================================= */

#composition-card-container .cc-hebrew-text {
  display: block;
  width: fit-content;
  max-width: 100%;
  margin-right: auto;
  margin-left: auto;
  text-align: center;
}

#composition-card-container .cc-hebrew-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

#composition-card-container .cc-hebrew {
  min-width: 0;
}
</style>
