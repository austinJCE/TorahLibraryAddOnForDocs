<style>
/* =====================================================================
   REDESIGN: Source card, compact versions area, layout tray
   ===================================================================== */

/* ── Source Card ─────────────────────────────────────────────────── */
.source-card { margin-bottom: 6px; }

.source-card-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--selected-soft, #ddeeff);
  border: 1.5px solid var(--selected, #18345d);
  border-radius: 10px;
}

.source-card-info {
  flex: 1 1 0;
  min-width: 0;
}

.source-card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--selected, #18345d);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.source-card-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--muted, #666);
  margin-top: 2px;
  overflow: hidden;
}

.source-card-status-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #bbb;
  flex-shrink: 0;
  transition: background 0.2s;
}
.source-card-status-dot.dot-ready   { background: #2c8a3d; }
.source-card-status-dot.dot-pending { background: #e07b00; }
.source-card-status-dot.dot-error   { background: #c0392b; }

.source-card-status-text {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.source-card-actions {
  display: flex;
  gap: 4px;
  align-items: center;
  flex-shrink: 0;
}

.source-card-change-btn {
  font-size: 11px;
  line-height: 1;
  padding: 4px 9px;
  border: 1px solid #b0bec9;
  border-radius: 6px;
  background: #fff;
  color: var(--selected, #18345d);
  cursor: pointer;
  white-space: nowrap;
}
.source-card-change-btn:hover {
  background: var(--selected, #18345d);
  color: #fff;
  border-color: var(--selected, #18345d);
}

.source-card-sefaria-btn {
  width: 22px;
  height: 22px;
  border: 1px solid #b0bec9;
  border-radius: 5px;
  background: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  margin-left: auto;
}
.source-card-sefaria-btn:disabled { opacity: 0.4; pointer-events: none; }
.source-card-sefaria-btn:hover:not(:disabled) { background: var(--card, #f3f1ed); }
.source-card-sefaria-btn .open-sefaria-icon { width: 14px; height: 14px; }

/* ── Layout Tray ─────────────────────────────────────────────────── */
.layout-tray {
  position: fixed;
  inset: 0;
  z-index: 900;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  pointer-events: none;
  visibility: hidden;
}

.layout-tray.is-open {
  pointer-events: auto;
  visibility: visible;
}

.tray-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.38);
  opacity: 0;
  transition: opacity 0.2s ease;
  cursor: pointer;
}
.layout-tray.is-open .tray-backdrop { opacity: 1; }

.tray-sheet {
  position: relative;
  background: var(--bg, #fbfbfa);
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -4px 28px rgba(0,0,0,0.18);
  flex-direction: column;
  max-height: 88vh;
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  overflow: hidden;
}
.layout-tray.is-open .tray-sheet { transform: translateY(0); }

.tray-handle {
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: #ccc;
  margin: 10px auto 2px;
  flex-shrink: 0;
}

.tray-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px 14px 8px;
  border-bottom: 1px solid var(--border, #d9d8d3);
  flex-shrink: 0;
}

.tray-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--sefaria-blue, #18345d);
}

.tray-close {
  font-size: 22px;
  line-height: 1;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted, #666);
  padding: 0;
  border-radius: 5px;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tray-close:hover { background: var(--card, #f3f1ed); color: #000; }

.tray-body {
  overflow-y: auto;
  padding: 10px 14px 16px;
  flex: 1 1 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.tray-section {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.tray-section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted, #666);
}

/* Tray preview */
.tray-preview-section .suggestions {
  min-height: 70px;
  max-height: 220px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid var(--border, #d9d8d3);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 13px;
}

/* Tray segmented controls */
.tray-seg-control {
  display: flex;
  background: var(--card, #f3f1ed);
  border: 1px solid var(--border, #d9d8d3);
  border-radius: 8px;
  overflow: hidden;
}
.tray-seg-btn {
  flex: 1 1 0;
  padding: 6px 3px;
  font-size: 12px;
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--muted, #666);
  transition: background 0.1s, color 0.1s;
  border-right: 1px solid var(--border, #d9d8d3);
  line-height: 1.3;
}
.tray-seg-btn:last-child { border-right: none; }
.tray-seg-btn[aria-checked="true"] {
  background: var(--selected, #18345d);
  color: #fff;
  font-weight: 600;
}
.tray-seg-btn:hover:not([aria-checked="true"]) { background: #e0ddd7; }

/* Tray toggle pills */
.tray-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.tray-pill {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 12px;
  border: 1px solid var(--border, #d9d8d3);
  background: #fff;
  color: #444;
  cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  line-height: 1;
}
.tray-pill[aria-pressed="true"] {
  background: var(--selected, #18345d);
  border-color: var(--selected, #18345d);
  color: #fff;
}
.tray-pill:hover:not([aria-pressed="true"]) {
  background: var(--card, #f3f1ed);
  border-color: #aaa;
}

/* Tray action pills */
.tray-action-pills { gap: 6px; }
.tray-action-pill {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 8px;
  border: 1px solid var(--border, #d9d8d3);
  background: #fff;
  color: var(--sefaria-blue, #18345d);
  cursor: pointer;
  line-height: 1.3;
}
.tray-action-pill:disabled { opacity: 0.4; pointer-events: none; }
.tray-action-pill:hover:not(:disabled) { background: var(--card, #f3f1ed); }

/* Tray Open on Sefaria */
.tray-open-sefaria-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 7px 12px;
  border: 1px solid var(--border, #d9d8d3);
  border-radius: 8px;
  background: #fff;
  color: var(--sefaria-blue, #18345d);
  cursor: pointer;
}
.tray-open-sefaria-btn:disabled { opacity: 0.4; pointer-events: none; }
.tray-open-sefaria-btn:hover:not(:disabled) { background: var(--card, #f3f1ed); }
.tray-open-sefaria-btn .open-sefaria-icon { width: 15px; height: 15px; }

/* ── Footer Layout Settings button ──────────────────────────────── */
#open-layout-settings { font-size: 11px; white-space: nowrap; }

/* ── Restore old accordion version selector ── */
/* .versions-area removed from DOM; .versions-section accordion is shown by JS toggle */

/* ── Denser result rows ──────────────────────────────────────────── */
.result-item { padding: 7px 10px !important; }
.result-title { font-size: 12px; }
.result-meta, .result-snippet, .result-subtitle { font-size: 11px; }

/* =====================================================================
   9.3 — Tray preview copy button
   ===================================================================== */
.tray-preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tray-copy-btn {
  font-size: 14px;
  line-height: 1;
  background: none;
  border: none;
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 5px;
  color: var(--muted, #666);
  transition: background 0.1s, color 0.1s;
}
.tray-copy-btn:hover { background: var(--card, #f3f1ed); }
.tray-copy-btn.tray-copy-success { color: #2c8a3d; }

/* =====================================================================
   9.4 — Recent Sources in State A
   ===================================================================== */
.recent-sources-section { margin-bottom: 8px; }

.recent-sources-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.recent-sources-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted, #666);
}

.recent-sources-clear-btn {
  background: none;
  border: none;
  padding: 0 2px;
  font-size: 10px;
  color: var(--muted, #666);
  cursor: pointer;
  line-height: 1;
  opacity: 0.7;
}
.recent-sources-clear-btn:hover { opacity: 1; color: var(--danger, #c0392b); }

.recent-sources-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.recent-source-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 9px;
  border-radius: 8px;
  border: 1px solid var(--border, #d9d8d3);
  background: #fff;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.1s, border-color 0.1s;
  user-select: none;
}
.recent-source-item:hover {
  background: var(--card, #f3f1ed);
  border-color: #b0bec9;
}

.recent-source-icon { font-size: 12px; flex-shrink: 0; }

.recent-source-label {
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--sefaria-blue, #18345d);
  font-weight: 500;
}

.recent-source-category {
  font-size: 10px;
  color: var(--muted, #666);
  background: var(--card, #f3f1ed);
  border-radius: 3px;
  padding: 1px 4px;
  flex-shrink: 0;
}

.recent-source-remove-btn {
  background: none;
  border: none;
  padding: 0 2px;
  font-size: 10px;
  color: var(--muted, #666);
  cursor: pointer;
  line-height: 1;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.1s;
}
.recent-source-item:hover .recent-source-remove-btn { opacity: 0.6; }
.recent-source-remove-btn:hover { opacity: 1 !important; color: var(--danger, #c0392b); }

/* ── Suppress duplicate selected-result-summary (source card is canonical) ── */
.selected-result-summary { display: none !important; }

/* ── Results toggle row ──────────────────────────────────────────── */
.results-toggle-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

/* Open on Sefaria button on each result item */
.result-sefaria-btn {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  border: none;
  border-radius: 4px;
  background: transparent;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  opacity: 0;
  transition: opacity 0.1s;
}
.result-item:hover .result-sefaria-btn,
.result-item.is-nav-target .result-sefaria-btn { opacity: 0.7; }
.result-sefaria-btn:hover { opacity: 1 !important; background: var(--card, #f3f1ed); }
.result-sefaria-btn .open-sefaria-icon { width: 13px; height: 13px; }

/* ── Preview when a result is selected (State B) ─────────────────────────── */
/* The flex-fill-through-<details> chain is unreliable in Chrome 131+ because
 * <details> now uses a shadow DOM that breaks flex height propagation to
 * non-summary children. Restoring the sidebar's natural scroll and using an
 * explicit max-height on .suggestions is the correct, browser-stable approach.
 * See: versions-preview.html SCROLL CONTAINMENT note. */
.unified-sidebar.has-selected-result .preview-section .preview-panel .suggestions {
  max-height: 400px;
}

/* ── Tray display & layout section (real sidebar controls) ───────── */
.tray-display-layout-section .display-layout-section {
  margin-top: 4px;
}

/* ── Tray insertion format section (composition card) ────────────── */
.tray-insertion-format-section .cc-card {
  margin-top: 4px;
}

/* ── Language menu: fixed positioning; top/left set by JS click handler ─── */
#translation-language-menu {
  position: fixed !important;
  top: auto;
  right: auto;
  left: auto;
  z-index: 9999 !important;
  min-width: 180px;
  max-width: 240px;
}
</style>
