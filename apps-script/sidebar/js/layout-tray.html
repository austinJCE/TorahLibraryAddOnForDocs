<script>
// ── Layout Tray: open/close, sync ─────────────────────────────────────────

function openLayoutTray() {
  syncTrayFromCurrentState();
  $('#layout-tray').addClass('is-open');
  $('#layout-tray-close').focus();
}

function closeLayoutTray() {
  $('#layout-tray').removeClass('is-open');
  $('#open-layout-settings').focus();
}

function syncTrayFromCurrentState() {
  var canOpen = !!(appMode === 'texts' && hasResolvedReference && data && data.ref);
  $('#tray-open-on-sefaria').prop('disabled', !canOpen);
  $('.tray-sefaria-section').toggle(canOpen);
}

// ── Open tray ─────────────────────────────────────────────────────────────

$('#open-layout-settings').on('click', function () {
  openLayoutTray();
});

// ── Close tray: button, backdrop, Escape ──────────────────────────────────

$('#layout-tray-close').on('click', function () {
  closeLayoutTray();
});

$('#layout-tray-backdrop').on('click', function () {
  closeLayoutTray();
});

$(document).on('keydown', function (event) {
  if (event.key === 'Escape' && $('#layout-tray').hasClass('is-open')) {
    event.stopPropagation();
    closeLayoutTray();
  }
});

// ── Source card "Open on Sefaria" button ─────────────────────────────────

$('#source-card-sefaria').on('click', function () {
  var url = typeof buildSefariaOpenUrl === 'function' ? buildSefariaOpenUrl() : null;
  if (url) window.open(url, '_blank', 'noopener');
});

// ── Tray "Open on Sefaria" button ─────────────────────────────────────────

$('#tray-open-on-sefaria').on('click', function () {
  var url = typeof buildSefariaOpenUrl === 'function' ? buildSefariaOpenUrl() : null;
  if (url) window.open(url, '_blank', 'noopener');
});

// ── Results panel "Open on Sefaria" button ────────────────────────────────

$('#results-panel-sefaria').on('click', function () {
  var url = typeof buildSefariaOpenUrl === 'function' ? buildSefariaOpenUrl() : null;
  if (url) window.open(url, '_blank', 'noopener');
});

// ── Update source card + tray + results-panel Sefaria btns ───────────────

function updateSourceCardSefariaState() {
  var canOpen = !!(appMode === 'texts' && hasResolvedReference && data && data.ref);
  $('#source-card-sefaria').prop('disabled', !canOpen);
  $('#tray-open-on-sefaria').prop('disabled', !canOpen);
  $('.tray-sefaria-section').toggle(canOpen);
  $('#results-panel-sefaria').prop('disabled', !canOpen).toggle(!!selectedResultSummary && resultsCollapsed);
}

// =====================================================================
// 9.4 — Recent Sources in State A
// =====================================================================

var _RECENT_ICONS = {
  Tanakh: '&#x1F4D6;', Talmud: '&#x1F4DA;', Midrash: '&#x1F4DC;',
  Halakhah: '&#x2696;&#xFE0F;', Kabbalah: '✡️', Mishnah: '&#x1F4D8;',
  Dictionary: '&#x1F4D3;', voices: '&#x1F5E3;&#xFE0F;',
  _default: '&#x1F4C4;'
};

function renderRecentSources() {
  var $section = $('.recent-sources-section');
  if (!$section.length) return;
  if (typeof appMode === 'undefined' || appMode !== 'texts') { $section.hide(); return; }
  var hasSearch = !!(($('.input').val() || '').trim());
  if (hasSearch || selectedResultKey) { $section.hide(); return; }

  if (typeof sessionLibrary === 'undefined' || !sessionLibrary) { $section.hide(); return; }
  var pinned   = Array.isArray(sessionLibrary.pinned)   ? sessionLibrary.pinned   : [];
  var inserted = Array.isArray(sessionLibrary.inserted) ? sessionLibrary.inserted : [];
  var seen = {};
  var items = [];
  pinned.forEach(function (item) {
    if (!item || !item.ref || seen[item.ref]) return;
    seen[item.ref] = true;
    items.push({ data: item, listName: 'pinned' });
  });
  inserted.forEach(function (item) {
    if (!item || !item.ref || seen[item.ref]) return;
    seen[item.ref] = true;
    items.push({ data: item, listName: 'inserted' });
  });
  items = items.slice(0, 3);

  if (!items.length) { $section.hide(); return; }

  var html = items.map(function (entry) {
    var item     = entry.data;
    var listName = entry.listName;
    var label    = item.label || item.ref || '';
    var category = item.category || '';
    var icon     = _RECENT_ICONS[category] || _RECENT_ICONS._default;
    return '<li class="recent-source-item" role="button" tabindex="0"' +
      ' data-ref="'    + escapeHTML(item.ref || '') + '"' +
      ' data-list="'   + escapeHTML(listName) + '"' +
      ' data-label="'  + escapeHTML(label) + '">' +
      '<span class="recent-source-icon" aria-hidden="true">' + icon + '</span>' +
      '<span class="recent-source-label">' + escapeHTML(label) + '</span>' +
      (category ? '<span class="recent-source-category">' + escapeHTML(category) + '</span>' : '') +
      '<button type="button" class="recent-source-remove-btn" aria-label="Remove ' + escapeHTML(label) + '"' +
      ' data-ref="' + escapeHTML(item.ref || '') + '" data-list="' + escapeHTML(listName) + '">&#x2715;</button>' +
      '</li>';
  }).join('');

  $('.recent-sources-list').html(html);
  $section.show();
}

$(document).on('click', '.recent-sources-clear-btn', function (event) {
  event.stopPropagation();
  clearRecentItems();
  renderRecentSources();
});

$(document).on('click', '.recent-source-remove-btn', function (event) {
  event.preventDefault();
  event.stopPropagation();
  removeSessionEntry($(this).attr('data-list'), $(this).attr('data-ref'));
  renderRecentSources();
});

$(document).on('click keydown', '.recent-source-item', function (event) {
  if (event.type === 'keydown' && event.key !== 'Enter' && event.key !== ' ') return;
  if ($(event.target).closest('.recent-source-remove-btn').length) return;
  event.preventDefault();
  var ref   = $(this).attr('data-ref');
  var label = $(this).attr('data-label') || ref;
  if (!ref) return;
  $('.input').val(ref);
  $('.recent-sources-section').hide();
  runUnifiedQuery();
  // auto-select matching result once query completes
  setTimeout(function () {
    var match = queryState.libraryMatches.concat(queryState.searchResults)
      .find(function (item) { return item && item.ref === ref; });
    if (match && match.key) {
      selectedResultKey = match.key;
      selectedResultSummary = { label: match.label || match.ref || label, subtitle: match.subtitle || '' };
      resultsCollapsed = true;
      renderResults();
      resolveSelectedResult(match.ref, match.label || match.ref);
    }
  }, 280);
});

// =====================================================================
// 9.5 — Keyboard shortcut: Ctrl/⌘+Enter to insert
// =====================================================================

$(document).on('keydown.insertShortcut', function (event) {
  if (!(event.ctrlKey || event.metaKey) || event.key !== 'Enter') return;
  if ($('#layout-tray').hasClass('is-open')) return;
  if ($(event.target).is('input, textarea, select, [contenteditable]')) return;
  var $btn = $('#insert-source');
  if (!$btn.prop('disabled')) {
    event.preventDefault();
    $btn.trigger('click');
  }
});
</script>
