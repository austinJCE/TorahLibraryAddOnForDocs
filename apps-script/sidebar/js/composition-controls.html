<script>
// Sidebar adapter for the shared composition card component.
// Bridges sidebar hidden-checkbox state and saveSidebarPreference() persistence
// to the generic composition card controller.

function _sidebarCompositionGetState() {
  var vowelsOn = $('.wants-vowels').is(':checked');
  var cantOn = $('.wants-cantillation').is(':checked');
  var transliterationOn = $('.include-transliteration').is(':checked');
  var scheme = transliterationOn ? getSidebarTransliterationScheme() : 'none';
  return {
    vowelsOn: vowelsOn,
    cantillationOn: cantOn,
    transliterationOn: transliterationOn,
    scheme: scheme,
    linkOn: $('.insert-sefaria-link').is(':checked'),
    linesOn: $('.wants-pesukim').is(':checked'),
    detailsOn: $('.include-translation-source-info').is(':checked')
  };
}

function _sidebarCompositionOnToggle(key) {
  if (key === 'vowels') {
    var $el = $('.wants-vowels');
    $el.prop('checked', !$el.is(':checked'));
    saveSidebarPreference({
      nekudot: $el.is(':checked'),
      teamim: $('.wants-cantillation').is(':checked')
    }, function () {
      updateCompositionCard();
      if (hasResolvedReference && data && data.ref) refreshSelectedResult();
    });
  } else if (key === 'cantillation') {
    var $el = $('.wants-cantillation');
    $el.prop('checked', !$el.is(':checked'));
    saveSidebarPreference({
      nekudot: $('.wants-vowels').is(':checked'),
      teamim: $el.is(':checked')
    }, function () {
      updateCompositionCard();
      if (hasResolvedReference && data && data.ref) refreshSelectedResult();
    });
  } else if (key === 'translit') {
    var $el = $('.include-transliteration');
    $el.prop('checked', !$el.is(':checked'));
    saveSidebarPreference({
      include_transliteration_default: $el.is(':checked')
    }, function () {
      updateCompositionCard();
      if (hasResolvedReference && data && data.ref) refreshSelectedResult();
    });
  } else if (key === 'link') {
    var $el = $('.insert-sefaria-link');
    $el.prop('checked', !$el.is(':checked'));
    saveSidebarPreference({
      insert_sefaria_link_default: $el.is(':checked')
    }, function () {
      updateCompositionCard();
    });
  } else if (key === 'lines') {
    var $el = $('.wants-pesukim');
    $el.prop('checked', !$el.is(':checked'));
    saveSidebarPreference({
      show_line_markers_default: $el.is(':checked')
    });
  } else if (key === 'details') {
    var $el = $('.include-translation-source-info');
    $el.prop('checked', !$el.is(':checked'));
    saveSidebarPreference({
      include_translation_source_info: $el.is(':checked')
    });
  }
  if (typeof refreshSidebarLivePreview === 'function') refreshSidebarLivePreview();
}

function _sidebarCompositionOnSchemeSelect(value) {
  if (value === 'none') {
    $('.include-transliteration').prop('checked', false);
    effectivePreferences.transliteration_scheme = getSidebarTransliterationScheme();
    saveSidebarPreference({ include_transliteration_default: false }, function () {
      effectivePreferences.transliteration_scheme = getSidebarTransliterationScheme();
      updateCompositionCard();
      if (hasResolvedReference && data && data.ref) refreshSelectedResult();
    });
  } else {
    $('.include-transliteration').prop('checked', true);
    effectivePreferences.transliteration_scheme = value;
    saveSidebarPreference({ include_transliteration_default: true, transliteration_scheme: value }, function () {
      effectivePreferences.transliteration_scheme = value;
      updateCompositionCard();
      if (hasResolvedReference && data && data.ref) refreshSelectedResult();
    });
  }
  if (typeof refreshSidebarLivePreview === 'function') refreshSidebarLivePreview();
}

// Thin wrappers so sidebar_bootstrap.html and other callers don't need to change.
function updateSidebarCompositionCard() {
  updateCompositionCard();
}

function refreshCompositionAndPreview() {
  updateCompositionCard();
  if (typeof refreshSidebarLivePreview === 'function') refreshSidebarLivePreview();
}

function bindSidebarCompositionCard() {
  initCompositionCard({
    containerId: 'composition-card-container',
    getState: _sidebarCompositionGetState,
    onToggle: _sidebarCompositionOnToggle,
    onSchemeSelect: _sidebarCompositionOnSchemeSelect
  });
}
</script>
