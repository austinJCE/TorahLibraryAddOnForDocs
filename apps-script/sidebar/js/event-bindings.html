<script>
// Composition card toggle persistence is now handled by the shared composition
// card adapter in sidebar_composition_controls.html. The change handlers for
// .wants-vowels, .wants-cantillation, .include-transliteration, .insert-sefaria-link,
// .wants-pesukim, and .include-translation-source-info have been removed.

$('#run-sefaria').off('click').on('click', runUnifiedQuery);

// Debounced unified search replaces legacy autocomplete dropdown.
$('.input').on('input', function () {
  var value = $(this).val() || '';
  if (searchDebounceHandle) clearTimeout(searchDebounceHandle);
  searchDebounceHandle = setTimeout(function () {
    if ((value || '').trim().length >= 2) runUnifiedQuery();
  }, 320);
});

$('.input').on('keydown', function (event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    if (keyboardResultIndex >= 0 && $('.result-item').length) {
      $('.result-item').eq(keyboardResultIndex).trigger('click');
      return;
    }
    runUnifiedQuery();
  }
  if (event.key === 'ArrowDown') {
    event.preventDefault();
    focusResultByIndex(keyboardResultIndex + 1);
  }
  if (event.key === 'ArrowUp') {
    event.preventDefault();
    focusResultByIndex(keyboardResultIndex <= 0 ? 0 : keyboardResultIndex - 1);
  }
});

$(document).on('keydown', function (event) {
  if (event.key === '/' && !$(event.target).is('input, textarea, select')) {
    event.preventDefault();
    $('.input').focus();
  }
});

$('.wants-relevance, .search-sort-select, .translation-only-filter').on('change', function () {
  updateTranslationLanguageVisibility();
  saveLastUsedSearchSettings();
  if (getAllRawResults().length) {
    reprocessAndRenderResults();
  } else if (($('.input').val() || '').trim()) {
    runUnifiedQuery();
  }
});

$('.results-panel').on('click keydown', '.result-item', function (event) {
  if (event.type === 'keydown' && event.key !== 'Enter' && event.key !== ' ') return;
  event.preventDefault();

  var key = $(this).attr('data-key');
  var item = queryState.libraryMatches.concat(queryState.searchResults).find(function (result) { return result.key === key; });
  if (!item) return;

  selectedResultKey = item.key;
  selectedResultSummary = { label: item.label || item.ref, subtitle: item.subtitle || '' };
  resultsCollapsed = true;
  $('.result-item').removeClass('selected').attr('aria-pressed', 'false');
  $(this).addClass('selected').attr('aria-pressed', 'true');
  updateResultsVisibility();
  resolveSelectedResult(item.ref, item.label || item.ref);
});

$('.results-panel').on('click', '.result-group-remove', function (event) {

  event.stopPropagation();

});

$('.results-panel').on('click', '.result-filter-chip', function (event) {

$('.results-toggle-button').on('click', function () {

function bindDropdownToggle(selector) {
  var dropdown = $(selector);
  if (!dropdown.length) return;
  dropdown.find('.multi-select-button').on('click', function (event) {
    event.preventDefault();
    event.stopPropagation();
    $('.multi-select-dropdown').not(dropdown).removeClass('open').find('.multi-select-button').attr('aria-expanded', 'false');
    var willOpen = !dropdown.hasClass('open');
    dropdown.toggleClass('open', willOpen);
    dropdown.find('.multi-select-button').attr('aria-expanded', willOpen ? 'true' : 'false');
  });
}

$('.translation-language-toggle').on('click', function (event) {

  var $menu = $('#translation-language-menu');

  $dropdown.toggleClass('open', willOpen);
  $menu.toggleClass('hidden', !willOpen);
  $(this).attr('aria-expanded', willOpen ? 'true' : 'false');
});

// ── Experimental controls — chip groups, segmented controls, stepper ──────────

// Read selected data-value from a chip/segmented radiogroup
function expGetGroupValue(fieldAttr) {
  return $('[data-field="' + fieldAttr + '"] [aria-checked="true"]').attr('data-value') || '';
}

// Select a chip or segment by data-value within its group
function expSetGroupValue(fieldAttr, value) {
  var $group = $('[data-field="' + fieldAttr + '"]');
  $group.children('[aria-checked]').attr('aria-checked', 'false');
  var $target = $group.children('[data-value="' + value + '"]');
  if ($target.length) $target.attr('aria-checked', 'true');
}

// Set busy state on an exp-card
function expSetBusy($card, isBusy, loadingLabel, defaultLabel) {
  $card.toggleClass('exp-busy', isBusy);
  var $btn = $card.find('.exp-action-btn');
  $btn.prop('disabled', isBusy);
  if (isBusy) {
    $btn.html('<span class="exp-spinner" aria-hidden="true"></span>' + loadingLabel);
  } else {
    $btn.text(defaultLabel);
  }
}

// Set status text on an exp-card
function expSetStatus($card, message, kind) {
  var $s = $card.find('.exp-status');
  $s.text(message).removeClass('exp-error exp-success');
  if (kind) $s.addClass(kind);
}

// Set status HTML on an exp-card (for rich content like links)
function expSetStatusHTML($card, html, kind) {
  var $s = $card.find('.exp-status');
  $s.html(html).removeClass('exp-error exp-success');
  if (kind) $s.addClass(kind);
}

// Chip group: click selects one chip, arrow keys navigate
$(document).on('click', '.exp-chip-group .exp-chip', function () {
  $(this).closest('.exp-chip-group').children('.exp-chip').attr('aria-checked', 'false');
  $(this).attr('aria-checked', 'true');
});
$(document).on('keydown', '.exp-chip-group .exp-chip', function (e) {
  if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft' &&
      e.key !== 'ArrowDown'  && e.key !== 'ArrowUp') return;
  e.preventDefault();
  var $chips = $(this).closest('.exp-chip-group').children('.exp-chip');
  var idx = $chips.index(this);
  var next = (e.key === 'ArrowRight' || e.key === 'ArrowDown')
    ? (idx + 1) % $chips.length
    : (idx - 1 + $chips.length) % $chips.length;
  $chips.eq(next).trigger('click').trigger('focus');
});

// Segmented control: same radio pattern
$(document).on('click', '.exp-segmented .exp-seg-btn', function () {
  $(this).closest('.exp-segmented').children('.exp-seg-btn').attr('aria-checked', 'false');
  $(this).attr('aria-checked', 'true');
});

// Stepper: decrement
$(document).on('click', '#sm-count-dec', function () {
  var $val = $('#sm-inline-count');
  var v = parseInt($val.val(), 10) || 3;
  if (v > 1) {
    $val.val(v - 1);
    $('#sm-count-dec').prop('disabled', v - 1 <= 1);
    $('#sm-count-inc').prop('disabled', false);
  }
});

// Stepper: increment
$(document).on('click', '#sm-count-inc', function () {
  var $val = $('#sm-inline-count');
  var v = parseInt($val.val(), 10) || 3;
  if (v < 10) {
    $val.val(v + 1);
    $('#sm-count-inc').prop('disabled', v + 1 >= 10);
    $('#sm-count-dec').prop('disabled', false);
  }
});

// ── Surprise Me ───────────────────────────────────────────────────────────────

$('#sm-inline-launch').off('click').on('click', function () {
  var $card = $('#exp-card-surprise');
  var term  = ($('#sm-inline-term').val() || '').trim();
  var count = Math.max(1, Math.min(10, parseInt($('#sm-inline-count').val(), 10) || 3));
  var payload = {
    term:     term || null,
    count:    count,
    corpuses: ['Tanakh', 'Mishnah', 'Talmud', 'Midrash', 'Halakhah'],
    sortMode: 'relevance'
  };

  expSetBusy($card, true, 'Searching…', 'Discover Sources');
  expSetStatus($card,
    term ? 'Finding sources — almost there.'
         : 'No topic? We’ll pick one. Finding sources…', '');

  google.script.run
    .withSuccessHandler(function (result) {
      expSetBusy($card, false, '', 'Discover Sources');
      if (!result || result.success === false) {
        expSetStatus($card,
          (result && result.message) ? result.message
            : 'No matching sources found. Try a different topic or leave it blank.',
          'exp-error');
        return;
      }
      var msg = '✓ ' + count + ' source' + (count === 1 ? '' : 's') + ' inserted at your cursor.';
      if (!term && result.seedWord) msg += ' We used the word ‘' + result.seedWord + '’.';
      expSetStatus($card, msg, 'exp-success');
      setTimeout(function () { expSetStatus($card, '', ''); }, 5000);
    })
    .withFailureHandler(function (err) {
      expSetBusy($card, false, '', 'Discover Sources');
      expSetStatus($card,
        (err && err.message) ? err.message : 'Something went wrong. Try again.',
        'exp-error');
    })
    .insertSurpriseMe(payload);
});

// ── AI Shiur ──────────────────────────────────────────────────────────────────

$('#ai-inline-generate').off('click').on('click', function () {
  var $card  = $('#exp-card-shiur');
  var topic  = ($('#ai-inline-topic').val() || '').trim();

  // Validate required field
  if (!topic) {
    var $input = $('#ai-inline-topic');
    var $err   = $('#ai-topic-error');
    $input.addClass('exp-input-error').trigger('focus');
    $err.text('A topic is required to generate a shiur.').addClass('exp-visible').show();
    $input.one('input.clearErr', function () {
      $input.removeClass('exp-input-error');
      $err.removeClass('exp-visible').hide();
    });
    return;
  }

  // Resolve language balance → include flags
  var lang = expGetGroupValue('ai-language') || 'balanced';
  var includeOriginal    = (lang !== 'en');
  var includeTranslation = (lang !== 'he');

  var payload = {
    provider:                'default',
    model:                   '',
    keyStrategy:             'auto',
    apiKey:                  '',
    topic:                   topic,
    contextMode:             'topic',
    audience:                expGetGroupValue('ai-audience') || 'Adult learners',
    duration:                parseInt(expGetGroupValue('ai-length'), 10) || 45,
    lessonStyle:             expGetGroupValue('ai-style')    || 'Interactive shiur',
    additionalInstructions:  '',
    includeOriginal:         includeOriginal,
    includeTranslation:      includeTranslation,
    includeTransliteration:  false,
    includeEducatorNotes:    true,
    includeDiscussionPrompts: $('#ai-inline-discussion').is(':checked')
  };

  expSetBusy($card, true, 'Generating…', 'Generate & Insert');
  expSetStatus($card, 'This usually takes 20–40 seconds. Your draft will appear at the cursor.', '');

  google.script.run
    .withSuccessHandler(function (result) {
      expSetBusy($card, false, '', 'Generate & Insert');
      if (!result || result.success === false) {
        expSetStatus($card,
          (result && result.message) ? result.message
            : 'No content was generated. Try a different topic or style.',
          'exp-error');
        return;
      }
      var label = (result && result.title) ? '“' + result.title + '”' : 'your shiur';
      expSetStatus($card, '✓ Draft inserted — ' + label + '. Scroll down to review.', 'exp-success');
      setTimeout(function () { expSetStatus($card, '', ''); }, 6000);
    })
    .withFailureHandler(function (err) {
      expSetBusy($card, false, '', 'Generate & Insert');
      var errorMsg = (err && err.message) ? err.message : 'Something went wrong. Check your connection and try again.';

      // Special handling for invalid request signature error
      if (errorMsg && errorMsg.indexOf('Invalid request signature') >= 0) {
        var htmlMsg = 'Invalid request signature. <a href="#" class="exp-error-link" data-action="open-ai-prefs">Open <span aria-hidden="true">⚙️</span> Preferences</a> to enable AI Shiur.';
        expSetStatusHTML($card, htmlMsg, 'exp-error');

        // Attach click handler to the link
        $card.find('.exp-error-link').one('click', function (e) {
          e.preventDefault();
          openPreferencesWithHint('experimental-features');
        });
      } else {
        expSetStatus($card, errorMsg, 'exp-error');
      }
    })
    .generateAiLessonDraft(payload);
});

function openSessionLibraryModal() {

  $('#session-library-modal').removeAttr('hidden');

function closeSessionLibraryModal() {

}

$(document).on('click', '#session-library-modal', function (event) {
  if ($(event.target).is('#session-library-modal')) closeSessionLibraryModal();
});

// Escape key closes modal
$(document).on('keydown', function (event) {
  if (event.key === 'Escape' && !$('#session-library-modal').attr('hidden')) {
    event.stopPropagation();
    closeSessionLibraryModal();
  }
  // Ctrl/Cmd + Shift + L — keyboard shortcut to open/close session library
  if ((event.ctrlKey || event.metaKey) && event.shiftKey && (event.key === 'L' || event.key === 'l')) {
    event.preventDefault();
    if ($('#session-library-modal').attr('hidden') !== undefined &&
        $('#session-library-modal').attr('hidden') !== false) {
      openSessionLibraryModal();
    } else {
      closeSessionLibraryModal();
    }
  }
});

// Click/Enter on item row → search for it
$(document).on('click keydown', '.sl-item', function (event) {
  if (event.type === 'keydown' && event.key !== 'Enter' && event.key !== ' ') return;
  if ($(event.target).closest('.sl-item-pin-btn, .sl-item-remove-btn').length) return;
  event.preventDefault();
  var ref = $(this).attr('data-ref');
  if (!ref) return;
  $('.input').val(ref);
  closeSessionLibraryModal();
  runUnifiedQuery();
  setTimeout(function () {
    var match = queryState.libraryMatches.concat(queryState.searchResults)
      .find(function (item) { return item && item.ref === ref; });
    if (match && match.key) {
      selectedResultKey = match.key;
      selectedResultSummary = { label: match.ref || match.label, subtitle: match.subtitle || '' };
      updateResultsVisibility();
      resolveSelectedResult(match.ref, match.ref || match.label);
    }
  }, 250);
});

$(document).on('click', '.sl-item-remove-btn', function (event) {
  event.preventDefault();
  event.stopPropagation();
  removeSessionEntry($(this).attr('data-list'), $(this).attr('data-ref'));
});

// Pin / unpin button
$(document).on('click', '.sl-item-pin-btn', function (event) {
  event.preventDefault();
  event.stopPropagation();
  var ref      = $(this).attr('data-ref');
  var listName = $(this).attr('data-list');
  if (!ref) return;

  if (listName === 'pinned') {
    // Unpin → move to inserted
    var pinnedEntry = (sessionLibrary.pinned || []).find(function (it) { return it && it.ref === ref; });
    sessionLibrary.pinned = (sessionLibrary.pinned || []).filter(function (it) { return it && it.ref !== ref; });
    if (pinnedEntry) {
      var ins = (sessionLibrary.inserted || []).filter(function (it) { return it && it.ref !== ref; });
      ins.unshift(pinnedEntry);
      sessionLibrary.inserted = ins.slice(0, 12);
    }
  } else {
    // Pin → move to pinned
    var insEntry = (sessionLibrary.inserted || []).find(function (it) { return it && it.ref === ref; });
    if (!insEntry) insEntry = buildSessionEntry(ref, ref, 'Other');
    sessionLibrary.inserted = (sessionLibrary.inserted || []).filter(function (it) { return it && it.ref !== ref; });
    var pins = (sessionLibrary.pinned || []).filter(function (it) { return it && it.ref !== ref; });
    pins.unshift(insEntry);
    sessionLibrary.pinned = pins.slice(0, 12);
  }
  saveSessionLibrary();
  renderSessionLibrary();
});

(function () {
  // Track cursor position when search input loses focus so character
  // buttons can insert at the correct position after re-focusing.
  var savedSelStart = 0;
  var savedSelEnd   = 0;

  function getInput() {
    return document.querySelector('.search-field-wrapper .input') ||
           document.querySelector('.input');
  }

  // Save cursor position on every blur of the search input.
  $(document).on('blur', '.input', function () {
    savedSelStart = this.selectionStart || 0;
    savedSelEnd   = this.selectionEnd   || 0;
  });

  function openHebrewTray() {
    $('#hebrew-keyboard-tray').removeAttr('hidden');
    $('#hebrew-keyboard-trigger')
      .attr('aria-expanded', 'true')
      .attr('aria-label', 'Close Hebrew keyboard')
      .addClass('is-open');
  }

  function closeHebrewTray() {
    $('#hebrew-keyboard-tray').attr('hidden', true);
    $('#hebrew-keyboard-trigger')
      .attr('aria-expanded', 'false')
      .attr('aria-label', 'Open Hebrew keyboard')
      .removeClass('is-open');
  }

  function isHebrewTrayOpen() {
    return !$('#hebrew-keyboard-tray').is('[hidden]');
  }

  // Insert a character at the saved/current cursor position.
  function insertAtCursor(char) {
    var input = getInput();
    if (!input) return;

    input.focus();

    var start = (typeof input.selectionStart === 'number') ? input.selectionStart : savedSelStart;
    var end   = (typeof input.selectionEnd   === 'number') ? input.selectionEnd   : savedSelEnd;
    var val   = input.value;

    input.value = val.slice(0, start) + char + val.slice(end);

    var newPos = start + char.length;
    input.setSelectionRange(newPos, newPos);
    savedSelStart = newPos;
    savedSelEnd   = newPos;

    // Notify jQuery/debounced-search listeners.
    $(input).trigger('input');
  }

  // Delete one character before the cursor (or delete the selection).
  function deleteAtCursor() {
    var input = getInput();
    if (!input) return;

    input.focus();

    var start = (typeof input.selectionStart === 'number') ? input.selectionStart : savedSelStart;
    var end   = (typeof input.selectionEnd   === 'number') ? input.selectionEnd   : savedSelEnd;
    var val   = input.value;

    if (start !== end) {
      input.value = val.slice(0, start) + val.slice(end);
      input.setSelectionRange(start, start);
      savedSelStart = start;
      savedSelEnd   = start;
    } else if (start > 0) {
      input.value = val.slice(0, start - 1) + val.slice(start);
      input.setSelectionRange(start - 1, start - 1);
      savedSelStart = start - 1;
      savedSelEnd   = start - 1;
    }

    $(input).trigger('input');
  }

  // Toggle tray on ⌨︎ trigger click.
  $(document).on('click', '#hebrew-keyboard-trigger', function (event) {
    event.stopPropagation();
    if (isHebrewTrayOpen()) {
      closeHebrewTray();
    } else {
      openHebrewTray();
    }
  });

  // Insert character when a .heb-key[data-char] button is clicked.
  $(document).on('click', '#hebrew-keyboard-tray .heb-key[data-char]', function (event) {
    event.preventDefault();
    insertAtCursor($(this).attr('data-char'));
  });

  // ⌫ delete button.
  $(document).on('click', '#heb-delete', function (event) {
    event.preventDefault();
    deleteAtCursor();
  });

  // Done button — close tray, return focus to search input.
  $(document).on('click', '#heb-done', function (event) {
    event.preventDefault();
    closeHebrewTray();
    var input = getInput();
    if (input) input.focus();
  });

  // Click-away dismissal — close when clicking outside the tray and search field.
  $(document).on('click', function (event) {
    if (!isHebrewTrayOpen()) return;
    if (!$(event.target).closest('#hebrew-keyboard-tray, #hebrew-keyboard-trigger, .search-field-wrapper').length) {
      closeHebrewTray();
    }
  });

  // Escape key — close the tray when it is open.
  // The session-library Escape handler (above) uses stopPropagation, not
  // stopImmediatePropagation, so this handler still runs if both are open.
  $(document).on('keydown', function (event) {
    if (event.key === 'Escape' && isHebrewTrayOpen()) {
      closeHebrewTray();
      var input = getInput();
      if (input) input.focus();
    }
  });
}());
</script>
