<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        --bg: #f5f5f3;
        --panel: #ffffff;
        --border: #d4d0ca;
        --text: #222222;
        --muted: #666666;
        --selected: #1f3b68;
        --selected-soft: #eef3fb;
        --radius: 12px;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }

      main {
        padding: 20px;
        box-sizing: border-box;
      }

      .scope-badge {
        display: inline-block;
        background: var(--selected-soft);
        color: var(--selected);
        border: 1px solid #c5d4ee;
        border-radius: 6px;
        padding: 3px 10px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 16px;
      }

      .stats-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        margin-bottom: 16px;
      }

      .stats-table th,
      .stats-table td {
        padding: 11px 16px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      .stats-table tr:last-child th,
      .stats-table tr:last-child td {
        border-bottom: none;
      }

      .stats-table th {
        color: var(--muted);
        font-weight: 500;
        width: 55%;
      }

      .stats-table td {
        font-weight: 700;
        font-size: 15px;
        color: var(--selected);
        text-align: right;
      }

      .stats-table tr.total-row th,
      .stats-table tr.total-row td {
        background: var(--selected-soft);
        border-top: 2px solid #c5d4ee;
      }

      .breakdown-header {
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0 0 8px;
      }

      .word-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        margin-bottom: 16px;
        font-size: 13px;
      }

      .word-table th {
        background: var(--selected-soft);
        color: var(--selected);
        font-weight: 600;
        padding: 7px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      .word-table th.rtl-col {
        text-align: right;
      }

      .word-table td {
        padding: 6px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
      }

      .word-table tr:last-child td {
        border-bottom: none;
      }

      .word-col {
        font-family: "Noto Sans Hebrew", "David", "Times New Roman", serif;
        font-size: 15px;
        direction: rtl;
        text-align: right;
      }

      .val-col {
        font-weight: 600;
        color: var(--selected);
        text-align: right;
      }

      .empty-state {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        text-align: center;
        color: var(--muted);
        margin-bottom: 16px;
      }

      .button-row {
        display: flex;
        justify-content: flex-end;
        margin-top: 4px;
      }

      button {
        border: 1px solid var(--selected);
        border-radius: 8px;
        background: var(--selected);
        color: #fff;
        padding: 9px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #162c50;
      }
    </style>
  </head>
  <body>
    <main>
      <script>
        const STATS = <?= statsJson ?>;
      </script>

      <div id="scope-badge" class="scope-badge"></div>

      <table class="stats-table">
        <tbody>
          <tr>
            <th>Hebrew letters</th>
            <td id="letter-count"></td>
          </tr>
          <tr>
            <th>Hebrew words</th>
            <td id="word-count"></td>
          </tr>
          <tr class="total-row">
            <th>Gematriya sum</th>
            <td id="total-value"></td>
          </tr>
        </tbody>
      </table>

      <div id="breakdown-section"></div>

      <div class="button-row">
        <button onclick="google.script.host.close()">Close</button>
      </div>
    </main>

    <script>
      (function () {
        document.getElementById('scope-badge').textContent =
          STATS.hasSelection ? 'Selected text' : 'Entire document';
        document.getElementById('letter-count').textContent =
          STATS.letterCount.toLocaleString();
        document.getElementById('word-count').textContent =
          STATS.wordCount.toLocaleString();
        document.getElementById('total-value').textContent =
          STATS.totalValue.toLocaleString();

        const section = document.getElementById('breakdown-section');

        if (STATS.wordCount === 0) {
          section.innerHTML =
            '<div class="empty-state">No Hebrew letters found in the ' +
            (STATS.hasSelection ? 'selection' : 'document') + '.</div>';
          return;
        }

        if (STATS.words && STATS.words.length > 0) {
          const header = document.createElement('p');
          header.className = 'breakdown-header';
          header.textContent = 'Word breakdown';
          section.appendChild(header);

          const table = document.createElement('table');
          table.className = 'word-table';
          table.innerHTML =
            '<thead><tr>' +
            '<th class="rtl-col">Word</th>' +
            '<th style="text-align:right">Gematriya</th>' +
            '</tr></thead>';

          const tbody = document.createElement('tbody');
          STATS.words.forEach(function (w) {
            const tr = document.createElement('tr');
            tr.innerHTML =
              '<td class="word-col">' + w.word + '</td>' +
              '<td class="val-col">' + w.value.toLocaleString() + '</td>';
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          section.appendChild(table);
        }
      })();
    </script>
  </body>
</html>
