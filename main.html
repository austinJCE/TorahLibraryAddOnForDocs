<!DOCTYPE html>
  <head>
    <base target="_top">

    <!--STYLESHEETS-->
    <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons.css">
    <link rel="stylesheet" href="//ajax.googleapis.com/ajax/libs/jqueryui/1.9.1/themes/smoothness/jquery-ui.css" />

    <style>
    /* note: no need to really make the layout responsive any more than vw and vh usage, due to the constraints of Google Add-ons.*/
    :root {
      --bg: #f5f5f3;
      --panel: #ffffff;
      --card: #e9e7e3;
      --border: #d4d0ca;
      --text: #222222;
      --muted: #6b6b6b;
      --selected: #1f3b68;
      --selected-hover: #29497d;
      --selected-soft: #c9d5e8;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .ui-autocomplete {
      width: 240px !important;
      overflow-y: scroll;
    }

    [class=hide] > img {
      position: absolute;
      top: 48%; 
      left: 48%;
    }

    main {
      margin: 0;
      min-height: 100vh;
      overflow:auto;
      padding: 12px;
      box-sizing: border-box;
    }

    aside {
      display: none; 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      color: black; 
      background: white; 
      z-index: 5;
    }

    .reference-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #run-sefaria,
    #insert-source {
      border: 0;
      border-radius: 10px;
      background: var(--selected);
      color: #fff;
      padding: 10px 12px;
      min-height: 42px;
      font-size: 13px;
      font-weight: 600;
      width: auto !important;
      margin: 0;
      align-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #run-sefaria:disabled,
    #insert-source:disabled {
      opacity: 0.5;
    }

    #run-sefaria:not(:disabled):hover,
    #insert-source:not(:disabled):hover {
      background: var(--selected-hover);
    }

    #insert-source {
      margin-top: 12px;
      width: 100%;
    }

    /* extremely ungainly usage of !important, need to fix at some point */
    .input {
      margin: 0 !important;
      display: block !important;
      width: 100% !important;
      height: auto !important;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .reference-input-shell {
      flex: 1;
      min-width: 0;
    }

    .section-label {
      margin: 14px 0 8px;
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    .mode-card-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mode-card {
      border: 1px solid transparent;
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
      padding: 12px 14px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      cursor: pointer;
      font-size: 14px;
    }

    .mode-card > span:first-child {
      flex: 1;
      text-align: left;
      margin-right: 10px;
    }

    .mode-card:hover {
      border-color: var(--border);
    }

    .mode-card.selected {
      background: var(--selected);
      color: #fff;
    }

    .mode-card:focus-visible,
    .layout-option:focus-visible {
      outline: 2px solid var(--selected);
      outline-offset: 2px;
    }

    .mode-card-indicator {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid currentColor;
      box-sizing: border-box;
    }

    .mode-card.selected .mode-card-indicator {
      background: currentColor;
      box-shadow: inset 0 0 0 3px var(--selected);
    }

    .layout-option-group {
      display: flex;
      gap: 8px;
    }

    .layout-option {
      width: 50px;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .layout-option.selected {
      border-color: var(--selected);
      box-shadow: inset 0 0 0 1px var(--selected);
      background: var(--selected-soft);
    }

    .layout-icon {
      position: relative;
      width: 26px;
      height: 20px;
      border: 1px solid #bcb8b1;
      border-radius: 4px;
      background: #f7f7f5;
    }

    .layout-icon::before,
    .layout-icon::after {
      content: '';
      position: absolute;
      background: #b3b0aa;
    }

    .layout-icon-top::before {
      height: 7px;
      width: 100%;
      top: 1px;
      left: 0;
      background: #7f97bb;
    }

    .layout-icon-top::after {
      height: 7px;
      width: 100%;
      left: 0;
      bottom: 1px;
    }

    .layout-icon-left::before,
    .layout-icon-right::before {
      top: 0;
      width: 11px;
      height: 100%;
      left: 0;
    }

    .layout-icon-left::after,
    .layout-icon-right::after {
      top: 0;
      width: 11px;
      height: 100%;
      right: 0;
    }

    .layout-icon-left::before {
      background: #7f97bb;
    }

    .layout-icon-right::after {
      background: #7f97bb;
    }

    .options-panel,
    .versions-panel,
    .preview-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .toggle-row + .toggle-row {
      margin-top: 10px;
    }

    .helper-text {
      margin: 4px 0 0;
      font-size: 11px;
      color: var(--muted);
    }

    .version-control + .version-control {
      margin-top: 10px;
    }

    .version-label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      font-weight: 600;
      color: #555;
    }

    .versioning-select,
    .translation-combobox {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 8px 10px;
      font-size: 14px;
      min-height: 38px;
      line-height: 1.3;
    }


    .suggestions {
      margin: 0;
      min-height: 150px;
      max-height: 46vh;
      overflow: auto;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
    }

    .results-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px;
      margin-top: 12px;
    }

    .result-group-label {
      margin: 0 0 6px;
      font-size: 12px;
      color: #555;
      font-weight: 600;
    }

    .result-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .result-list + .result-group-label {
      margin-top: 10px;
    }

    .result-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 8px 10px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      margin-bottom: 6px;
    }

    .result-item.selected {
      border-color: var(--selected);
      background: var(--selected-soft);
      box-shadow: inset 0 0 0 1px var(--selected);
    }

    .result-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .result-subtitle,
    .result-snippet {
      font-size: 12px;
      color: var(--muted);
    }

    .preview-table {
      width: 100%;
      border-collapse: collapse;
    }

    .preview-table td {
      vertical-align: top;
      width: 50%;
      padding: 0 6px 8px;
    }

    .preview-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .preview-he {
      direction: rtl;
    }

    .branding-text {
      padding-top: 0.5em;
    }

    .translation-combobox {
      width: 100%;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    .ui-autocomplete-category {
      font-weight: bold;
      font-size: 11px;
      padding: 4px 8px;
      color: #555;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    </style>

    <!--SCRIPTS-->
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script src="//ajax.googleapis.com/ajax/libs/jqueryui/1.9.1/jquery-ui.min.js"></script>

  </head>
  <body>
    <main>

      <aside class="hide">
        <img src="https://www.sefaria.org/static/img/ajax-loader.gif">
      </aside>

      <div class="section-label">Find a source</div>
      <section class="reference-row">
        <div class="reference-input-shell">
          <input type="text" class="input disab" placeholder="Reference, title, or phrase" aria-label="Find a source">
        </div>
        <button class="search-submit" id="run-sefaria">Find</button>
      </section>

      <section class="results-panel">
        <div class="result-group-label">Library matches</div>
        <ul class="result-list library-results"></ul>
        <div class="result-group-label">Search results</div>
        <ul class="result-list search-results"></ul>
      </section>

      <section class="display-section">
        <div class="section-label">Display</div>
        <div class="mode-card-group" role="radiogroup" aria-label="Display mode">
          <button class="mode-card" data-mode="he" role="radio" aria-checked="false"><span>Source</span><span class="mode-card-indicator"></span></button>
          <button class="mode-card" data-mode="en" role="radio" aria-checked="false"><span>Translation</span><span class="mode-card-indicator"></span></button>
          <button class="mode-card" data-mode="both" role="radio" aria-checked="false"><span>Source with Translation</span><span class="mode-card-indicator"></span></button>
        </div>
      </section>

      <section class="layout-section bilingual-layout-wrapper">
        <div class="section-label">Layout</div>
        <div class="layout-option-group" role="radiogroup" aria-label="Bilingual layout">
          <button class="layout-option" data-layout="he-top" aria-label="Hebrew on top"><span class="layout-icon layout-icon-top" aria-hidden="true"></span></button>
          <button class="layout-option" data-layout="he-left" aria-label="Hebrew left"><span class="layout-icon layout-icon-left" aria-hidden="true"></span></button>
          <button class="layout-option" data-layout="he-right" aria-label="Hebrew right"><span class="layout-icon layout-icon-right" aria-hidden="true"></span></button>
        </div>
      </section>

      <section class="options-section">
        <div class="section-label">Options</div>
        <div class="options-panel">
          <div class="toggle-row pesukim-wrapper">
            <label for="wants-pesukim">Line markers</label>
            <input id="wants-pesukim" type="checkbox" class="wants-pesukim" checked>
          </div>
          <p class="helper-text pesukim-help">Applies to segmented refs (e.g., verse/line ranges).</p>
          <div class="toggle-row translation-details-row">
            <label for="include-translation-source-info">Translation details</label>
            <input id="include-translation-source-info" type="checkbox" class="include-translation-source-info">
          </div>
          <p class="helper-text translation-details-help">Adds version/source details below inserted text.</p>
        </div>
      </section>

      <section class="versions-section">
        <div class="section-label">Versions</div>
        <div class="versions-panel">
          <div class="version-control translation-version-control"></div>
          <div class="version-control hebrew-version-control"></div>
        </div>
      </section>

      <section class="preview-section">
        <div class="section-label">Preview</div>
        <div class="preview-panel">
          <section class="suggestions">
            <b>Please enter the title of a text or a source to insert.</b>
          </section>
        </div>
      </section>

      <button class="submit" id="insert-source" disabled>Insert</button>

      <select class="output-mode-selection visually-hidden" aria-hidden="true">
        <option value="both" selected>Source with Translation</option>
        <option value="he">Source</option>
        <option value="en">Translation</option>
      </select>
      <select class="bilingual-layout-selection visually-hidden" aria-hidden="true">
        <option value="he-right" selected>Hebrew right</option>
        <option value="he-left">Hebrew left</option>
        <option value="he-top">Hebrew on top</option>
      </select>
    </main>

    <!--MAIN UX SCRIPT-->
    <script>
    //no need for $(document).ready() since this script is loaded at the end of the page
    $(".input").attr("disabled",true);
    var data = {};

    google.script.run.withSuccessHandler((preferences) => {
      if (preferences.include_translation_source_info == "true") {
        $('.include-translation-source-info').prop('checked', true);
      }
    }).getPreferences();

    $('.include-translation-source-info').on('change', () => {
      google.script.run.setPreferences({
        include_translation_source_info: $('.include-translation-source-info').is(':checked')
      });
    });
    google.script.run.withSuccessHandler((titles) => {
    
      $(".input").removeAttr("disabled");

      $('.suggestions').html("<b>Please enter the title of a text or a source to insert.</b>");

      $('.input').autocomplete({
          source: ( request, response ) => {
              let matches = $.map(titles, (tag) => {
                if ( tag.toUpperCase().indexOf(request.term.toUpperCase()) === 0 ) {
                  return tag;
                }
            });
          response(matches);
                  },
                  open: () => { 
                            $('.input').autocomplete("widget").width(280);
                        }  
                  });

      const updatePesukimAvailability = (response) => {
        const supportsLineMarkers = !!(
          response && (
            Array.isArray(response.he) ||
            Array.isArray(response.text) ||
            response.lineMarkersAvailable === true
          )
        );

        $('.pesukim-wrapper').toggle(supportsLineMarkers);
        $('.wants-pesukim').prop('disabled', !supportsLineMarkers);
        if (!supportsLineMarkers) {
          $('.wants-pesukim').prop('checked', false);
          $('.pesukim-help').text('Line markers are unavailable for this selection (single-block text).');
        } else {
          if (!$('.wants-pesukim').prop('checked')) {
            $('.wants-pesukim').prop('checked', true);
          }
          $('.pesukim-help').text('Applies to segmented refs (e.g., verse/line ranges).');
        }
      };

      const setInsertButtonState = (enabled) => {
        $('#insert-source').prop('disabled', !enabled);
      };

      const updateBilingualLayoutVisibility = () => {
        let outputMode = $('.output-mode-selection').val();
        $('.bilingual-layout-wrapper').toggle(outputMode === 'both');
      };

      const updateTranslationDetailsVisibility = () => {
        let outputMode = $('.output-mode-selection').val();
        $('.translation-details-row, .translation-details-help').toggle(outputMode === 'both' || outputMode === 'en');
      };

      const syncDisplayModeCards = () => {
        let outputMode = $('.output-mode-selection').val();
        $('.mode-card').each(function() {
          let isSelected = $(this).attr('data-mode') === outputMode;
          $(this).toggleClass('selected', isSelected);
          $(this).attr('aria-checked', isSelected ? 'true' : 'false');
        });
      };

      const syncLayoutCards = () => {
        let selectedLayout = $('.bilingual-layout-selection').val();
        $('.layout-option').each(function() {
          let isSelected = $(this).attr('data-layout') === selectedLayout;
          $(this).toggleClass('selected', isSelected);
          $(this).attr('aria-pressed', isSelected ? 'true' : 'false');
        });
      };

      const isResolvedReference = (response) => {
        return !!(response && response.ref && response.indexTitle && !response.error);
      };

      const buildDepthPrompt = (response) => {
        let sectionNames = (response && Array.isArray(response.sectionNames)) ? response.sectionNames.filter(Boolean) : [];
        if (sectionNames.length >= 2) {
          return `Enter ${sectionNames[0]} and optionally a ${sectionNames[1]}. Specify a range with '-'.`;
        }
        if (sectionNames.length === 1) {
          return `Enter ${sectionNames[0]}. Specify a range with '-'.`;
        }
        return `Enter a valid reference to insert.`;
      };

      let latestResolveRequestId = 0;
      let latestQueryRequestId = 0;
      let selectedResultKey = null;
      let queryState = { libraryMatches: [], searchResults: [] };

      let hasResolvedReference = false;
      setInsertButtonState(false);

      const clearVersionSelectors = () => {
        $('.translation-version-control').empty();
        $('.hebrew-version-control').empty();
      };

      $('#insert-source').click(() => {
        if (!hasResolvedReference || !data || !data.ref) {
          return;
        }

        let outputMode = $('.output-mode-selection').val();
        let language = (outputMode === 'both') ? undefined : outputMode;
        let bilingualLayout = $('.bilingual-layout-selection').val();

        let showPesukim = Boolean($('.wants-pesukim').prop('checked'));
        let includeTranslationSourceInfo = $('.include-translation-source-info').is(':checked');
        let input = $('.input').val();
        $('.hide').add($('.warning')).fadeIn('1000');
        google.script.run.withSuccessHandler(() => {
          $('.hide').add($('.warning')).fadeOut('1000');
        }).withFailureHandler(() => {
          $('.hide').add($('.warning')).fadeOut('1000');
        }).insertReference(data, language, showPesukim, input, includeTranslationSourceInfo, bilingualLayout);
        
        

      });

      const clearSelectedResult = () => {
        selectedResultKey = null;
        hasResolvedReference = false;
        setInsertButtonState(false);
        data = {};
        clearVersionSelectors();
        updatePesukimAvailability(null);
        $('.result-item').removeClass('selected').attr('aria-pressed', 'false');
        $('.suggestions').html("<b>Select a result to preview it.</b>");
      };

      const renderResultGroup = (selector, items, groupName) => {
        const $list = $(selector);
        $list.empty();
        if (!items.length) {
          $list.append(`<li class='result-subtitle'>No ${groupName.toLowerCase()}.</li>`);
          return;
        }

        items.forEach((item) => {
          const selectedClass = item.key === selectedResultKey ? 'selected' : '';
          const subtitle = item.subtitle ? `<div class='result-subtitle'>${escapeHTML(item.subtitle)}</div>` : '';
          const snippet = item.snippet ? `<div class='result-snippet'>${item.snippet}</div>` : '';
          $list.append(`<li><button class='result-item ${selectedClass}' data-key='${escapeHTML(item.key)}' data-ref='${escapeHTML(item.ref)}' aria-pressed='${item.key === selectedResultKey ? 'true' : 'false'}'><div class='result-title'>${escapeHTML(item.label)}</div>${subtitle}${snippet}</button></li>`);
        });
      };

      const renderResults = () => {
        renderResultGroup('.library-results', queryState.libraryMatches, 'Library matches');
        renderResultGroup('.search-results', queryState.searchResults, 'Search results');
      };

      const formatRefForResult = (ref) => {
        const clean = String(ref || '').trim();
        const chunks = clean.split(',').map((part) => part.trim()).filter(Boolean);
        if (chunks.length <= 1) return { label: clean, subtitle: '' };
        return { label: chunks[0], subtitle: chunks.slice(1).join(' › ') };
      };

      const runUnifiedQuery = () => {
        const input = ($('.input').val() || '').trim();
        clearSelectedResult();

        if (!input) {
          queryState = { libraryMatches: [], searchResults: [] };
          renderResults();
          $('.suggestions').html("<b>Please enter a reference, title, or phrase.</b>");
          return;
        }

        const prefixTitles = titles
          .filter((title) => title && title.toUpperCase().indexOf(input.toUpperCase()) === 0)
          .slice(0, 6)
          .map((title, index) => ({
            key: `library-title-${index}-${title}`,
            ref: title,
            label: title,
            subtitle: 'Library title match'
          }));

        queryState.libraryMatches = [{
          key: `library-ref-${input}`,
          ref: input,
          label: input,
          subtitle: 'Direct reference lookup'
        }].concat(prefixTitles);
        queryState.searchResults = [];
        renderResults();

        const requestId = ++latestQueryRequestId;
        google.script.run.withSuccessHandler((response) => {
          if (requestId !== latestQueryRequestId) return;
          queryState.searchResults = (response || []).slice(0, 10).map((hit, index) => {
            const source = (hit && hit._source) ? hit._source : {};
            const display = formatRefForResult(source.ref || '');
            const snippet = hit && hit.highlight && hit.highlight.naive_lemmatizer && hit.highlight.naive_lemmatizer[0] ? hit.highlight.naive_lemmatizer[0] : '';
            return {
              key: `search-${index}-${source.ref || index}`,
              ref: source.ref || '',
              label: display.label || source.ref || 'Search result',
              subtitle: display.subtitle,
              snippet
            };
          });
          renderResults();
        }).withFailureHandler(() => {
          if (requestId !== latestQueryRequestId) return;
          queryState.searchResults = [];
          renderResults();
        }).findSearch(input, [], false);
      };

      const resolveSelectedResult = (selectedRef, inputLabel) => {
        let requestId = ++latestResolveRequestId;
        hasResolvedReference = false;
        setInsertButtonState(false);
        updatePesukimAvailability(null);
        $('.suggestions').html("<br><b>Loading preview…</b>");
        google.script.run.withSuccessHandler((response) => {
          if (requestId !== latestResolveRequestId) {
            return;
          }

          if (isResolvedReference(response)) {
            updateSuggestion(response, inputLabel);
            updatePesukimAvailability(response);
            data = response;
            hasResolvedReference = true;
            setInsertButtonState(true);
            return;
          }

          hasResolvedReference = false;
          setInsertButtonState(false);
          clearVersionSelectors();
          updatePesukimAvailability(null);
          let prompt = buildDepthPrompt(response);
          $('.suggestions').html(`<br><b>${escapeHTML(prompt)}</b>`);
        }).withFailureHandler(() => {
          if (requestId !== latestResolveRequestId) {
            return;
          }
          hasResolvedReference = false;
          setInsertButtonState(false);
          clearVersionSelectors();
          updatePesukimAvailability(null);
          $('.suggestions').html("<br><b>Enter a valid reference to insert.</b>");
        }).findReference(selectedRef);
      };

      $('#run-sefaria').on('click', runUnifiedQuery);
      $('.input').on('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          runUnifiedQuery();
        }
      });

      $('.results-panel').on('click keydown', '.result-item', function(event) {
        if (event.type === 'keydown' && event.key !== 'Enter' && event.key !== ' ') {
          return;
        }
        event.preventDefault();
        const key = $(this).attr('data-key');
        const ref = $(this).attr('data-ref');
        selectedResultKey = key;
        $('.result-item').removeClass('selected').attr('aria-pressed', 'false');
        $(this).addClass('selected').attr('aria-pressed', 'true');
        resolveSelectedResult(ref, ref);
      });

      renderResults();

      $.widget("custom.catcomplete", $.ui.autocomplete, {
        _renderMenu: function(ul, items) {
          let currentCategory = "";
          $.each(items, function(index, item) {
            if (item.category !== currentCategory) {
              ul.append(`<li class='ui-autocomplete-category'>${item.category}</li>`);
              currentCategory = item.category;
            }
            $('<li>').append(`<div>${item.label}</div>`).appendTo(ul).data('ui-autocomplete-item', item);
          });
        }
      });

      function escapeHTML(value) {
        return String(value || "")
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatBreadcrumb(refValue) {
        let ref = String(refValue || '').trim();
        if (!ref) {
          return '';
        }

        let commaParts = ref.split(',').map((part) => part.trim()).filter(Boolean);
        if (commaParts.length <= 1) {
          return ref;
        }

        let title = commaParts[0];
        let pathPart = commaParts.slice(1).join(', ');
        let pathPieces = pathPart.split(':').map((part) => part.trim()).filter(Boolean);
        if (!pathPieces.length) {
          return ref;
        }

        return [title].concat(pathPieces).join(' › ');
      }

      function buildPreviewMeta(primaryRef, fallbackRef) {
        let breadcrumb = formatBreadcrumb(primaryRef);
        let fallback = String(fallbackRef || primaryRef || '').trim();
        let display = breadcrumb || fallback;
        return `<div class='preview-meta'>${escapeHTML(display)}</div>`;
      }

      function normalizeLanguage(version) {
        let lang = ((version.actualLanguage || version.language || "") + "").toLowerCase().trim();
        if (["he", "heb", "hebrew"].indexOf(lang) >= 0) {
          return { key: "he", label: "Hebrew" };
        }
        if (["en", "eng", "english"].indexOf(lang) >= 0 || !lang) {
          return { key: "en", label: "English" };
        }

        let family = (version.languageFamilyName || "").toString().trim();
        let label = family ? family.charAt(0).toUpperCase() + family.slice(1) : lang;
        return { key: `other:${lang}`, label };
      }

      function extractYear(version) {
        let currentYear = (new Date()).getFullYear() + 1;
        let fields = [version.shortVersionTitle, version.versionTitle, version.versionNotes]
          .filter((value) => value)
          .map((value) => value.toString());

        let candidates = [];
        for (const field of fields) {
          let matches = field.match(/\b(1\d{3}|20\d{2}|2100)\b/g);
          if (!matches) continue;
          for (const m of matches) {
            let numeric = parseInt(m, 10);
            if (numeric >= 1000 && numeric <= currentYear) {
              candidates.push(numeric);
            }
          }
        }

        if (candidates.length === 0) {
          return null;
        }
        return Math.max.apply(null, candidates);
      }

      $('.output-mode-selection').on('change', () => {
        updateBilingualLayoutVisibility();
        updateTranslationDetailsVisibility();
        syncDisplayModeCards();
      });
      $('.mode-card').on('click keydown', function(event) {
        if (event.type === 'keydown' && event.key !== 'Enter' && event.key !== ' ') {
          return;
        }
        event.preventDefault();
        $('.output-mode-selection').val($(this).attr('data-mode')).trigger('change');
      });
      $('.layout-option').on('click keydown', function(event) {
        if (event.type === 'keydown' && event.key !== 'Enter' && event.key !== ' ') {
          return;
        }
        event.preventDefault();
        $('.bilingual-layout-selection').val($(this).attr('data-layout'));
        syncLayoutCards();
      });
      updateBilingualLayoutVisibility();
      updateTranslationDetailsVisibility();
      syncDisplayModeCards();
      syncLayoutCards();

      function buildVersionModel(dataIn) {
        let versions = Array.isArray(dataIn.versions) ? dataIn.versions : [];
        let seen = {};
        let normalized = [];

        versions.forEach((version, index) => {
          let safeVersion = version || {};
          let language = normalizeLanguage(safeVersion);
          let versionTitle = safeVersion.versionTitle || safeVersion.shortVersionTitle || `Untitled version #${index + 1}`;
          let dedupeKey = `${language.key}::${versionTitle}::${safeVersion.versionSource || ""}`;
          if (seen[dedupeKey]) {
            return;
          }
          seen[dedupeKey] = true;

          normalized.push({
            index,
            versionTitle,
            label: safeVersion.shortVersionTitle || safeVersion.versionTitle || versionTitle,
            fullTitle: safeVersion.versionTitle || versionTitle,
            languageKey: language.key,
            languageLabel: language.label,
            direction: safeVersion.direction,
            priority: Number(safeVersion.priority) || 0,
            isPrimary: !!safeVersion.isPrimary,
            year: extractYear(safeVersion)
          });
        });

        return normalized;
      }

      function sortVersionEntries(entries) {
        return entries.slice().sort((a, b) => {
          if (a.year !== null && b.year !== null && a.year !== b.year) {
            return b.year - a.year;
          }
          if (a.year !== null && b.year === null) {
            return -1;
          }
          if (a.year === null && b.year !== null) {
            return 1;
          }
          if (a.priority !== b.priority) {
            return b.priority - a.priority;
          }
          return a.index - b.index;
        });
      }

      function updateSuggestion(dataIn, inputTitle) {
        const resolvedRef = dataIn && dataIn.ref ? dataIn.ref : inputTitle;
        let versionEntries = buildVersionModel(dataIn);
        let enSelectedVersionTitle = dataIn.versionTitle || "";
        let heSelectedVersionTitle = dataIn.heVersionTitle || "";

        let hebrewEntries = sortVersionEntries(versionEntries.filter((entry) => entry.languageKey === 'he'));
        let translationEntries = sortVersionEntries(versionEntries.filter((entry) => entry.languageKey !== 'he'));

        let selectVersionHebrew = `<label class="version-label" for="he-version-selection">Source</label><select id="he-version-selection" class="versioning-select he-version-selection">`;
        hebrewEntries.forEach((entry) => {
          let selected = (entry.versionTitle === heSelectedVersionTitle) ? "selected" : "";
          selectVersionHebrew += `<option value="${escapeHTML(entry.versionTitle)}" ${selected}>${escapeHTML(entry.label)}</option>`;
        });
        selectVersionHebrew += `</select>`;

        let translationInput = `<label class="version-label" for="translation-version-input">Translation</label><input type="text" id="translation-version-input" class="translation-combobox" placeholder="Search translation version" value="${escapeHTML(enSelectedVersionTitle)}">`;

        let languageGroups = {};
        translationEntries.forEach((entry) => {
          if (!languageGroups[entry.languageLabel]) {
            languageGroups[entry.languageLabel] = [];
          }
          languageGroups[entry.languageLabel].push(entry);
        });

        let translationGroupLabels = Object.keys(languageGroups).sort((a, b) => {
          if (a === 'English') return -1;
          if (b === 'English') return 1;
          return a.localeCompare(b);
        });

        let translationItems = [];
        translationGroupLabels.forEach((groupLabel) => {
          if (!languageGroups[groupLabel] || languageGroups[groupLabel].length === 0) {
            return;
          }
          languageGroups[groupLabel].forEach((entry) => {
            translationItems.push({
              label: entry.label,
              value: entry.versionTitle,
              category: groupLabel
            });
          });
        });

        let suggestion = `
        <table class='preview-table'>
          <tr>
            <td>
              ${buildPreviewMeta(dataIn.ref, inputTitle)}
              ${dataIn.text}
            </td>
            <td class='preview-he'>
              ${buildPreviewMeta(dataIn.heRef, dataIn.ref)}
              ${dataIn.he}
            </td>
          </tr>
        </table>
        `
        $('.translation-version-control').html(translationInput);
        $('.hebrew-version-control').html(selectVersionHebrew);
        $('.suggestions').html(suggestion);

        const applyTranslationSelection = (item) => {
          if (!item) {
            return false;
          }
          $('.translation-combobox').val(item.label);
          $('.translation-combobox').attr('data-selected-version', item.value);
          getVersions();
          return true;
        };

        const resolveTranslationInput = () => {
          let typedValue = ($('.translation-combobox').val() || '').trim();
          if (!typedValue) {
            $('.translation-combobox').val(enSelectedVersionTitle);
            $('.translation-combobox').attr('data-selected-version', enSelectedVersionTitle);
            return;
          }

          let lower = typedValue.toLowerCase();
          let matched = translationItems.find((item) => item.label === typedValue || item.value === typedValue);
          if (!matched) {
            let containsMatches = translationItems.filter((item) => {
              return item.label.toLowerCase().indexOf(lower) >= 0 || item.value.toLowerCase().indexOf(lower) >= 0;
            });
            if (containsMatches.length === 1) {
              matched = containsMatches[0];
            }
          }

          if (!applyTranslationSelection(matched)) {
            $('.translation-combobox').val(enSelectedVersionTitle);
            $('.translation-combobox').attr('data-selected-version', enSelectedVersionTitle);
          }
        };

        let getVersions = () => {
          let enVersion = $('.translation-combobox').attr('data-selected-version') || enSelectedVersionTitle || $('.translation-combobox').val();
          let heVersion = $('.he-version-selection').val();
          let versions = {"en": enVersion, "he": heVersion};
          let requestId = ++latestResolveRequestId;
          hasResolvedReference = false;
          setInsertButtonState(false);
          $('.suggestions .snippet-loading').remove();
          $('.suggestions table').append("<tr class='snippet-loading'><td colspan='2'><i>Refreshing preview…</i></td></tr>");
          google.script.run.withSuccessHandler((response) => {
            if (requestId !== latestResolveRequestId) {
              return;
            }
            if (!isResolvedReference(response)) {
              hasResolvedReference = false;
              setInsertButtonState(false);
              clearVersionSelectors();
              updatePesukimAvailability(null);
              return;
            }
            updateSuggestion(response, inputTitle);
            updatePesukimAvailability(response);
            data = response;
            hasResolvedReference = true;
            setInsertButtonState(true);
            console.log(`data changed to ${data.heVersionTitle} and ${data.versionTitle}`);
          }).withFailureHandler(() => {
            if (requestId !== latestResolveRequestId) {
              return;
            }
            hasResolvedReference = false;
            setInsertButtonState(false);
            clearVersionSelectors();
            updatePesukimAvailability(null);
          }).findReference(resolvedRef, versions);
        }

        $('.translation-combobox').attr('data-selected-version', enSelectedVersionTitle);
        $('.translation-combobox').catcomplete({
          appendTo: '.suggestions',
          delay: 50,
          minLength: 0,
          source: (request, response) => {
            let searchTerm = (request.term || '').toLowerCase();
            let filtered = translationItems.filter((item) => {
              return item.label.toLowerCase().indexOf(searchTerm) >= 0 ||
                item.value.toLowerCase().indexOf(searchTerm) >= 0 ||
                item.category.toLowerCase().indexOf(searchTerm) >= 0;
            });
            response(filtered);
          },
          focus: (event) => event.preventDefault(),
          select: (event, ui) => {
            event.preventDefault();
            applyTranslationSelection(ui.item);
          },
          change: (event, ui) => {
            if (ui && ui.item) {
              applyTranslationSelection(ui.item);
              return;
            }
            resolveTranslationInput();
          }
        }).on('focus', function() {
          $(this).catcomplete('search', $(this).val());
        }).on('keydown', function(event) {
          if (event.key === 'ArrowDown' && !$(this).catcomplete('widget').is(':visible')) {
            $(this).catcomplete('search', $(this).val());
          }
          if (event.key === 'Enter' && !$(this).catcomplete('widget').is(':visible')) {
            event.preventDefault();
            resolveTranslationInput();
          }
        }).on('blur', function() {
          setTimeout(resolveTranslationInput, 0);
        });
        
        $('.he-version-selection').on('change', () => {
          getVersions();
        });
      }

      $('.close').click(() => {
        google.script.host.close();
      });

    }).returnTitles();
    </script>

  </body>
</html>
