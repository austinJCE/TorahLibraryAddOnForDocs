<!DOCTYPE html>
  <head>
    <base target="_top">

    <!--STYLESHEETS-->
    <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons.css">
    <link rel="stylesheet" href="//ajax.googleapis.com/ajax/libs/jqueryui/1.9.1/themes/smoothness/jquery-ui.css" />

    <style>
    /* note: no need to really make the layout responsive any more than vw and vh usage, due to the constraints of Google Add-ons.*/
    .ui-autocomplete {
      /* height: 33vh; */
      width: 175px !important;
      overflow-y: scroll;
    }

    [class=hide] > img {
      position: absolute;
      top: 48%; 
      left: 48%;
    }

    main {
      margin-top: 0; 
      margin-bottom: 0;
      overflow:auto;
    }

    aside {
      display: none; 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      color: black; 
      background: white; 
      z-index: 5;
    }

    #run-sefaria {
      font-size: 3.8vw; 
      margin-right: 10px; 
      display: inline; 
      float: right; 
      margin-top: 10px; 
      width: 95px !important;
    }

    /* extremely ungainly usage of !important, need to fix at some point */
    .input {
      margin-top: 10px !important; 
      margin-left: 10px !important; 
      display: inline !important; 
      float: left !important; 
      width: 155px !important; 
      height: 9.8vw !important;
    }

    .suggestions {
      margin-left: 10px; 
      margin-right: 10px; 
      margin-top: 50px; 
      min-height: 0px; 
      height: 73vh !important; 
      overflow-x: auto;
    }

    .branding-text {
      padding-top: 0.5em;
    }

    .versioning-select {
      width: 100px;
    }

    .translation-combobox {
      width: 140px;
    }

    .ui-autocomplete-category {
      font-weight: bold;
      font-size: 11px;
      padding: 4px 8px;
      color: #555;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    </style>

    <!--SCRIPTS-->
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script src="//ajax.googleapis.com/ajax/libs/jqueryui/1.9.1/jquery-ui.min.js"></script>

  </head>
  <body>
    <main>

      <aside class="hide">
        <img src="https://www.sefaria.org/static/img/ajax-loader.gif">
      </aside>

      <section>
        <input type="text" class="input disab" placeholder="Text Title:">
        <button class="blue submit" id="run-sefaria">Insert Source
        </button>
        <p style="margin: 10px 10px 0 10px; font-size: 12px;">
          <input type="checkbox" class="include-translation-source-info">Include Translation attribution (version/source)
        </p>
      </section>
      
      <section class="suggestions">
        <b>
          <img src="https://www.sefaria.org/static/img/ajax-loader.gif">
        </b>
      </section>

      <footer class="sidebar bottom" style="position: fixed; background: white;">
        <nav name="options">
          <p>
            <input type="checkbox" class="wants-pesukim" checked>Pesukim/line markers
            <label style="display: inline-block; margin-left: 5px;">Output mode
            <select class="output-mode-selection">
              <option value="both" selected>Hebrew + Translation</option>
              <option value="he">Hebrew only</option>
              <option value="en">Translation only</option>
            </select>
            </label>
          </p>
        </nav>
        <section name="branding">
          <span class="watermark" style="display: flex">
            <span class="gray branding-text">Add-on by <a  target="_blank" href="https://www.github.com/shelfgot/">Shlomi Helfgot</a> &nbsp; </span>
            <a  target="_blank" href="https://www.buymeacoffee.com/shlomihelfr"><img height="27em" src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=&slug=shlomihelfr&button_colour=ffa82e&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=FFDD00" /></a>
          </span>
        </section>
      </footer>
    </main>

    <!--MAIN UX SCRIPT-->
    <script>
    //no need for $(document).ready() since this script is loaded at the end of the page
    $(".input").attr("disabled",true);
    var data = {};

    google.script.run.withSuccessHandler((preferences) => {
      if (preferences.include_translation_source_info == "true") {
        $('.include-translation-source-info').prop('checked', true);
      }
    }).getPreferences();

    $('.include-translation-source-info').on('change', () => {
      google.script.run.setPreferences({
        include_translation_source_info: $('.include-translation-source-info').is(':checked')
      });
    });
    google.script.run.withSuccessHandler((titles) => {
    
      $(".input").removeAttr("disabled");

      $('.suggestions').html("<b>Please enter the title of a text or a source to insert.</b>");

      $('.input').autocomplete({
          source: ( request, response ) => {
              let matches = $.map(titles, (tag) => {
                if ( tag.toUpperCase().indexOf(request.term.toUpperCase()) === 0 ) {
                  return tag;
                }
            });
          response(matches);
                  },
                  open: () => { 
                            $('.input').autocomplete("widget").width(280);
                        }  
                  });

      const setInsertButtonState = (enabled) => {
        $('.submit').prop('disabled', !enabled);
      };

      let hasResolvedReference = false;
      setInsertButtonState(false);

      $('.submit').click(() => {
        if (!hasResolvedReference || !data || !data.ref) {
          return;
        }

        let outputMode = $('.output-mode-selection').val();
        let language = (outputMode === 'both') ? undefined : outputMode;

        let showPesukim = ($('.wants-pesukim').is(':checked')) ? true : false;
        let includeTranslationSourceInfo = $('.include-translation-source-info').is(':checked');
        let input = $('.input').val();
        $('.hide').add($('.warning')).fadeIn('1000');
        google.script.run.withSuccessHandler(() => {
          $('.hide').add($('.warning')).fadeOut('1000');
        }).withFailureHandler(() => {
          $('.hide').add($('.warning')).fadeOut('1000');
        }).insertReference(data, language, showPesukim, input, includeTranslationSourceInfo);
        
        

      });

      $('.input').keyup((e) => {
        let input = $('.input').val();


        let onReturn = (response) => {

                if (!response || !response.ref || !response.indexTitle) {
                  hasResolvedReference = false;
                  setInsertButtonState(false);
                  return;
                }

                // get the chapter and verse references from the input string + title from API
                let normalizedTitle = `${response.indexTitle} ${input.split(" ").pop()}`;

                // check it against the reference from the API response to ensure that the suggestion is the most recent
                if ( normalizedTitle == response.ref ) {
                  console.log(`${normalizedTitle} and ${response.ref}`);
                  updateSuggestion(response, input);
                  data = response;
                  hasResolvedReference = true;
                  setInsertButtonState(true);
                } else {
                  hasResolvedReference = false;
                  setInsertButtonState(false);
                }

              }
        // check that pasuk, or at the very least perek, has been inputted
        if(/\d/.test(input)) {

          google.script.run.withSuccessHandler(onReturn).withFailureHandler(() => {
            hasResolvedReference = false;
            setInsertButtonState(false);
          }).findReference(input);
        }
        else {
          hasResolvedReference = false;
          setInsertButtonState(false);

          google.script.run.withSuccessHandler((txt) => {
                let suggestion = `
                <br>
                  <b>Enter ${txt["sectionNames"][0]} and optionally a ${txt["sectionNames"][1]}. 
                  Specify a range with '-'.
                  </b>
                `;
                $('.suggestions').html(suggestion);
          }).findReference(input);
          
        }
      });

      $.widget("custom.catcomplete", $.ui.autocomplete, {
        _renderMenu: function(ul, items) {
          let currentCategory = "";
          $.each(items, function(index, item) {
            if (item.category !== currentCategory) {
              ul.append(`<li class='ui-autocomplete-category'>${item.category}</li>`);
              currentCategory = item.category;
            }
            $('<li>').append(`<div>${item.label}</div>`).appendTo(ul).data('ui-autocomplete-item', item);
          });
        }
      });

      function escapeHTML(value) {
        return String(value || "")
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function normalizeLanguage(version) {
        let lang = ((version.actualLanguage || version.language || "") + "").toLowerCase().trim();
        if (["he", "heb", "hebrew"].indexOf(lang) >= 0) {
          return { key: "he", label: "Hebrew" };
        }
        if (["en", "eng", "english"].indexOf(lang) >= 0 || !lang) {
          return { key: "en", label: "Translation" };
        }

        let family = (version.languageFamilyName || "").toString().trim();
        let label = family ? family.charAt(0).toUpperCase() + family.slice(1) : lang;
        return { key: `other:${lang}`, label };
      }

      function extractYear(version) {
        let currentYear = (new Date()).getFullYear() + 1;
        let fields = [version.shortVersionTitle, version.versionTitle, version.versionNotes]
          .filter((value) => value)
          .map((value) => value.toString());

        let candidates = [];
        for (const field of fields) {
          let matches = field.match(/\b(1\d{3}|20\d{2}|2100)\b/g);
          if (!matches) continue;
          for (const m of matches) {
            let numeric = parseInt(m, 10);
            if (numeric >= 1000 && numeric <= currentYear) {
              candidates.push(numeric);
            }
          }
        }

        if (candidates.length === 0) {
          return null;
        }
        return Math.max.apply(null, candidates);
      }

      function buildVersionModel(dataIn) {
        let versions = Array.isArray(dataIn.versions) ? dataIn.versions : [];
        let seen = {};
        let normalized = [];

        versions.forEach((version, index) => {
          let safeVersion = version || {};
          let language = normalizeLanguage(safeVersion);
          let versionTitle = safeVersion.versionTitle || safeVersion.shortVersionTitle || `Untitled version #${index + 1}`;
          let dedupeKey = `${language.key}::${versionTitle}::${safeVersion.versionSource || ""}`;
          if (seen[dedupeKey]) {
            return;
          }
          seen[dedupeKey] = true;

          normalized.push({
            index,
            versionTitle,
            label: safeVersion.shortVersionTitle || safeVersion.versionTitle || versionTitle,
            fullTitle: safeVersion.versionTitle || versionTitle,
            languageKey: language.key,
            languageLabel: language.label,
            direction: safeVersion.direction,
            priority: Number(safeVersion.priority) || 0,
            isPrimary: !!safeVersion.isPrimary,
            year: extractYear(safeVersion)
          });
        });

        return normalized;
      }

      function sortVersionEntries(entries) {
        return entries.slice().sort((a, b) => {
          if (a.year !== null && b.year !== null && a.year !== b.year) {
            return b.year - a.year;
          }
          if (a.year !== null && b.year === null) {
            return -1;
          }
          if (a.year === null && b.year !== null) {
            return 1;
          }
          if (a.priority !== b.priority) {
            return b.priority - a.priority;
          }
          return a.index - b.index;
        });
      }

      function updateSuggestion(dataIn, inputTitle) {
        let versionEntries = buildVersionModel(dataIn);
        let enSelectedVersionTitle = dataIn.versionTitle || "";
        let heSelectedVersionTitle = dataIn.heVersionTitle || "";

        let hebrewEntries = sortVersionEntries(versionEntries.filter((entry) => entry.languageKey === 'he'));
        let translationEntries = sortVersionEntries(versionEntries.filter((entry) => entry.languageKey !== 'he'));

        let selectVersionHebrew = `<select class="versioning-select he-version-selection">`;
        hebrewEntries.forEach((entry) => {
          let selected = (entry.versionTitle === heSelectedVersionTitle) ? "selected" : "";
          selectVersionHebrew += `<option value="${escapeHTML(entry.versionTitle)}" ${selected}>${escapeHTML(entry.label)}</option>`;
        });
        selectVersionHebrew += `</select>`;

        let translationInput = `<input type="text" class="translation-combobox" placeholder="Search Translation version" value="${escapeHTML(enSelectedVersionTitle)}">`;

        let languageGroups = {};
        translationEntries.forEach((entry) => {
          if (!languageGroups[entry.languageLabel]) {
            languageGroups[entry.languageLabel] = [];
          }
          languageGroups[entry.languageLabel].push(entry);
        });

        let translationGroupLabels = Object.keys(languageGroups).sort((a, b) => {
          if (a === 'Translation') return -1;
          if (b === 'Translation') return 1;
          return a.localeCompare(b);
        });

        let translationItems = [];
        translationGroupLabels.forEach((groupLabel) => {
          if (!languageGroups[groupLabel] || languageGroups[groupLabel].length === 0) {
            return;
          }
          languageGroups[groupLabel].forEach((entry) => {
            translationItems.push({
              label: entry.label,
              value: entry.versionTitle,
              category: groupLabel
            });
          });
        });

        let suggestion = `
        <table style='font-size: 3.5vw;'>
          <tr>
            <td class='paetaot'>
              ${inputTitle}
              ${translationInput}
            </td>
            <td style='direction:rtl;'>
              ${dataIn.heRef}
              ${selectVersionHebrew}
            </td>
          </tr>
          <tr>
            <td style='padding-top: -2% !important;'>
              ${dataIn.text}
            </td>
            <td style='direction:rtl;'>
              ${dataIn.he}
            </td>
          </tr>
        </table>
        `
        $('.suggestions').html(suggestion);

        let suppressTranslationChange = false;

        let getVersions = (title) => {
          let enVersion = $('.translation-combobox').attr('data-selected-version') || enSelectedVersionTitle || $('.translation-combobox').val();
          let heVersion = $('.he-version-selection').val();
          let versions = {"en": enVersion, "he": heVersion};
          google.script.run.withSuccessHandler((response) => {
            updateSuggestion(response, title);
            data = response;
            console.log(`data changed to ${data.heVersionTitle} and ${data.versionTitle}`);
          }).findReference(title, versions);
        }

        $('.translation-combobox').attr('data-selected-version', enSelectedVersionTitle);
        $('.translation-combobox').catcomplete({
          appendTo: '.suggestions',
          delay: 50,
          minLength: 0,
          source: (request, response) => {
            let searchTerm = (request.term || '').toLowerCase();
            let filtered = translationItems.filter((item) => {
              return item.label.toLowerCase().indexOf(searchTerm) >= 0 || item.value.toLowerCase().indexOf(searchTerm) >= 0;
            });
            response(filtered);
          },
          focus: (event) => event.preventDefault(),
          select: (event, ui) => {
            event.preventDefault();
            suppressTranslationChange = true;
            $('.translation-combobox').val(ui.item.label);
            $('.translation-combobox').attr('data-selected-version', ui.item.value);
            let title = $('.input').val();
            getVersions(title);
          }
        }).on('focus', function() {
          $(this).catcomplete('search', $(this).val());
        });

        $('.translation-combobox').on('change', () => {
          if (suppressTranslationChange) {
            suppressTranslationChange = false;
            return;
          }

          let typedValue = $('.translation-combobox').val();
          let matched = translationItems.find((item) => item.label === typedValue || item.value === typedValue);
          if (!matched) {
            $('.translation-combobox').val(enSelectedVersionTitle);
            $('.translation-combobox').attr('data-selected-version', enSelectedVersionTitle);
            return;
          }
          $('.translation-combobox').attr('data-selected-version', matched.value);
          let title = $('.input').val();
          getVersions(title);
        });
        
        $('.he-version-selection').on('change', () => {
          let title = $('.input').val();
          getVersions(title);
        });
      }

      $('.close').click(() => {
        google.script.host.close();
      });

    }).returnTitles();
    </script>

  </body>
</html>
