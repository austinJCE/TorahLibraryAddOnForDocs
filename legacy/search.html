<!DOCTYPE html>
  <html>
    <head>
      <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons.css">
      <link rel="stylesheet" href="//ajax.googleapis.com/ajax/libs/jqueryui/1.9.1/themes/smoothness/jquery-ui.css" />
      
      <style>
        .source:hover {
          cursor: pointer;
          background: rgba(122, 122, 122, 0.5);
        }

        .source.selected {
          background: rgba(66, 133, 244, 0.22);
          box-shadow: inset 0 0 0 2px rgba(66, 133, 244, 0.8);
        }

        .source {
          padding: 5px;
        }

        .ref {
          margin: 0;
          font-size: 4.6vw;
          line-height: 1.25;
          white-space: normal;
          overflow-wrap: anywhere;
          word-break: break-word;
        }

        .ref-breadcrumb {
          display: block;
          margin-bottom: 4px;
          font-weight: 600;
        }

        .ref-fallback {
          display: block;
          color: #666;
          font-size: 3.7vw;
        }

        .snippet {
          margin: 4px 0 0;
          white-space: normal;
          overflow-wrap: anywhere;
          word-break: break-word;
        }

        .source-title {
          font-size: 6vw; 
          line-height: 6vw;
        }

        .he {
          direction: rtl;
        }

        header {
          display: flex !important;
          justify-content: space-between !important;
        }

        /* extremely ungainly usage of !important, need to fix at some point */
        .input {
          margin-top: 10px !important; 
          margin-left: 10px !important;  
          width: 155px !important; 
          height: 9.8vw !important;
        }

        .button {
          font-size: 3.8vw !important; 
          margin-right: 10px !important;  
          margin-top: 10px !important; 
          width: 93px !important;
        }

        .insert-button {
          margin-top: 8px !important;
          width: 100% !important;
        }

        .select-filters {
          width: 180px !important; 
          margin-left: 10px !important; 
          margin-top:10px !important;
        }

        .search-controls {
          margin-left: 10px;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .suggestions {
          margin-left: 10px; 
          margin-top: 10px; 
          width: 280px; 
          overflow-x: hidden; 
          overflow-y: scroll;
          height: 73vh !important;
        }

        .searchPrompt {
          display: block; 
          margin-right: 10px !important;
        }

        .hide {
          display: none; 
          position: absolute; 
          top: 0; 
          left: 0; 
          width: 100%; 
          height: 100%; 
          color: black; 
          background: white; 
          z-index: 5; 
        }

        .bottom {
          position: fixed; 
          background: white;
        }

        [name=loading] {
          position: absolute; 
          top: 48%; 
          left: 48%;
        }
      </style>

      <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js">
      </script>

      <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.9.1/jquery-ui.min.js">
      </script>
    </head>

    <body>
      <header>
        <input type="text" class="input" placeholder="Search Text">
        <input type="button" value="Search" class="button blue search-button">
      </header>
      <section>
        <div class="search-controls">
        <select class="select-filters">
          <option value="" selected>in: All</option>
          <option value="Tanakh">in: Tanach</option>
          <option value="Mishnah">in: Mishnah</option>
          <option value="Talmud">in: Talmud</option>
          <option value="Halakhah">in: Halakhah</option>
          <option value="Midrash">in: Midrash</option>
          <option value="Kabbalah">in: Kabbalah</option>
          <option value="Liturgy">in: Liturgy</option>
          <option value="Philosophy">in: Philosophy</option>
          <option value="Tanaitic">in: Tanaitic</option>
          <option value="Chasidut">in: Chasidut</option>
          <option value="Musar">in: Musar</option>
          <option value="Apocrypha">in: Apocrypha</option>
          <option value="Modern Works">in: Modern Works</option>
          <option value="Reference">in: Reference</option>
          <option value="Other">in: Other</option>
        </select>
        <label style="font-size: 12px; white-space: nowrap;"><input type="checkbox" class="wants-pagerank">Use PageRank</label>
        </div>
      </section>
      <br>

      <section class="suggestions">
        <b class="searchPrompt">Search Sefaria's library of Jewish texts for any phrase in any supported language. </b>
      </section>

      <footer class="sidebar bottom">
        <nav name="options">
          <p>
            <input type="checkbox" class="wants-pesukim" checked>Pesukim/line markers
            <span style="display:block; margin-left: 20px; font-size: 11px; color: #666;">Shown when the selected result resolves to segmented lines/verses.</span>
            Output mode:
            <select class="output-mode-selection">
              <option value="both" selected>Hebrew + Translation</option>
              <option value="he" class="heb">Hebrew only</option>
              <option value="en" class="eng">Translation only</option>
            </select>
          </p>
          <input type="button" value="Insert Selected Source" class="button blue insert-button" disabled>
        </nav>
        <section name="branding">
          <span class="watermark" style="display: flex">
            <span class="gray branding-text">Add-on by <a  target="_blank" href="https://www.github.com/shelfgot/">Shlomi Helfgot</a> &nbsp; </span>
            <a  target="_blank" href="https://www.buymeacoffee.com/shlomihelfr"><img height="27em" src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=&slug=shlomihelfr&button_colour=ffa82e&font_colour=000000&font_family=Inter&outline_colour=000000&coffee_colour=FFDD00" /></a>
          </span>
        </section>
      </footer>

      <aside class="hide">
        <img src="https://www.sefaria.org/static/img/ajax-loader.gif" name="loading">
      </aside>

    <!--LOCAL SCRIPT-->
    
    <script>
    let selectedReference = '';

    const clearSelectedSource = () => {
      selectedReference = '';
      $('.source').removeClass('selected').attr('aria-pressed', 'false');
      $('.insert-button').prop('disabled', true);
    };

    const formatRefDisplay = (source) => {
      const rawRef = source.ref || '';
      const rawHeRef = source.heRef || rawRef;

      const pathParts = Array.isArray(source.path)
        ? source.path.filter(Boolean)
        : [];

      const pieces = (pathParts.length > 0 ? pathParts : rawRef.split(','))
        .map((part) => part.trim())
        .filter(Boolean);

      const breadcrumb = pieces.length > 0 ? pieces.join(' › ') : rawHeRef;
      const hasDifferentFallback = rawHeRef && rawHeRef !== breadcrumb;

      return {
        breadcrumb,
        fallback: hasDifferentFallback ? rawHeRef : ''
      };
    };

    const setSelectedSource = (element) => {
      $('.source').removeClass('selected').attr('aria-pressed', 'false');
      element.addClass('selected').attr('aria-pressed', 'true');
      selectedReference = element.attr('data-ref') || '';
      $('.insert-button').prop('disabled', !selectedReference);
    };

    const insertSelectedSource = () => {
      if (!selectedReference) {
        return;
      }

      const outputMode = $('.output-mode-selection').val();
      const language = outputMode === 'both' ? undefined : outputMode;
      const wantsPesukim = Boolean($('.wants-pesukim').prop('checked'));

      $('.hide').add($('.warning')).fadeIn('1000');
      google.script.run.withSuccessHandler((payload) => {
        $('.hide').add($('.warning')).fadeOut('1000');
        google.script.run.withFailureHandler(() => {
          $('.hide').add($('.warning')).fadeOut('1000');
        }).insertReference(payload, language, wantsPesukim);
      }).withFailureHandler(() => {
        $('.hide').add($('.warning')).fadeOut('1000');
      }).findReference(selectedReference);
    };

    $('.insert-button').click(() => {
      insertSelectedSource();
    });

    $('.suggestions').on('click', '.source', (event) => {
      setSelectedSource($(event.currentTarget));
    });

    $('.suggestions').on('keydown', '.source', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        setSelectedSource($(event.currentTarget));
      }
    });

    const runSearch = () => {
        let filterVal = $('.select-filters').val();
        let filters = [];

        if (filterVal != "") {
          filters.push(filterVal)
        }
        
        
        let input = $('.input').val();
        if (!input || !input.trim()) {
          return;
        }
        let pageRank = $('.wants-pagerank').is(':checked');
        clearSelectedSource();

        $('.suggestions').html(`<img src="https://www.sefaria.org/static/img/ajax-loader.gif" class="search_loading">`);

        google.script.run.withSuccessHandler((response) => {
            $('.suggestions').html('');
            for (let i = 0; i < response.length; i++) {
                let rtl = response[i]["_source"]["lang"];
                const source = response[i]["_source"];
                const refDisplay = formatRefDisplay(source);
                const $source = $('<div></div>')
                  .addClass(`source ${rtl}`)
                  .attr('data-ref', source["ref"])
                  .attr('tabindex', '0')
                  .attr('role', 'button')
                  .attr('aria-pressed', 'false');

                const $ref = $('<h3></h3>').addClass('ref').attr('number', i);
                $ref.append($('<span></span>').addClass('ref-breadcrumb').text(refDisplay.breadcrumb));

                if (refDisplay.fallback) {
                  $ref.append($('<span></span>').addClass('ref-fallback').text(refDisplay.fallback));
                }

                const snippetHtml = response[i]["highlight"]["naive_lemmatizer"][0] || '';
                const $snippet = $('<p></p>').addClass('snippet').html(snippetHtml);

                $source.append($ref).append($snippet);
                $('.suggestions').append($source);
            }

          }).findSearch(input, filters, pageRank);
    };

    $('.search-button').click(() => {
      runSearch();
    });

    $('.select-filters, .wants-pagerank').on('change', () => {
      runSearch();
    });

    $('.input').on('keyup', (event) => {
      if (event.key === 'Enter') {
        runSearch();
      }
    });
    </script>
  </body>
</html>
