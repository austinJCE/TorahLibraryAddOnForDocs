name: Deploy to Apps Script

on:
  push:
    branches:
      - master
      - claude/appscript-github-sync-EOqjD

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate with Google
        run: |
          echo "${{ secrets.CLASP_TOKEN }}" | base64 -d > ~/.clasprc.json
          chmod 600 ~/.clasprc.json
          echo "--- Inspecting credentials structure ---"
          python3 <<'PY'
          import json
          d = json.load(open(__import__('os').path.expanduser('~/.clasprc.json')))
          def walk(o, depth=0):
              pad = '  ' * depth
              if isinstance(o, dict):
                  for k, v in o.items():
                      if isinstance(v, dict):
                          print(f'{pad}{k}:')
                          walk(v, depth + 1)
                      elif isinstance(v, list):
                          print(f'{pad}{k}: list[{len(v)}]')
                      else:
                          print(f'{pad}{k}: {type(v).__name__}')
          walk(d)
          PY

      - name: Push to Apps Script
        run: clasp push -f
