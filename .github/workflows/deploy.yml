name: Deploy to Apps Script

on:
  push:
    branches:
      - master
      - claude/appscript-github-sync-EOqjD

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install clasp
        run: |
          npm install -g @google/clasp
          echo "--- clasp version ---"
          clasp --version
          echo "--- clasp auth source location ---"
          find /usr/local/lib/node_modules/@google/clasp -type f -name "*.js" | xargs grep -l "clasprc\|\.clasprc\|credPath\|tokenPath" 2>/dev/null | head -5

      - name: Authenticate with Google
        run: |
          echo "${{ secrets.CLASP_TOKEN }}" | base64 -d > ~/.clasprc.json
          chmod 600 ~/.clasprc.json
          echo "--- clasp credential path search ---"
          find /usr/local/lib/node_modules/@google/clasp -type f -name "*.js" | xargs grep -h "clasprc\|homedir.*json\|credPath" 2>/dev/null | grep -v "^//" | head -20
      
      - name: Push to Apps Script
        run: clasp push -f
