name: test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Node test suite
        run: npm test

      - name: Run pre-clasp QC on apps-script/
        run: bash pre_clasp_qc.sh apps-script
