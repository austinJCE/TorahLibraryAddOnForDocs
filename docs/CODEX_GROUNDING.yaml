version: 1
project: TorahLibraryAddOnForDocs
purpose: >-
  Grounding spec for Codex while refactoring the Google Docs add-on.
  This file is authoritative for product architecture, state flow, and UX rules.

source_of_truth:
  preferences: userPreferences
  session: sessionState
  live_surface: sidebar
  preview_reads_from: sessionState

state_model:
  userPreferences:
    description: saved per-user defaults
  sessionState:
    description: live working state initialized from userPreferences
  appState:
    experimentalFeaturesEnabled: boolean
    aiMode: boolean
    surpriseMe: boolean

non_negotiables:
  - Top-level sidebar navigation must be only Texts, Voices, and Experimental Features when enabled.
  - Global sidebar basic/advanced modes must not exist.
  - Basic/Advanced is allowed only inside AI Shiur.
  - Preferences defines defaults; sidebar edits live session state.
  - Preview must reflect current session state.
  - More Options is a session-level refinement layer.
  - Experimental features are enabled in Preferences, not activated from incidental local sidebar toggles.
  - Remove dead or conflicting legacy logic instead of layering new overrides on top.

sidebar:
  top_level_tabs:
    always_visible:
      - texts
      - voices
    conditional:
      - experimental
  navigation_rules:
    experimental_visibility: enabled_via_preferences_only
    disallow_global_modes:
      - basic
      - advanced
  texts_tab:
    always_visible_live_controls:
      - language_layout
      - display_layout
      - translation_selection_when_multiple_available
    more_options:
      - include_citation_below_text
      - include_transliteration
      - include_niqqud
      - include_cantillation
    preview:
      must_reflect:
        - language_layout
        - display_layout
        - translation_selection
        - include_citation_below_text
        - include_transliteration
        - include_niqqud
        - include_cantillation
  voices_tab:
    requirement: prefer_human_readable_sheet_titles_over_sheet_ids
    title_fallback_order:
      - item.label
      - item.title
      - item.sheet_title
      - item.name
      - item.sheet.title
      - item.ref
  experimental_tab:
    appears_only_when: appState.experimentalFeaturesEnabled
    contains_accordions:
      - surprise_me
      - ai_shiur
    rules:
      - Surprise Me must not exist as a dead mystery toggle elsewhere.
      - AI Shiur must live here as the primary workflow.

ai_shiur:
  primary_surface: sidebar_accordion_inside_experimental_tab
  modal_role: secondary_or_removed
  internal_modes:
    - basic
    - advanced
  constraints:
    - Internal AI Shiur mode switching must not affect global sidebar mode.
    - No global basic or advanced sidebar state may remain.

preferences:
  role: saved_default_authority
  sections:
    - texts_defaults
    - voices_defaults
    - experimental_features
  rules:
    - Must not become the primary live interaction surface.
    - May mirror sidebar controls as default setters only.
    - Changes do not silently override current session unless explicitly applied or saved.
  experimental_feature_controls:
    - enable_experimental_features_master_if_present
    - ai_mode
    - surprise_me

footer:
  standard_mode:
    shows: standard_quick_actions
  experimental_mode:
    trigger: appState.experimentalFeaturesEnabled
    shows: ai_driven_quick_actions
  rule: footer_follows_system_level_feature_state

extensions_menu:
  purpose: stable_command_surface
  order:
    - Texts
    - Voices
    - Quick Actions submenu
    - Generate Shiur Draft (experimental) if AI experimental enabled
    - Surprise Me if enabled
    - Preferences
    - Support
  quick_actions_submenu:
    always:
      - Transform Divine Names
      - Link Texts with Sefaria
    conditional_ai_block:
      - Today's Daf Lesson (45 min)
      - Today's 929 Lesson (45 min)
      - This Week's Parashah Lesson (45 min)
  rules:
    - Must render safely under AuthMode.NONE.
    - Base menu must render even if preferences cannot yet be read.
    - Top-menu quick actions are global commands.
    - Sidebar footer quick actions are contextual actions.

refactor_strategy:
  priorities:
    - stabilize_current_build_first
    - normalize_top_level_modes
    - build_real_experimental_dom
    - align_preferences_with_state_model
    - move_ai_shiur_into_sidebar
    - enforce_texts_live_controls_and_preview_sync
    - refactor_extensions_menu
    - split_monolithic_files
  forbidden_patterns:
    - duplicate_setSidebarMode_implementations
    - layered_late_override_mode_systems
    - JS_behavior_tied_only_to_styling_classes_when_a_data_hook_is_practical
    - missing_DOM_nodes_expected_by_JS

target_file_structure:
  server_files:
    - Code.gs
    - AiLessonGateway.gs
    - attribution.gs
    - gematriya.gs
    - surprise-me-feature.gs
    - transliteration.gs
    - ui_core.gs
    - ui_pages.gs
  shared_partials:
    - ui_head.html
    - ui_shell.css.html
    - ui_components.css.html
    - ui_utilities.css.html
    - ui_core.js.html
    - ui_api.js.html
    - ui_state.js.html
    - ui_dom.js.html
    - ui_feedback.js.html
  page_modules:
    - sidebar.html
    - sidebar.page.js.html
    - preferences.html
    - preferences.page.js.html
    - ai_lesson.html
    - ai_lesson.page.js.html
    - surprise-me.html
    - surprise-me.page.js.html

definition_of_done:
  - Sidebar contains only Texts, Voices, and Experimental Features when enabled.
  - Experimental tab appears only when enabled in Preferences.
  - Surprise Me lives in Experimental Features and is not a dead toggle.
  - AI Shiur lives in Experimental Features and is not modal-first.
  - Basic/Advanced exists only inside AI Shiur.
  - Footer switches based on system-level experimental state.
  - Preferences defines defaults without becoming the live interaction surface.
  - Sidebar edits session state.
  - Preview reflects session state accurately.
  - Extensions menu ordering and conditional behavior match spec.
  - No duplicate control paths remain.
