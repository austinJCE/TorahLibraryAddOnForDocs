<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons.css">
    <?!= include('basic_css'); ?>
  </head>
  <body>
    <aside class="hide">
      <img src="https://www.sefaria.org/static/img/ajax-loader.gif" name="loading">
    </aside>

    <main class="basic-shell">
      <section class="brand-header" title="Sefaria for Google Docs- Basic Search" aria-label="Use the familiar Sefaria search flow, then insert using your saved preferences.">
        <div class="brand-eyebrow">Basic Search</div>
        <p class="brand-subtitle">Click on the Gear icon to set your insert Preferences.</p>
      </section>

      <section class="search-panel">
        <div class="inputContainer" style="direction: ltr;">
          <input type="text" placeholder="Search for a text" id="inputBox" autocomplete="off" aria-label="Search for a text">
          <span id="helperCompletionText"></span>
        </div>

        <div class="suggestionBoxContainer" style="direction: ltr;">
          <select id="suggestionBox" multiple onchange="setInputBoxValue()"></select>
        </div>
      </section>

      <section class="display-panel addContainer">
        <details class="sidebar-accordion display-layout-accordion">
          <summary class="display-layout-summary">Display &amp; Layout</summary>
          <div class="display-layout-body">
            <div class="compact-section-label">Display</div>
            <div class="mode-card-group compact-mode-card-group" role="radiogroup" aria-label="Display mode">
              <button type="button" class="mode-card" data-mode="en" role="radio" aria-checked="false" title="Translation"><span class="mode-card-content"><span class="mode-card-symbol latin">A</span></span></button>
              <button type="button" class="mode-card" data-mode="both" role="radio" aria-checked="false" title="Original with Translation"><span class="mode-card-content both"><span class="mode-card-symbol latin">A</span><span class="mode-card-plus">+</span><span class="mode-card-symbol">א</span></span></button>
              <button type="button" class="mode-card" data-mode="he" role="radio" aria-checked="false" title="Original"><span class="mode-card-content"><span class="mode-card-symbol">א</span></span></button>
            </div>
            <div class="compact-section-label bilingual-layout-wrapper">Bilingual layout</div>
            <div class="layout-option-group bilingual-layout-wrapper" role="radiogroup" aria-label="Bilingual layout">
              <button type="button" class="layout-option" data-layout="he-right" role="radio" aria-checked="false">Side by side</button>
              <button type="button" class="layout-option" data-layout="he-top" role="radio" aria-checked="false">Stacked</button>
              <button type="button" class="layout-option" data-layout="he-left" role="radio" aria-checked="false">Reverse</button>
            </div>
            <div class="versions-panel basic-versions-panel">
              <div class="version-control translation-version-control"></div>
              <details class="advanced-version-details">
                <summary>Original edition (advanced)</summary>
                <p class="advanced-version-note">Optional: choose a specific Hebrew/original edition only when needed.</p>
                <div class="version-control hebrew-version-control"></div>
              </details>
            </div>
          </div>
        </details>
      </section>

      <section class="preview-section">
        <details class="sidebar-accordion preview-accordion" open>
          <summary class="display-layout-summary">Preview</summary>
          <div class="preview-panel">
            <section id="previewContainer" class="bi">
        <div class="textContainer"></div>
            </section>
          </div>
        </details>
      </section>
    </main>

   <footer>
      <section class="primary-actions" aria-label="Primary actions">
        <button class="submit primary-action-button" id="addSourceButton" disabled>Add Source</button>
        <button class="submit secondary-action-button" id="open-on-sefaria" disabled title="Open the selected source on Sefaria"><span class="open-sefaria-label"><span class="sefaria-badge samekh" aria-hidden="true">ס</span><span>Sefaria</span><span class="external-link-icon" aria-hidden="true">↗</span></span></button>
      </section>
      <section class="sidebar-footer-tools" aria-label="Tools">
        <button type="button" class="footer-tool-button open-divine-names-tool" id="transformNamesButton" title="Transform Divine Names" aria-label="Transform Divine Names"><span class="tool-icon-stack"><span class="samekh-sized">ה</span><span class="tool-arrow">→</span><span class="samekh-sized">ש</span></span></button>
        <button type="button" class="footer-tool-button open-linker-tool" id="linkTextsButton" title="Link Texts with Sefaria" aria-label="Link Texts with Sefaria"><span class="tool-icon-stack"><span class="link-emoji">🔗</span><span class="tool-arrow">→</span><span class="sefaria-badge samekh" aria-hidden="true">ס</span></span></button>
        <button type="button" class="footer-tool-button open-preferences-tool" id="openPreferencesButton" title="Preferences" aria-label="Preferences"><span class="footer-icon footer-gear-icon">⚙︎</span></button>
      </section>
	  <div class="footer">
      <div class="footerContainer footerLinks">
        <a target="_blank" href="https://help.sefaria.org/hc/en-us/sections/20235182393244">Help</a>
        <a target="_blank" href="https://sefaria.formstack.com/forms/google_docs_extension_feedback">Feedback</a>
      </div>
      <div class="footerContainer footerLogo">
        <img src="https://www.sefaria.org/static/img/logo.svg" alt="Sefaria Logo">
      </div>
    </div>
    </footer>

      <select id="addFormat" class="visually-hidden" aria-hidden="true">
        <option value="stack">Bilingual Stacked</option>
        <option value="sbs">Bilingual Side-by-Side</option>
        <option value="en">English Only</option>
        <option value="he">Hebrew Only</option>
      </select>

      <select id="translationSetter" class="visually-hidden" aria-hidden="true"></select>
      <select id="hebrewVersionSetter" class="visually-hidden" aria-hidden="true"></select>

    <?!= include('basic_js'); ?>
  </body>

</html>
