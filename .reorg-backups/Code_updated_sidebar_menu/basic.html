<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons.css">
    <?!= include('basic_css'); ?>
  </head>
  <body>
    <aside class="hide">
      <img src="https://www.sefaria.org/static/img/ajax-loader.gif" name="loading">
    </aside>

    <main class="basic-shell">
      <div class="sidebar-scroll">
        <section class="search-panel unified-search-panel">
          <div class="inputContainer" style="direction: ltr;">
            <input type="text" placeholder="Search for a text" id="inputBox" autocomplete="off" aria-label="Search for a text">
            <span id="helperCompletionText"></span>
          </div>
          <button class="search-submit" id="run-basic-search" type="button">Find</button>
        </section>

        <section class="suggestion-panel">
          <div class="suggestionBoxContainer" style="direction: ltr;">
            <select id="suggestionBox" multiple onchange="setInputBoxValue()"></select>
          </div>
        </section>

        <section class="display-layout-wrapper" style="display:none;">
          <details class="sidebar-accordion display-layout-accordion">
            <summary class="section-label accordion-summary">Display &amp; Layout</summary>
            <div class="display-layout-section accordion-panel">
              <div class="section-label compact-section-label">Display</div>
              <div class="mode-card-group compact-mode-card-group" role="radiogroup" aria-label="Display mode">
                <button class="mode-card" data-mode="en" role="radio" aria-checked="false" title="Translation"><span class="mode-card-content"><span class="mode-card-symbol latin">A</span></span><span class="mode-card-label visually-hidden">Translation</span></button>
                <button class="mode-card" data-mode="both" role="radio" aria-checked="false" title="Original with Translation"><span class="mode-card-content both"><span class="mode-card-symbol latin">A</span><span class="mode-card-plus">+</span><span class="mode-card-symbol">א</span></span><span class="mode-card-label visually-hidden">Original with Translation</span></button>
                <button class="mode-card" data-mode="he" role="radio" aria-checked="false" title="Original"><span class="mode-card-content"><span class="mode-card-symbol">א</span></span><span class="mode-card-label visually-hidden">Original</span></button>
              </div>

              <div class="section-label compact-section-label bilingual-layout-wrapper">Bilingual layout</div>
              <div class="layout-option-group bilingual-layout-wrapper" role="radiogroup" aria-label="Bilingual layout">
                <button class="layout-option" data-layout="he-top" aria-label="Hebrew on top" title="Hebrew on top"><span class="layout-icon layout-icon-top" aria-hidden="true"></span></button>
                <button class="layout-option" data-layout="he-left" aria-label="Hebrew on left" title="Hebrew on left"><span class="layout-icon layout-icon-left" aria-hidden="true"></span></button>
                <button class="layout-option" data-layout="he-right" aria-label="Hebrew on right" title="Hebrew on right"><span class="layout-icon layout-icon-right" aria-hidden="true"></span></button>
              </div>

              <div class="version-control translation-version-control"></div>
            </div>
          </details>
        </section>

        <section class="preview-section">
          <details class="sidebar-accordion preview-accordion" open>
            <summary class="section-label accordion-summary">Preview</summary>
            <div class="preview-panel accordion-panel">
              <section id="previewContainer" class="bi stack">
                <div class="textContainer"><b>Please enter the title of a text or a source to insert.</b></div>
              </section>
            </div>
          </details>
        </section>

        <select class="output-mode-selection visually-hidden" aria-hidden="true">
          <option value="both" selected>Original with Translation</option>
          <option value="he">Original</option>
          <option value="en">Translation</option>
        </select>
        <select class="bilingual-layout-selection visually-hidden" aria-hidden="true">
          <option value="he-right" selected>Hebrew right</option>
          <option value="he-left">Hebrew left</option>
          <option value="he-top">Hebrew on top</option>
        </select>
      </div>
    </main>

    <footer class="sidebar-footer">
      <section class="primary-actions" aria-label="Primary actions">
        <button class="submit primary-action-button" id="insert-source" disabled>Add Source</button>
        <button class="submit secondary-action-button" id="open-on-sefaria" disabled title="Open the selected source on Sefaria"><span class="open-sefaria-label"><span class="sefaria-badge samekh" aria-hidden="true">ס</span><span>Sefaria</span><span class="external-link-icon" aria-hidden="true">↗</span></span></button>
      </section>
      <section class="sidebar-footer-tools" aria-label="Tools">
        <button type="button" class="footer-tool-button open-divine-names-tool" title="Transform Divine Names" aria-label="Transform Divine Names"><span class="tool-icon-stack"><span class="samekh-sized">ה</span><span class="tool-arrow">→</span><span class="samekh-sized">ש</span></span></button>
        <button type="button" class="footer-tool-button open-linker-tool" title="Link Texts with Sefaria" aria-label="Link Texts with Sefaria"><span class="tool-icon-stack"><span class="link-emoji">🔗</span><span class="tool-arrow">→</span><span class="sefaria-badge samekh" aria-hidden="true">ס</span></span></button>
        <button type="button" class="footer-tool-button open-preferences-tool" title="Preferences" aria-label="Preferences"><span class="footer-icon footer-gear-icon">⚙︎</span></button>
      </section>
      <div class="sefaria-footer-compact">
        <div class="sefaria-footer-links">
          <a target="_blank" href="https://help.sefaria.org/hc/en-us/sections/20235182393244">Help</a>
          <a target="_blank" href="https://sefaria.formstack.com/forms/google_docs_extension_feedback">Feedback</a>
        </div>
        <div class="sefaria-footer-logo">
          <img src="https://www.sefaria.org/static/img/logo.svg" alt="Sefaria Logo">
        </div>
      </div>
    </footer>

    <?!= include('basic_js'); ?>
  </body>
</html>
