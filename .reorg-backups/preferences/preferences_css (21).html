<style>
  html,
  body {
    height: 100%;
  }

  body {
    background: #f8f7f5;
    color: #222;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    overflow: hidden;
  }

  #results {
    color: green;
  }

  .preferences-dialog {
    display: flex;
    flex-direction: column;
    height: 100vh;
    margin: 0 auto;
    max-width: 520px;
  }

  .preferences-shell {
    flex: 1;
    min-height: 0;
    min-width: 0;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 12px 16px 16px;
  }

  .save-bar {
    align-items: center;
    background: #fff;
    border-top: 1px solid #ddd;
    display: flex;
    gap: 12px;
    padding: 10px 16px;
  }

  .save-actions {
    align-items: center;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .save-feedback {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .save-note {
    color: #666;
    font-size: 11px;
    line-height: 1.35;
  }

  .hide {
    background: rgba(255, 255, 255, 0.55);
    inset: 0;
    position: fixed;
    z-index: 50;
  }

  .hide > img {
    left: 50%;
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
  }

  .section-card {
    background: #fff;
    border: 1px solid #e3dfd8;
    border-radius: 10px;
    margin-bottom: 12px;
    min-width: 0;
    padding: 12px 14px;
  }

  .section-card h1 {
    font-size: 16px;
    line-height: 1.2;
    margin: 0 0 8px;
  }

  .section-accordion {
    overflow: hidden;
    padding: 0;
  }

  .section-card-summary {
    align-items: center;
    cursor: pointer;
    display: flex;
    font-size: 16px;
    font-weight: 700;
    justify-content: space-between;
    list-style: none;
    padding: 14px 16px;
  }

  .section-card-summary::-webkit-details-marker {
    display: none;
  }

  .section-card-summary::after {
    color: #666;
    content: "▾";
    font-size: 13px;
  }

  .section-accordion:not([open]) .section-card-summary::after {
    content: "▸";
  }

  .section-card-body {
    padding: 0 14px 14px;
  }

  .section-note,
  .mini-help {
    color: #666;
    font-size: 12px;
    line-height: 1.45;
    margin: 0 0 10px;
  }

  .mini-help {
    font-size: 11px;
    margin-top: 8px;
  }

  .subsection-title {
    color: #333;
    font-size: 13px;
    font-weight: 700;
    margin: 10px 0 6px;
  }

  .compact-field,
  .preference-field {
    min-width: 0;
  }

  .compact-field label,
  .preference-field label {
    color: #555;
    display: block;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .compact-field input,
  .compact-field select,
  .preference-field input[type="number"],
  .preference-field input[type="text"],
  .preference-field select {
    box-sizing: border-box;
    min-width: 0;
    width: 100%;
  }

  .compact-field .custom-select,
  .compact-field select,
  .replacement-row .custom-select,
  .replacement-row select {
    max-width: 240px;
  }

  .compact-field input[type="number"],
  .compact-field input[type="text"],
  .override-editor input,
  input[name="god_replacement"] {
    background: #fff;
    border: 1px solid #d2d0ca !important;
    border-radius: 8px !important;
    box-sizing: border-box !important;
    height: 32px !important;
    padding: 0 10px !important;
  }

  .compact-field input[type="number"] {
    font-size: 12px;
    line-height: 32px;
    padding: 0 6px !important;
    text-align: center;
  }

  .compact-field select {
    font-size: 12px;
    height: 30px;
    padding: 4px 6px;
  }

  .compact-field select optgroup {
    font-size: 11px;
    font-weight: 600;
  }

  .enhanced-native-select {
    height: 1px !important;
    left: -9999px !important;
    opacity: 0 !important;
    pointer-events: none !important;
    position: absolute !important;
    width: 1px !important;
  }

  .compact-row {
    align-items: end;
    display: grid;
    gap: 6px !important;
    grid-template-columns: minmax(0, 1fr) 72px 112px !important;
  }

  .replacement-grid {
    display: grid;
    gap: 8px;
    margin-top: 10px;
  }

  .replacement-row {
    align-items: center;
    display: grid;
    gap: 10px;
    grid-template-columns: auto minmax(80px, 110px) minmax(120px, 1fr);
  }

  .replacement-row input[type="text"],
  .replacement-row select {
    min-width: 0;
  }

  .scheme-inline-row {
    align-items: end;
    display: grid;
    gap: 8px;
    grid-template-columns: 58px minmax(0, 1fr);
    margin: 10px 0;
  }

  .override-editor {
    align-items: end;
    display: grid;
    gap: 6px;
    grid-template-columns: 64px minmax(0, 1fr) auto auto;
    margin-top: 10px;
  }

  .override-grid,
  .override-grid.tight {
    align-items: stretch !important;
    display: grid !important;
    gap: 2px !important;
    grid-template-columns: repeat(6, 1fr) !important;
    margin-top: 8px;
    width: 100%;
  }

  .segmented-row {
    display: grid;
    gap: 6px;
    grid-template-columns: 1fr;
    margin: 10px 0;
  }

  .toggle-row {
    align-items: center;
    display: flex;
    gap: 12px;
    justify-content: space-between;
    margin: 10px 0;
  }

  .custom-select {
    position: relative;
    width: 100%;
  }

  .custom-select.open .custom-select-menu {
    display: block;
  }

  .custom-select-button {
    align-items: center;
    background: #fff;
    border: 1px solid #d2d0ca;
    border-radius: 8px;
    box-sizing: border-box;
    cursor: pointer;
    display: flex;
    font-size: 12px;
    gap: 8px;
    height: 32px;
    justify-content: space-between;
    line-height: 1.2;
    padding: 0 10px;
    text-align: left;
    width: 100%;
  }

  .custom-select-caret {
    color: #666;
    flex: 0 0 auto;
    font-size: 12px;
    line-height: 1;
  }

  .custom-select-group-label {
    color: #777;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 6px 8px 4px;
    text-transform: uppercase;
  }

  .custom-select-menu {
    background: #fff;
    border: 1px solid #d2d0ca;
    border-radius: 8px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    box-sizing: border-box;
    display: none;
    left: 0;
    max-height: 220px;
    overflow-y: auto;
    padding: 4px;
    position: absolute;
    right: 0;
    top: calc(100% + 4px);
    z-index: 20;
  }

  .custom-select-option {
    background: transparent;
    border: 0;
    border-radius: 6px;
    box-sizing: border-box;
    cursor: pointer;
    display: block;
    font-size: 12px;
    line-height: 1.2;
    padding: 7px 8px;
    text-align: left;
    width: 100%;
  }

  .custom-select-option:hover,
  .custom-select-option.is-selected {
    background: #e8eef7;
    color: #1f3b68;
  }

  .custom-select-value {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .inline-preview {
    background: #fafafa;
    border: 1px solid #ddd;
    border-radius: 6px;
    line-height: 1.45;
    margin-top: 6px;
    overflow-wrap: anywhere;
    padding: 6px 8px;
    word-break: break-word;
  }

  .inline-preview .label {
    color: #666;
    display: block;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    margin-bottom: 2px;
  }

  .inline-preview.hebrew {
    direction: rtl;
    font-size: 1.2rem;
  }

  .inline-preview.translation,
  .inline-preview.transliteration {
    direction: ltr;
    font-size: 1rem;
  }

  .switch {
    display: inline-block;
    flex: 0 0 auto;
    height: 24px;
    position: relative;
    width: 42px;
  }

  .switch input {
    height: 0;
    opacity: 0;
    width: 0;
  }

  .switch input:checked + .slider {
    background-color: #1f3b68;
  }

  .switch input:checked + .slider:before {
    transform: translateX(18px);
  }

  .switch input:focus + .slider {
    box-shadow: 0 0 0 2px rgba(31, 59, 104, 0.15);
  }

  .slider {
    background-color: #c7c7c7;
    border-radius: 999px;
    cursor: pointer;
    inset: 0;
    position: absolute;
    transition: 0.2s;
  }

  .slider:before {
    background-color: white;
    border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    content: "";
    height: 18px;
    left: 3px;
    position: absolute;
    top: 3px;
    transition: 0.2s;
    width: 18px;
  }

  .toggle-copy,
  .segmented-copy {
    flex: 1;
    min-width: 0;
  }

  .toggle-help,
  .segmented-help {
    color: #666;
    font-size: 11px;
    line-height: 1.35;
    margin-top: 2px;
  }

  .toggle-title,
  .segmented-title {
    color: #333;
    font-size: 13px;
    font-weight: 600;
  }

  .segmented-control {
    background: #f4f3f1;
    border: 1px solid #d2d0ca;
    border-radius: 12px !important;
    display: grid;
    gap: 0 !important;
    grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
    max-width: 100%;
    overflow: hidden !important;
    width: 100% !important;
  }

  .segmented-option {
    align-items: center !important;
    background: transparent;
    border: 0;
    border-radius: 0 !important;
    color: #444;
    cursor: pointer;
    display: flex !important;
    height: 40px !important;
    justify-content: center !important;
    margin: 0 !important;
    min-width: 0 !important;
    padding: 0 10px !important;
  }

  .segmented-option + .segmented-option {
    border-left: 1px solid #d2d0ca !important;
  }

  .segmented-option.active {
    background: #1f3b68;
    color: #fff;
  }

  .style-control {
    align-items: center;
    background: #f4f3f1;
    border: 1px solid #d2d0ca;
    border-radius: 10px;
    display: grid !important;
    gap: 0 !important;
    grid-template-columns: repeat(3, 1fr) !important;
    height: 32px !important;
    max-width: 100%;
    overflow: hidden !important;
  }

  .style-btn {
    align-items: center !important;
    background: transparent;
    border: 0;
    border-radius: 0 !important;
    color: #444;
    cursor: pointer;
    display: flex !important;
    font-size: 13px;
    font-weight: 700;
    height: 32px !important;
    justify-content: center !important;
    line-height: 1 !important;
    margin: 0 !important;
    min-width: 0 !important;
    padding: 0 8px !important;
  }

  .style-btn + .style-btn {
    border-left: 1px solid #d2d0ca !important;
  }

  .style-btn.active {
    background: #1f3b68;
    color: #fff;
  }

  .style-btn.italic {
    font-style: italic;
  }

  .style-btn.underline {
    text-decoration: underline;
  }

  details.compact-accordion {
    background: #faf9f7;
    border: 1px solid #e3dfd8;
    border-radius: 8px;
    margin-top: 10px;
    min-width: 0;
    padding: 0;
  }

  details.compact-accordion > summary {
    color: #333;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    list-style: none;
    padding: 10px 12px;
  }

  details.compact-accordion > summary::-webkit-details-marker {
    display: none;
  }

  details.compact-accordion > summary::before {
    color: #666;
    content: "▸";
    margin-right: 6px;
  }

  details.compact-accordion[open] > summary::before {
    content: "▾";
  }

  .compact-accordion-body {
    padding: 0 12px 12px;
  }

  .nested-accordion {
    margin-top: 12px;
  }

  .accordion-summary-note {
    color: #666;
    font-weight: 400;
    margin-left: 8px;
  }

  .override-char-btn,
  #override_grid.tight .override-char-btn {
    align-items: center;
    background: #fff;
    border: 1px solid #d2d0ca;
    border-radius: 4px;
    box-sizing: border-box !important;
    cursor: pointer;
    display: inline-flex;
    font-size: 12px;
    height: 26px !important;
    justify-content: center;
    line-height: 1 !important;
    min-height: 34px;
    min-width: 0;
    padding: 0 !important;
    vertical-align: middle;
    width: 100%;
  }

  .override-char-btn.active {
    background: #c9d5e8;
    border-color: #1f3b68;
  }

  .override-char-btn:hover {
    border-color: #1f3b68;
  }

  .override-item {
    align-items: center;
    display: flex;
    gap: 6px;
    justify-content: space-between;
    padding: 2px 0;
  }

  .override-list {
    border-top: 1px solid #e0ddd7;
    color: #444;
    font-size: 14px;
    margin-top: 10px;
    padding-top: 8px;
  }

  .replacement-label {
    color: #333;
    font-size: 13px;
    white-space: nowrap;
  }

  .preferences-toc {
    box-shadow: none;
    position: static;
  }

  .toc-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-start;
  }

  .toc-header-row {
    align-items: flex-start;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: space-between;
  }

  .small-button {
    background: #fff;
    border: 1px solid #d2d0ca;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    line-height: 1.2;
    padding: 2px 6px;
    white-space: nowrap;
  }

  .small-button:hover {
    border-color: #1f3b68;
  }

  .reset-preferences-button,
  .refresh-sidebar-button {
    background: #fff;
    border: 1px solid #cbd5e1;
    color: #1f3b68;
  }

  .modal-backdrop[hidden] {
    display: none;
  }

  .modal-backdrop {
    align-items: center;
    background: rgba(17, 24, 39, 0.35);
    display: flex;
    inset: 0;
    justify-content: center;
    padding: 16px;
    position: fixed;
    z-index: 60;
  }

  .modal-card {
    background: #fff;
    border: 1px solid #d7d3cb;
    border-radius: 12px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
    padding: 18px;
    width: min(420px, 100%);
  }

  .modal-card h2 {
    font-size: 18px;
    margin: 0 0 8px;
  }

  .modal-card p {
    color: #444;
    line-height: 1.45;
    margin: 0 0 14px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .visually-hidden {
    border: 0;
    clip: rect(0, 0, 0, 0);
    height: 1px;
    margin: -1px;
    overflow: hidden;
    padding: 0;
    position: absolute;
    width: 1px;
  }
</style>
