<style>
  @import url("https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Frank+Ruhl+Libre:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap");
  /* =========================
     1. DESIGN TOKENS
     ========================= */
   :root {
    --bg: #fbfbfa;
    --border: #d9d8d3;
    --card: #f3f1ed;
    --muted: #666666;
    --panel: #ffffff;
    --selected: #18345d;
    --selected-hover: #22426f;
    --selected-soft: #ddeeff;
    --text: #222222;
    --sefaria-blue: #18345d;
    --lighter-grey: #ededec;
    --tanakh-teal: #004e5f;
    --mishnah-blue: #5a99b7;
    --talmud-gold: #ccb479;
    --midrash-green: #5d956f;
    --halakhah-red: #802f3e;
    --kabbalah-purple: #594176;
    --liturgy-rose: #ab4e66;
    --philosophy-purple: #7f85a9;
    --chasidut-green: #97b386;
    --musar-purple: #7c416f;
    --commentary-blue: #4b71b7;
    --reference-orange: #d4896c;
    --modern-works-blue: #b8d4d3;
    --apocrypha-pink: #c6a7b4;
    --tanaitic-green: #00827f;
  }

  /* =========================
     2. BASE / PAGE
     ========================= */
  aside {
    background: white;
    color: black;
    display: none;
    height: 100%;
    left: 0;
    position: absolute;
    top: 0;
    width: 100%;
    z-index: 5;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Roboto", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    margin: 0;
  }

  body.custom-mode .default-only {
    display: none !important;
  }

  body.default-mode .advanced-only,
  body.default-mode .custom-only {
    display: none !important;
  }

  body.default-mode details.sidebar-accordion[open] > .accordion-panel.custom-sensitive {
    display: none !important;
  }

  body.smart-mode .advanced-only {
    display: none !important;
  }

  main {
    box-sizing: border-box;
    display: flex !important;
    flex-direction: column !important;
    gap: 0 !important;
    height: 100vh !important;
    margin: 0;
    min-height: 100vh !important;
    overflow: hidden !important;
    padding: 12px 12px 0 !important;
  }

  /* =========================
     3. GENERIC UTILITIES
     ========================= */
  .alef {
    font-size: 1.15em;
  }

  .branding-text {
    padding-top: 0.5em;
  }

  .helper-text {
    color: var(--muted);
    font-size: 11px;
    margin: 4px 0 0;
  }

  .section-label {
    color: #444;
    font-size: 13px;
    font-weight: 600;
    margin: 14px 0 8px;
  }

  .brand-header {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    padding: 14px 14px 12px;
  }

  .brand-eyebrow {
    color: var(--sefaria-blue);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .brand-title {
    color: var(--sefaria-blue);
    font-family: "Frank Ruhl Libre", "Noto Serif Hebrew", serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1.15;
    margin: 0;
  }

  .brand-subtitle {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.45;
    margin: 6px 0 0;
  }

  .section-muted {
    opacity: 0.55;
  }

  .subsection-label {
    color: #5d6878;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    margin: 12px 0 6px;
    text-transform: uppercase;
  }

  .visually-hidden {
    border: 0;
    clip: rect(0, 0, 0, 0);
    height: 1px;
    margin: -1px;
    overflow: hidden;
    padding: 0;
    position: absolute;
    width: 1px;
  }

  [class="hide"] > img {
    left: 48%;
    position: absolute;
    top: 48%;
  }

  /* =========================
     4. FORM INPUTS / SELECTS
     ========================= */
  .filter-field label {
    color: #666;
    display: block;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .input {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-sizing: border-box;
    display: block !important;
    font-family: "EB Garamond", Georgia, serif;
    font-size: 18px;
    height: auto !important;
    margin: 0 !important;
    padding: 10px 12px;
    width: 100% !important;
  }

  .multi-select-button {
    align-items: center;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-sizing: border-box;
    color: var(--text);
    cursor: pointer;
    display: flex;
    font-size: 13px;
    gap: 8px;
    justify-content: space-between;
    min-height: 38px;
    padding: 8px 10px;
    text-align: left;
    width: 100%;
  }

  .multi-select-button-text {
    display: block;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .multi-select-caret {
    color: #666;
    font-size: 12px;
  }

  .multi-select-dropdown {
    position: relative;
    width: 100%;
  }

  .multi-select-dropdown.open .multi-select-menu {
    display: block;
  }

  .multi-select-menu {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.10);
    display: none;
    left: 0;
    max-height: 240px;
    overflow-y: auto;
    padding: 6px;
    position: absolute;
    right: 0;
    top: calc(100% + 4px);
    z-index: 15;
  }

  .multi-select-option {
    align-items: center;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    font-size: 13px;
    gap: 8px;
    padding: 7px 8px;
  }

  .multi-select-option:hover {
    background: #f4f6f9;
  }

  .multi-select-option input {
    margin: 0;
  }

  .search-filter-select,
  .search-sort-select,
  .translation-filter-input,
  .translation-version-select,
  .versioning-select {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-sizing: border-box;
    font-size: 14px;
    line-height: 1.3;
    min-height: 38px;
    padding: 8px 10px;
    width: 100%;
  }

  .search-filter-select,
  .search-sort-select {
    appearance: none;
    background-image: none !important;
    font-size: 13px;
    min-height: 36px;
    -moz-appearance: none;
    -webkit-appearance: none;
  }

  .search-filter-select[multiple] {
    min-height: 132px;
    padding: 6px;
  }

  .search-filter-select:focus,
  .search-filter-select:hover,
  .search-sort-select:focus,
  .search-sort-select:hover {
    background: #fff;
    border-color: var(--selected);
  }

  .search-sort-select {
    border-radius: 10px;
    font-weight: 600;
    min-height: 38px;
  }

  .translation-version-select {
    margin-top: 6px;
    min-height: 150px;
    padding: 4px;
  }

  .translation-version-select option {
    margin-left: 0;
    padding-left: 0;
    text-indent: 0;
  }

  .translation-version-select option.translation-unavailable {
    color: #7a7a7a;
    font-style: italic;
  }

  .ui-autocomplete {
    overflow-y: scroll;
    width: 240px !important;
  }

  /* =========================
     5. SEARCH / FILTER LAYOUT
     ========================= */
  .dual-toggle-grid {
    align-items: center !important;
    display: grid !important;
    gap: 8px !important;
    grid-template-columns: 1fr 1fr !important;
  }

  .option-toggle-row,
  .translation-filter-row {
    margin: 0;
    min-height: 36px;
  }

  .query-hint {
    color: var(--muted);
    font-size: 12px;
  }

  .query-intel-row {
    display: none !important;
  }

  .refined-search-toggles {
    display: grid;
    gap: 10px;
    margin-top: 10px;
  }

  .reference-input-shell {
    flex: 1;
    min-width: 0;
  }

  .reference-row {
    align-items: center;
    display: flex;
    gap: 8px;
  }

  .reference-row .input {
    border-radius: 12px !important;
    min-height: 42px;
  }

  .search-control-row {
    align-items: stretch;
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr;
    margin-top: 8px;
  }

  .search-filter-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    display: grid;
    gap: 8px;
    padding: 10px;
  }

  .search-filter-grid {
    align-items: start;
    display: grid;
    gap: 8px;
    grid-template-columns: minmax(0, 1fr) 110px;
  }

  .search-filter-grid.refined-search-filter-grid {
    align-items: start;
    grid-template-columns: minmax(0, 1fr) 120px;
  }

  .search-filter-header {
    color: #444;
    font-size: 12px;
    font-weight: 700;
    margin: 0;
  }

  .search-filter-toggles {
    align-items: center;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .translation-language-panel {
    margin-top: -2px;
  }

  /* =========================
     6. BUTTONS / PRIMARY ACTIONS
     ========================= */
  #insert-source,
  #open-on-sefaria,
  #run-sefaria {
    align-items: center;
    align-self: center;
    background: var(--selected);
    border: 0;
    border-radius: 10px;
    color: #fff;
    display: inline-flex;
    font-size: 13px;
    font-weight: 600;
    justify-content: center;
    margin: 0;
    min-height: 42px;
    padding: 10px 12px;
    width: auto !important;
  }



  .primary-actions {
    background: #fff;
    border-radius: 14px 14px 0 0;
    border-top: 1px solid var(--border);
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr 1fr;
    padding: 10px 12px 8px;
  }

  .primary-action-button,
  .secondary-action-button {
    align-items: center !important;
    border-radius: 10px !important;
    box-sizing: border-box !important;
    display: inline-flex !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    justify-content: center !important;
    min-height: 44px !important;
    padding: 10px 12px !important;
    width: 100% !important;
  }

  .primary-action-button {
    background: var(--selected) !important;
    border: 1px solid var(--selected) !important;
    color: #fff !important;
  }

  .secondary-action-button {
    background: #fff !important;
    border: 1px solid #7f97bb !important;
    color: #5b7094 !important;
    font-family: "Frank Ruhl Libre", "Noto Serif Hebrew", Georgia, serif !important;
  }


  #insert-source,
  #open-on-sefaria {
    font-size: 14px;
    gap: 0;
    margin-top: 12px;
    min-height: 44px;
    width: 100%;
  }

  #insert-source:disabled,
  #open-on-sefaria:disabled,
  #run-sefaria:disabled {
    opacity: 0.5;
  }

  #insert-source:not(:disabled):hover,
  #run-sefaria:not(:disabled):hover {
    background: var(--selected-hover);
  }

  #open-on-sefaria {
    align-items: center !important;
    background: #fff;
    border: 1px solid #7f97bb;
    color: #5b7094;
    font-family: "Frank Ruhl Libre", "Noto Serif Hebrew", Georgia, serif;
    justify-content: center !important;
  }

  #open-on-sefaria:not(:disabled):hover {
    background: var(--selected-soft);
    border-color: #5b7094;
    color: #28598c;
  }

  .footer-tool-button {
    align-items: center !important;
    background: #fff;
    border: 0 !important;
    border-radius: 0 !important;
    color: var(--selected);
    cursor: pointer;
    display: inline-flex !important;
    font-size: 20px;
    gap: 4px !important;
    justify-content: center !important;
    line-height: 1 !important;
    margin: 0;
    min-height: 52px !important;
    padding: 0 6px !important;
  }

  .footer-tool-button + .footer-tool-button {
    border-left: 1px solid var(--border);
  }

  .footer-tool-button .footer-gear-icon,
  .footer-tool-button .samekh-sized,
  .footer-tool-button .sefaria-badge.samekh {
    font-size: 24px !important;
    line-height: 1 !important;
  }
  
  .footer-tool-button .link-emoji {
    font-size: 18px !important;
    line-height: 1 !important;
  }

  .footer-tool-button:hover {
    background: var(--selected-soft);
    border-color: var(--selected);
  }

  .footer-gear-icon {
    font-weight: 800 !important;
  }

  .results-toggle-button {
    border-radius: 8px !important;
    font-size: 12px !important;
    max-width: 100% !important;
    padding: 4px 8px !important;
    width: auto !important;
  }

  .results-tool.lang-tool-button {
    background: #fff !important;
    border: 1px solid #d2d0ca !important;
    border-radius: 8px !important;
    color: #1f3b68 !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    height: 24px !important;
    min-height: 24px !important;
    padding: 0 6px !important;
  }

  /* =========================
     7. TOGGLES / SWITCHES
     ========================= */
  .compact-option-toggle-row {
    align-items: center !important;
    min-height: 30px !important;
  }

  .compact-option-toggle-row > label:first-child {
    font-size: 12px !important;
    line-height: 1.2 !important;
  }

  .compact-option-toggle-row .slider:before {
    height: 12px !important;
    left: 3px !important;
    top: 3px !important;
    width: 12px !important;
  }

  .compact-option-toggle-row .switch {
    height: 18px !important;
    width: 34px !important;
  }

  .compact-option-toggle-row .switch input:checked + .slider:before {
    transform: translateX(16px) !important;
  }

  .experience-bar {
    display: grid !important;
    gap: 6px;
    margin-bottom: 8px;
  }

  .experience-copy,
  .experience-note {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.35;
  }

  .experience-note {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
  }

  .experience-note-row {
    margin-bottom: 8px;
  }

  .experience-pill {
    background: transparent;
    border: 0 !important;
    border-radius: 0 !important;
    cursor: pointer;
    font-size: 13px !important;
    font-weight: 700;
    margin: 0 !important;
    min-height: 34px;
    padding: 10px 12px !important;
  }

  .experience-pill + .experience-pill {
    border-left: 1px solid var(--border);
  }

  .experience-pill.active {
    background: var(--selected);
    color: #fff;
  }

  .experience-toggle {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    display: grid !important;
    gap: 0 !important;
    grid-template-columns: 1fr 1fr !important;
    overflow: hidden;
    padding: 0 !important;
    width: 100%;
  }

  .relevance-toggle {
    align-items: center;
    color: #444;
    display: inline-flex;
    font-size: 12px;
    gap: 6px;
    user-select: none;
    white-space: nowrap;
  }

  .slider {
    background: #c7c7c7;
    border-radius: 999px;
    cursor: pointer;
    inset: 0;
    position: absolute;
    transition: 0.2s;
  }

  .slider:before {
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    content: "";
    height: 18px;
    left: 3px;
    position: absolute;
    top: 3px;
    transition: 0.2s;
    width: 18px;
  }

  .switch {
    display: inline-block;
    flex: 0 0 auto;
    height: 24px;
    position: relative;
    width: 42px;
  }

  .switch input {
    height: 0;
    opacity: 0;
    position: absolute;
    width: 0;
  }

  .switch input:checked + .slider {
    background: var(--selected);
  }

  .switch input:checked + .slider:before {
    transform: translateX(18px);
  }

  .toggle-row {
    align-items: center;
    display: flex;
    gap: 8px;
    justify-content: space-between;
  }

  .toggle-row + .toggle-row {
    margin-top: 10px;
  }

  /* =========================
     8. MODE / LAYOUT CARDS
     ========================= */
  .compact-mode-card-group,
  .mode-card-group,
  .mode-card-group.compact-mode-card-group {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    display: grid !important;
    gap: 0 !important;
    grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
    overflow: hidden;
  }

  .layout-icon {
    background: #f7f7f5;
    border: 1px solid #bcb8b1;
    border-radius: 4px;
    height: 20px;
    position: relative;
    width: 26px;
  }

  .layout-icon::after,
  .layout-icon::before {
    background: #b3b0aa;
    content: "";
    position: absolute;
  }

  .layout-icon-left::after,
  .layout-icon-right::after {
    height: 100%;
    right: 0;
    top: 0;
    width: 11px;
  }

  .layout-icon-left::before,
  .layout-icon-right::before {
    height: 100%;
    left: 0;
    top: 0;
    width: 11px;
  }

  .layout-icon-left::before {
    background: #7f97bb;
  }

  .layout-icon-right::after {
    background: #7f97bb;
  }

  .layout-icon-top::after {
    bottom: 1px;
    height: 7px;
    left: 0;
    width: 100%;
  }

  .layout-icon-top::before {
    background: #7f97bb;
    height: 7px;
    left: 0;
    top: 1px;
    width: 100%;
  }

  .layout-option {
    background: #fff;
    border: 0 !important;
    border-radius: 0 !important;
    display: flex;
    height: 42px;
    justify-content: center;
    margin: 0 !important;
    padding: 0;
    width: 100% !important;
  }

  .layout-option[title] {
    position: relative;
  }

  .layout-option + .layout-option {
    border-left: 1px solid var(--border) !important;
  }

  .layout-option.selected {
    background: var(--selected-soft);
    border-color: var(--selected);
    box-shadow: inset 0 0 0 1px var(--selected);
  }

  .layout-option:focus-visible,
  .mode-card:focus-visible {
    outline: 2px solid var(--selected);
    outline-offset: 2px;
  }

  .layout-option-group {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    display: grid !important;
    gap: 0 !important;
    grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
    overflow: hidden;
  }

  .layout-option-group .layout-option {
    border: 0;
    border-radius: 0;
    box-shadow: none;
    margin: 0;
    min-height: 42px;
    min-width: 0;
    width: 100%;
  }

  .layout-option-group .layout-option + .layout-option {
    border-left: 1px solid var(--border);
  }

  .mode-card {
    background: #fff !important;
    border: 0 !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    color: var(--text);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin: 0 !important;
    min-height: 54px;
    padding: 8px 4px;
    text-align: center;
    width: 100%;
  }

  .mode-card + .mode-card {
    border-left: 1px solid var(--border) !important;
  }

  .mode-card-content {
    align-items: center;
    display: inline-flex;
    gap: 4px;
    justify-content: center;
    line-height: 1;
    text-decoration: none;
  }

  .mode-card:hover {
    border-color: var(--selected);
  }

  .mode-card-indicator {
    display: none;
  }

  .mode-card-label {
    color: inherit;
    font-size: 11px;
    font-weight: 600;
  }

  .mode-card-plus {
    color: currentColor;
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
    margin-top: 1px;
  }

  .mode-card.selected {
    background: #1f3b68 !important;
    border-color: #1f3b68 !important;
    color: #eef4ff !important;
  }

  .mode-card.selected .mode-card-plus,
  .mode-card.selected .mode-card-symbol {
    color: #eef4ff !important;
  }

  .mode-card-symbol {
    display: inline-block;
    flex: 0 0 auto;
    font-family: "SBL Hebrew", "Ezra SIL", "Frank Ruhl Libre", serif;
    font-size: 30px !important;
    line-height: 1 !important;
    text-decoration: none;
    transform: translateY(-1px);
  }

  .mode-card-symbol.latin {
    font-family: "Crimson Text", "EB Garamond", Georgia, serif;
    font-size: 28px !important;
    font-weight: 700;
  }

  .mode-card > span:first-child {
    margin-right: 0;
    text-align: center;
  }

  /* =========================
     9. PANELS / CONTAINERS
     ========================= */
  .options-panel,
  .preview-panel,
  .versions-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
  }

  .results-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-top: 12px;
    overflow: visible !important;
    padding: 10px;
  }

  .sidebar-footer-tools {
    background: #fff;
    border-radius: 0 0 14px 14px;
    border-top: 1px solid var(--border);
    display: grid !important;
    flex: 0 0 auto !important;
    gap: 0 !important;
    grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
    margin-top: auto !important;
    overflow: hidden;
    padding-top: 0 !important;
    position: static !important;
    z-index: 4;
