<script>
  window.UI_STATE = window.UI_STATE || {};

  function getAppConfig() {
    return window.APP_CONFIG || {};
  }

  function initializePreferenceState(bootstrap) {
    return {
      accountPreferences: clonePlainObject((bootstrap && (bootstrap.accountPreferences || bootstrap.preferences)) || {}),
      sessionPreferences: clonePlainObject((bootstrap && bootstrap.sessionState) || {}),
      effectivePreferences: clonePlainObject((bootstrap && (bootstrap.effectivePreferences || bootstrap.preferences)) || ((bootstrap && (bootstrap.accountPreferences || bootstrap.preferences)) || {})),
      sidebarSessionId: (bootstrap && bootstrap.sessionId) || null,
      mode: (bootstrap && bootstrap.mode) || (getAppConfig().mode || '')
    };
  }

  function isTextsMode(mode) {
    return String(mode || '') === 'texts';
  }

  function isVoicesMode(mode) {
    return String(mode || '') === 'voices';
  }

  function isExperimentalMode(mode) {
    return String(mode || '') === 'experimental';
  }

  function mergeEffectivePreferences(accountPreferences, sessionPreferences, allowSessionOverrides) {
    return allowSessionOverrides
      ? mergePreferenceLayers(accountPreferences, sessionPreferences)
      : mergePreferenceLayers(accountPreferences, {});
  }

  function hasSessionPreferenceOverrides(sessionPreferences) {
    return Object.keys(sessionPreferences || {}).length > 0;
  }
</script>
