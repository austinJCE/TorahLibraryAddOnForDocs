<style>
    /* note: no need to really make the layout responsive any more than vw and vh usage, due to the constraints of Google Add-ons.*/
    :root {
      --bg: #f5f5f3;
      --panel: #ffffff;
      --card: #e9e7e3;
      --border: #d4d0ca;
      --text: #222222;
      --muted: #6b6b6b;
      --selected: #1f3b68;
      --selected-hover: #29497d;
      --selected-soft: #c9d5e8;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .ui-autocomplete {
      width: 240px !important;
      overflow-y: scroll;
    }

    [class=hide] > img {
      position: absolute;
      top: 48%; 
      left: 48%;
    }

    main {
      margin: 0;
      min-height: 100vh;
      overflow:auto;
      padding: 12px;
      box-sizing: border-box;
    }

    aside {
      display: none; 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      color: black; 
      background: white; 
      z-index: 5;
    }

    .reference-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-control-row {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .search-filter-select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      background-image: none !important;
      padding: 8px 10px;
      font-size: 13px;
      min-height: 36px;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    .search-filter-select:hover,
    .search-filter-select:focus {
      background: #fff;
      border-color: var(--selected);
    }

    .relevance-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #444;
      white-space: nowrap;
      user-select: none;
    }

    #run-sefaria,
    #insert-source {
      border: 0;
      border-radius: 10px;
      background: var(--selected);
      color: #fff;
      padding: 10px 12px;
      min-height: 42px;
      font-size: 13px;
      font-weight: 600;
      width: auto !important;
      margin: 0;
      align-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #run-sefaria:disabled,
    #insert-source:disabled {
      opacity: 0.5;
    }

    #run-sefaria:not(:disabled):hover,
    #insert-source:not(:disabled):hover {
      background: var(--selected-hover);
    }

    #insert-source {
      margin-top: 12px;
      width: 100%;
    }

    /* extremely ungainly usage of !important, need to fix at some point */
    .input {
      margin: 0 !important;
      display: block !important;
      width: 100% !important;
      height: auto !important;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .reference-input-shell {
      flex: 1;
      min-width: 0;
    }

    .section-label {
      margin: 14px 0 8px;
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    .mode-card-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mode-card {
      border: 1px solid transparent;
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
      padding: 12px 14px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      cursor: pointer;
      font-size: 14px;
    }

    .mode-card > span:first-child {
      flex: 1;
      text-align: left;
      margin-right: 10px;
    }

    .mode-card:hover {
      border-color: var(--border);
    }

    .mode-card.selected {
      background: var(--selected);
      color: #fff;
    }

    .mode-card:focus-visible,
    .layout-option:focus-visible {
      outline: 2px solid var(--selected);
      outline-offset: 2px;
    }

    .mode-card-indicator {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid currentColor;
      box-sizing: border-box;
    }

    .mode-card.selected .mode-card-indicator {
      background: currentColor;
      box-shadow: inset 0 0 0 3px var(--selected);
    }

    .layout-option-group {
      display: flex;
      gap: 8px;
    }

    .layout-option {
      width: 50px;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .layout-option.selected {
      border-color: var(--selected);
      box-shadow: inset 0 0 0 1px var(--selected);
      background: var(--selected-soft);
    }

    .layout-icon {
      position: relative;
      width: 26px;
      height: 20px;
      border: 1px solid #bcb8b1;
      border-radius: 4px;
      background: #f7f7f5;
    }

    .layout-icon::before,
    .layout-icon::after {
      content: '';
      position: absolute;
      background: #b3b0aa;
    }

    .layout-icon-top::before {
      height: 7px;
      width: 100%;
      top: 1px;
      left: 0;
      background: #7f97bb;
    }

    .layout-icon-top::after {
      height: 7px;
      width: 100%;
      left: 0;
      bottom: 1px;
    }

    .layout-icon-left::before,
    .layout-icon-right::before {
      top: 0;
      width: 11px;
      height: 100%;
      left: 0;
    }

    .layout-icon-left::after,
    .layout-icon-right::after {
      top: 0;
      width: 11px;
      height: 100%;
      right: 0;
    }

    .layout-icon-left::before {
      background: #7f97bb;
    }

    .layout-icon-right::after {
      background: #7f97bb;
    }

    .options-panel,
    .versions-panel,
    .preview-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .toggle-row + .toggle-row {
      margin-top: 10px;
    }

    .helper-text {
      margin: 4px 0 0;
      font-size: 11px;
      color: var(--muted);
    }

    .version-control + .version-control {
      margin-top: 10px;
    }

    .version-control-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }

    .version-count {
      font-size: 11px;
      color: var(--muted);
    }

    .version-label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      font-weight: 600;
      color: #555;
    }

    .versioning-select,
    .translation-filter-input,
    .translation-version-select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 8px 10px;
      font-size: 14px;
      min-height: 38px;
      line-height: 1.3;
    }


    .suggestions {
      margin: 0;
      min-height: 150px;
      max-height: 46vh;
      overflow: auto;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
    }

    .results-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      padding: 10px;
      margin-top: 12px;
    }

    .result-group-label {
      margin: 0 0 6px;
      font-size: 12px;
      color: #555;
      font-weight: 600;
    }

    .result-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .result-list + .result-group-label {
      margin-top: 10px;
    }

    .result-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 8px 10px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      margin-bottom: 6px;
      display: block;
      box-sizing: border-box;
    }

    .result-item.selected {
      border-color: var(--selected);
      background: var(--selected-soft);
      box-shadow: inset 0 0 0 1px var(--selected);
    }

    .result-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
      overflow-wrap: anywhere;
    }

    .result-type {
      display: inline-block;
      margin-bottom: 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5d6878;
      font-weight: 700;
    }

    .result-subtitle,
    .result-snippet {
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .preview-table {
      width: 100%;
      border-collapse: collapse;
    }

    .preview-table td {
      vertical-align: top;
      width: 50%;
      padding: 0 6px 8px;
    }

    .preview-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      overflow-wrap: anywhere;
    }

    .preview-he {
      direction: rtl;
    }

    .branding-text {
      padding-top: 0.5em;
    }

    .translation-version-select {
      margin-top: 6px;
      min-height: 150px;
      padding: 4px;
    }

    .translation-version-select option {
      text-indent: 0;
      padding-left: 0;
      margin-left: 0;
    }

    .translation-selected-display {
      margin-top: 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.4;
      max-height: 88px;
      overflow: auto;
      white-space: normal;
      word-break: break-word;
    }

    .preview-refresh-status {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .preview-refresh-status::before {
      content: '';
      width: 10px;
      height: 10px;
      border: 2px solid #d2d7df;
      border-top-color: #5672a5;
      border-radius: 50%;
      animation: preview-spin 0.8s linear infinite;
    }

    @keyframes preview-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .advanced-version-details {
      margin-top: 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      opacity: 0.9;
    }

    .advanced-version-details summary {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      list-style: none;
    }

    .advanced-version-note {
      margin: 6px 0 0;
      font-size: 11px;
      color: var(--muted);
    }

    .section-muted {
      opacity: 0.55;
    }

    .noninsertable-warning {
      border: 1px solid #e7c97a;
      background: #fff7e0;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 4px;
    }

    .noninsertable-warning .preview-state-title {
      color: #6a4d00;
      margin-bottom: 4px;
    }

    .insert-warning {
      border: 1px solid #d93025;
      background: #fdecea;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      color: #8d1f1a;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }

    .advanced-version-details summary::-webkit-details-marker {
      display: none;
    }

    .advanced-version-details summary::before {
      content: '▸';
      margin-right: 6px;
      color: #666;
    }

    .advanced-version-details[open] summary::before {
      content: '▾';
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .results-toggle-button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--selected);
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .selected-result-summary {
      margin-bottom: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 8px 10px;
      font-size: 12px;
      color: #444;
    }

    .selected-result-summary strong {
      display: block;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 2px;
      overflow-wrap: anywhere;
    }

    .results-hint {
      margin: 8px 0 0;
      font-size: 12px;
      color: var(--muted);
      display: none;
    }

    .preview-state-title {
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 600;
    }

    .preview-state-message {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    
    .sidebar-accordion {
      border: 0;
      margin: 0;
      padding: 0;
    }

    .accordion-summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      margin: 14px 0 8px;
    }

    .accordion-summary::-webkit-details-marker {
      display: none;
    }

    .accordion-summary::before {
      content: '▸';
      margin-right: 6px;
      color: #666;
    }

    .sidebar-accordion[open] > .accordion-summary::before {
      content: '▾';
    }

    .accordion-panel {
      margin-top: 0;
    }

    .sidebar-footer-tools {
      position: sticky;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
      padding-top: 10px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      z-index: 2;
    }

    .footer-tool-button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--selected);
      padding: 8px 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 40px;
      text-align: center;
    }

    .footer-tool-button:hover,
    .footer-tool-button:focus {
      border-color: var(--selected);
      background: var(--selected-soft);
    }

    .footer-tool-icon {
      line-height: 1;
    }

</style>
