<script>
    //no need for $(document).ready() since this script is loaded at the end of the page
    $(".input").attr("disabled",true);
    var data = {};

    const sidebarState = {
      preferences: {},
      session: {
        experienceMode: 'default'
      }
    };

    function mergeSidebarPreferences(preferences) {
      sidebarState.preferences = Object.assign({}, sidebarState.preferences, preferences || {});
      return sidebarState.preferences;
    }

    function readSidebarPreference(key, fallbackValue) {
      const value = sidebarState.preferences[key];
      return value === undefined || value === null || value === '' ? fallbackValue : value;
    }

    const syncSidebarPreferenceDrivenUI = () => {
      $('.include-translation-source-info').prop('checked', readSidebarPreference('include_translation_source_info', 'false') == 'true');
      $('.wants-vowels').prop('checked', readSidebarPreference('nekudot', 'true') !== 'false');
      $('.wants-cantillation').prop('checked', readSidebarPreference('teamim', 'true') !== 'false');
      $('.include-transliteration').prop('checked', readSidebarPreference('include_transliteration_default', 'false') == 'true');
      $('.insert-sefaria-link').prop('checked', readSidebarPreference('insert_sefaria_link_default', 'true') !== 'false');
      $('.wants-pesukim').prop('checked', readSidebarPreference('show_line_markers_default', 'true') !== 'false');
      $('.output-mode-selection').val(readSidebarPreference('output_mode_default', 'both'));
      $('.bilingual-layout-selection').val(readSidebarPreference('bilingual_layout_default', 'he-right'));
    };

    const applySidebarPreferences = (preferences) => {
      mergeSidebarPreferences(preferences || {});
      syncSidebarPreferenceDrivenUI();
    };

    google.script.run.withSuccessHandler((preferences) => {
      applySidebarPreferences(preferences);
    }).getPreferences();

    const saveSidebarPreference = (payload, onDone) => {
      mergeSidebarPreferences(payload || {});
      google.script.run.withSuccessHandler(() => {
        if (typeof onDone === 'function') onDone();
      }).setPreferences(payload);
    };

    $('.include-translation-source-info').on('change', () => {
      saveSidebarPreference({
        include_translation_source_info: $('.include-translation-source-info').is(':checked')
      });
    });

    $('.include-transliteration').on('change', () => {
      saveSidebarPreference({
        include_transliteration_default: $('.include-transliteration').is(':checked')
      });
    });

    $('.insert-sefaria-link').on('change', () => {
      saveSidebarPreference({
        insert_sefaria_link_default: $('.insert-sefaria-link').is(':checked')
      });
    });

    $('.wants-pesukim').on('change', () => {
      saveSidebarPreference({
        show_line_markers_default: $('.wants-pesukim').is(':checked')
      });
    });
    function initializeSidebar(titles) {
    
      $(".input").removeAttr("disabled");

      $('.suggestions').html("<b>Please enter the title of a text or a source to insert.</b>");

      $('.input').autocomplete({
          source: ( request, response ) => {
              let matches = $.map(titles, (tag) => {
                if ( tag.toUpperCase().indexOf(request.term.toUpperCase()) === 0 ) {
                  return tag;
                }
            });
          response(matches);
                  },
                  open: () => { 
                            $('.input').autocomplete("widget").width(280);
                        }  
                  });

      const updatePesukimAvailability = (response) => {
        const supportsLineMarkers = !!(
          response && (
            Array.isArray(response.he) ||
            Array.isArray(response.text) ||
            response.lineMarkersAvailable === true
          )
        );

        $('.pesukim-wrapper').toggle(supportsLineMarkers);
        $('.wants-pesukim').prop('disabled', !supportsLineMarkers);
        if (!supportsLineMarkers) {
          $('.wants-pesukim').prop('checked', false);
          $('.pesukim-help').text('Line markers are unavailable for this selection (single-block text).');
        } else {
          if (!$('.wants-pesukim').prop('checked')) {
            $('.wants-pesukim').prop('checked', true);
          }
          $('.pesukim-help').text('Applies to segmented refs (e.g., verse/line ranges).');
        }
      };

      const setInsertButtonState = (enabled) => {
        $('#insert-source').prop('disabled', !enabled);
      };

      const updateBilingualLayoutVisibility = () => {
        let outputMode = $('.output-mode-selection').val();
        $('.bilingual-layout-wrapper').toggle(outputMode === 'both');
      };

      const updateTranslationDetailsVisibility = () => {
        let outputMode = $('.output-mode-selection').val();
        $('.translation-details-row, .translation-details-help').toggle(outputMode === 'both' || outputMode === 'en');
      };

      const updateHebrewOptionsVisibility = () => {
        let outputMode = $('.output-mode-selection').val();
        $('.hebrew-options-row').toggle(outputMode !== 'en');
      };

      const updateVersionControlsVisibility = () => {
        let outputMode = $('.output-mode-selection').val();
        $('.translation-version-control').toggle(outputMode !== 'he');
        $('.advanced-version-details').toggle(outputMode !== 'en');
      };

      const normalizeOptionText = (value) => {
        return String(value || '')
          .replace(/&nbsp;/gi, ' ')
          .replace(/<[^>]*>/g, '')
          .replace(/[\u200B-\u200D\uFEFF\u200E\u200F\u202A-\u202E]/g, '')
          .replace(/^[\s\-–—:•·]+/, '')
          .replace(/\s+/g, ' ')
          .trim();
      };

      const showInsertWarning = (message) => {
        let warningText = String(message || 'Could not insert at the current selection. Place the cursor where you want the source inserted, then try again.').trim();
        $('.insert-warning').remove();
        $('.suggestions').prepend(`<div class='insert-warning' role='alert' aria-live='assertive'>${escapeHTML(warningText)}</div>`);
      };

      const buildSefariaOpenUrl = () => {
        if (!data || !data.ref) {
          return '';
        }

        const refSlug = encodeURIComponent(data.ref).replace(/%20/g, '_');
        const params = new URLSearchParams();
        const outputMode = $('.output-mode-selection').val();
        const languageByMode = {
          en: 'en',
          he: 'he',
          both: 'bi'
        };
        const selectedLang = languageByMode[outputMode] || 'bi';
        if (selectedLang) {
          params.set('lang', selectedLang);
        }

        const selectedTranslationVersion = $('.translation-version-select').val() || data.versionTitle || '';
        const selectedSourceVersion = $('.he-version-selection').val() || data.heVersionTitle || '';

        if (selectedTranslationVersion) {
          params.set('ven', selectedTranslationVersion);
        }
        if (selectedSourceVersion) {
          params.set('vhe', selectedSourceVersion);
        }

        const query = params.toString();
        return query ? `https://www.sefaria.org/${refSlug}?${query}` : `https://www.sefaria.org/${refSlug}`;
      };

      const normalizeUnifiedReferenceInput = (value) => {
        let normalized = String(value || '').trim();
        if (!normalized) {
          return '';
        }
        normalized = normalized
          .replace(/[־‐-―]/g, '-')
          .replace(/[“”„‟″״]/g, '"')
          .replace(/[‘’‚‛′׳]/g, "'")
          .replace(/[‎‏‪-‮]/g, '')
          .replace(/׃/g, ':')
          .replace(/\s*[:：]\s*/g, ':')
          .replace(/\s*[-–—]\s*/g, '-')
          .replace(/([֐-׿])["'׳״]+(?=[\s:.-]|$)/g, '$1')
          .replace(/([֐-׿])["'׳״]+(?=[֐-׿])/g, '$1')
          .replace(/\s+/g, ' ')
          .trim();
        return normalized;
      };

      const isLikelyHebrewScriptInput = (value) => {
        const normalized = String(value || '').trim();
        return /[\u0590-\u05FF]/.test(normalized) && !/[A-Za-z]/.test(normalized);
      };

      const normalizeLatinLookupTitleCase = (value) => {
        const input = String(value || '').trim();
        if (!input || !/[A-Za-z]/.test(input) || /[\u0590-\u05FF]/.test(input) || !Array.isArray(titles)) {
          return input;
        }

        const lowerInput = input.toLowerCase();
        let bestMatch = '';
        let bestMatchLength = 0;

        titles.forEach((title) => {
          const candidate = String(title || '').trim();
          if (!candidate || !/[A-Za-z]/.test(candidate)) {
            return;
          }

          const lowerCandidate = candidate.toLowerCase();
          if (lowerInput !== lowerCandidate && lowerInput.indexOf(`${lowerCandidate} `) !== 0 && lowerInput.indexOf(`${lowerCandidate}:`) !== 0) {
            return;
          }

          if (candidate.length > bestMatchLength) {
            bestMatch = candidate;
            bestMatchLength = candidate.length;
          }
        });

        if (!bestMatch) {
          return input;
        }

        return `${bestMatch}${input.slice(bestMatchLength)}`;
      };

      const mapSefariaRefSlugToLookupRef = (slug) => {
        let decoded = String(slug || '').trim();
        if (!decoded) {
          return '';
        }
        try {
          decoded = decodeURIComponent(decoded);
        } catch (error) {
          // Keep original slug if decode fails.
        }
        decoded = decoded.replace(/^\/+/g, '').replace(/\/+/g, '/').replace(/_/g, ' ');
        let parts = decoded.split('/').filter(Boolean);
        if (!parts.length) {
          return '';
        }
        let titlePart = parts[0];
        let sectionPart = parts.slice(1).join(':');
        return sectionPart ? `${titlePart} ${sectionPart}` : titlePart;
      };

      const parseSefariaUrlInput = (inputValue) => {
        let raw = String(inputValue || '').trim();
        if (!raw) {
          return null;
        }

        let parsedUrl;
        try {
          parsedUrl = new URL(raw);
        } catch (error) {
          return null;
        }

        let host = (parsedUrl.hostname || '').toLowerCase();
        if (host.indexOf('sefaria.org') < 0) {
          return null;
        }

        let path = (parsedUrl.pathname || '').replace(/^\/+/, '');
        if (!path) {
          return null;
        }

        let blockedRoots = { api: true, texts: true, sheets: true, topics: true, collections: true, account: true, profile: true, help: true };
        let slug = path.split('/')[0] || '';
        if (!slug || blockedRoots[slug.toLowerCase()]) {
          return null;
        }

        let ref = mapSefariaRefSlugToLookupRef(path);
        if (!ref) {
          return null;
        }

        let lang = (parsedUrl.searchParams.get('lang') || '').toLowerCase().trim();
        let outputMode = 'both';
        if (lang === 'en') {
          outputMode = 'en';
        } else if (lang === 'he') {
          outputMode = 'he';
        }

        return {
          ref,
          outputMode,
          preferredVersions: {
            en: parsedUrl.searchParams.get('ven') || '',
            he: parsedUrl.searchParams.get('vhe') || ''
          }
        };
      };

      const updateActionabilityUI = (state) => {
        const isActionable = !!(state && state.isInsertable);
        $('.display-section, .layout-section, .options-section, .versions-section').toggleClass('section-muted', !isActionable);
      };

      const syncDisplayModeCards = () => {
        let outputMode = $('.output-mode-selection').val();
        $('.mode-card').each(function() {
          let isSelected = $(this).attr('data-mode') === outputMode;
          $(this).toggleClass('selected', isSelected);
          $(this).attr('aria-checked', isSelected ? 'true' : 'false');
        });
      };

      const syncLayoutCards = () => {
        let selectedLayout = $('.bilingual-layout-selection').val();
        $('.layout-option').each(function() {
          let isSelected = $(this).attr('data-layout') === selectedLayout;
          $(this).toggleClass('selected', isSelected);
          $(this).attr('aria-pressed', isSelected ? 'true' : 'false');
        });
      };

      const isResolvedReference = (response) => {
        return !!(response && response.ref && response.indexTitle && !response.error);
      };

      const hasRenderableText = (value) => {
        if (Array.isArray(value)) {
          return value.some((part) => hasRenderableText(part));
        }
        if (value === null || value === undefined) {
          return false;
        }
        const stripped = String(value)
          .replace(/<[^>]*>/g, '')
          .replace(/&nbsp;/gi, ' ')
          .trim();
        return stripped.length > 0;
      };

      const getResolvedNodeState = (response) => {
        const resolved = isResolvedReference(response);
        const hasText = hasRenderableText(response && response.text);
        const hasHebrew = hasRenderableText(response && response.he);
        const isInsertable = resolved && (hasText || hasHebrew);
        const isStructural = resolved && !isInsertable;
        return {
          resolved,
          hasText,
          hasHebrew,
          isInsertable,
          isStructural,
          prompt: buildDepthPrompt(response)
        };
      };

      const buildNonInsertableMessage = (response) => {
        const state = getResolvedNodeState(response);
        return `${buildPreviewMeta(response && (response.ref || response.heRef), response || '')}<div class='noninsertable-warning'><h4 class='preview-state-title'>This is a section, not a directly insertable text.</h4><p class='preview-state-message'>Choose a subsection or more specific reference to preview and insert.</p><p class='preview-state-message'>${escapeHTML(state.prompt)}</p></div>`;
      };

      const buildPreviewLoadingHTML = (message) => {
        let text = String(message || 'Refreshing preview…').trim();
        return `<div class='preview-loading' role='status' aria-live='polite'><span class='preview-loading-spinner' aria-hidden='true'></span><span>${escapeHTML(text)}</span></div>`;
      };

      const buildTranslationUnavailableLabel = (optionLabel) => {
        return `${normalizeOptionText(optionLabel)} — unavailable for this ref`;
      };

      const buildDepthPrompt = (response) => {
        let sectionNames = (response && Array.isArray(response.sectionNames)) ? response.sectionNames.filter(Boolean) : [];
        if (sectionNames.length >= 2) {
          return `Enter ${sectionNames[0]} and optionally a ${sectionNames[1]}. Specify a range with '-'.`;
        }
        if (sectionNames.length === 1) {
          return `Enter ${sectionNames[0]}. Specify a range with '-'.`;
        }
        return `Enter a valid reference to insert.`;
      };

      let latestResolveRequestId = 0;
      let latestQueryRequestId = 0;
      let latestDirectRefValidationRequestId = 0;
      let selectedResultKey = null;
      let selectedResultSummary = null;
      let selectedRefValue = null;
      let queryState = { libraryMatches: [], searchResults: [] };
      let resultsCollapsed = false;
      let pendingPreferredVersions = null;
      let translationAvailabilityByRef = {};

      let hasResolvedReference = false;
      setInsertButtonState(false);

      const refreshSelectedResult = () => {
        if (!selectedRefValue) {
          return;
        }
        const fallbackLabel = selectedResultSummary && selectedResultSummary.label ? selectedResultSummary.label : selectedRefValue;
        resolveSelectedResult(selectedRefValue, fallbackLabel);
      };

      const clearVersionSelectors = () => {
        $('.translation-version-control').empty();
        $('.hebrew-version-control').empty();
      };

      const setResultsHint = (message) => {
        const text = String(message || '').trim();
        if (!text) {
          $('.results-hint').hide().text('');
          return;
        }
        $('.results-hint').text(text).show();
      };

      const getCheckedValues = (selector) => $(selector).map(function() {
        return $(this).is(':checked') ? $(this).val() : null;
      }).get().filter(Boolean);

      const updateMultiSelectButtonLabel = (dropdownSelector, values, fallbackText, labelMap = null) => {
        const labels = values.map((value) => labelMap && labelMap[value] ? labelMap[value] : value);
        const text = labels.length ? labels.join(', ') : fallbackText;
        $(dropdownSelector + ' .multi-select-button-text').text(text);
      };

      const updateTranslationLanguageVisibility = () => {
        const enabled = $('.translation-only-filter').is(':checked');
        $('.translation-language-panel').toggle(enabled);
        if (enabled && !$('.translation-language-option:checked').length) {
          $('.translation-language-option[value="en"]').prop('checked', true);
        }
        updateMultiSelectButtonLabel('#translation-language-dropdown', getCheckedValues('.translation-language-option'), 'English', { en: 'English', es: 'Spanish', fr: 'French', de: 'German', ru: 'Russian', ar: 'Arabic', he: 'Hebrew' });
      };

      const inferQueryMode = (input) => {
        const raw = String(input || '').trim();
        if (!raw) return { badge: 'Ready', hint: 'Type a reference, title, phrase, or paste a Sefaria URL.', klass: '' };
        if (parseSefariaUrlInput(raw)) return { badge: 'Sefaria URL', hint: 'This will resolve directly from the pasted Sefaria link.', klass: 'url' };
        if (/\b(on|al|to)\b/i.test(raw) && /\d/.test(raw)) return { badge: 'Commentary', hint: 'Looks like a commentary or linked-text reference.', klass: 'commentary' };
        if (/\d/.test(raw) || /[֐-׿]/.test(raw)) return { badge: 'Reference detected', hint: 'The query looks like a direct reference lookup.', klass: 'direct' };
        return { badge: 'Full-text search', hint: 'The query will search titles and content.', klass: 'fulltext' };
      };

      const updateQueryIntel = (input) => {
        const info = inferQueryMode(input);
        $('#query-badge').attr('class', 'query-badge ' + (info.klass || '')).text(info.badge);
        $('#query-hint').text(info.hint);
      };

      const setExperienceMode = (mode) => {
        const nextMode = mode === 'custom' ? 'custom' : 'default';
        sidebarState.session.experienceMode = nextMode;
        $('body').removeClass('default-mode custom-mode').addClass(nextMode + '-mode');
        $('.experience-pill').each(function() {
          const isActive = $(this).attr('data-experience-mode') === nextMode;
          $(this).toggleClass('active', isActive).attr('aria-selected', isActive ? 'true' : 'false');
        });
        try { localStorage.setItem('sefariaSidebarExperienceMode', nextMode); } catch (e) {}
      };

      const loadExperienceMode = () => {
        let mode = 'default';
        try { mode = localStorage.getItem('sefariaSidebarExperienceMode') || 'default'; } catch (e) {}
        setExperienceMode(mode);
      };

      const saveRecentResult = (item) => {
        if (!item || !item.ref) return;
        try {
          const existing = JSON.parse(localStorage.getItem('sefariaSidebarRecentRefs') || '[]');
          const filtered = existing.filter((entry) => entry && entry.ref !== item.ref);
          filtered.unshift({ ref: item.ref, label: item.label || item.ref, subtitle: item.subtitle || '' });
          localStorage.setItem('sefariaSidebarRecentRefs', JSON.stringify(filtered.slice(0, 5)));
        } catch (e) {}
      };

      const renderRecentResults = () => {
        let items = [];
        try { items = JSON.parse(localStorage.getItem('sefariaSidebarRecentRefs') || '[]'); } catch (e) {}
        const $panel = $('.recent-results-panel');
        const $list = $('.recent-results');
        $list.empty();
        if (!items.length) {
          $panel.hide();
          return;
        }
        items.forEach((item, index) => {
          $list.append(`<li class='result-item recent-result-item' data-ref='${escapeHTML(item.ref)}' data-key='recent-${index}' role='button' tabindex='0'><div class='result-title'>${escapeHTML(item.label || item.ref)}</div>${item.subtitle ? `<div class='result-subtitle'>${escapeHTML(item.subtitle)}</div>` : ''}</li>`);
        });
        $panel.show();
      };

      let searchDebounceHandle = null;
      let keyboardResultIndex = -1;
      const focusResultByIndex = (index) => {
        const $items = $('.result-item');
        if (!$items.length) return;
        keyboardResultIndex = Math.max(0, Math.min(index, $items.length - 1));
        $items.removeClass('is-nav-target');
        const $target = $items.eq(keyboardResultIndex);
        $target.addClass('is-nav-target').focus();
      };

      const getSearchParameters = () => {
        const selectedCorpus = getCheckedValues('.search-corpus-option');
        const sortMode = $('.search-sort-select').val() || 'relevance';
        const translationOnly = $('.translation-only-filter').is(':checked');
        const translationLanguages = translationOnly ? getCheckedValues('.translation-language-option') : [];
        return {
          filters: selectedCorpus,
          relevanceSort: sortMode === 'relevance',
          sortMode,
          translationOnly,
          translationLanguages
        };
      };

      $('.wants-vowels, .wants-cantillation').on('change', () => {
        saveSidebarPreference({
          nekudot: $('.wants-vowels').is(':checked'),
          teamim: $('.wants-cantillation').is(':checked')
        }, refreshSelectedResult);
      });

      $('#insert-source').click(() => {
        if (!hasResolvedReference || !data || !data.ref) {
          return;
        }

        let outputMode = $('.output-mode-selection').val();
        let language = (outputMode === 'both') ? undefined : outputMode;
        let bilingualLayout = $('.bilingual-layout-selection').val();

        let showPesukim = Boolean($('.wants-pesukim').prop('checked'));
        let includeTranslationSourceInfo = $('.include-translation-source-info').is(':checked');
        let insertSefariaLink = $('.insert-sefaria-link').is(':checked');
        let input = $('.input').val();
        $('.hide').add($('.warning')).fadeIn('1000');
        google.script.run.withSuccessHandler(() => {
          $('.hide').add($('.warning')).fadeOut('1000');
          $('.insert-warning').remove();
        }).withFailureHandler((error) => {
          $('.hide').add($('.warning')).fadeOut('1000');
          showInsertWarning(error && error.message);
        }).insertReference(data, language, showPesukim, input, includeTranslationSourceInfo, bilingualLayout, insertSefariaLink);
        
        

      });

      const updateResultsVisibility = () => {
        const shouldCollapse = resultsCollapsed && !!selectedResultSummary;
        $('.results-lists').toggle(!shouldCollapse);
        $('.results-toggle-button').toggle(!!selectedResultSummary).text(shouldCollapse ? 'Show results' : 'Hide results');
        if (shouldCollapse) {
          $('.selected-result-summary').html(`<strong>${escapeHTML(selectedResultSummary.label)}</strong>${selectedResultSummary.subtitle ? `<div>${escapeHTML(selectedResultSummary.subtitle)}</div>` : ''}${selectedResultSummary.status ? `<div class='helper-text'>${escapeHTML(selectedResultSummary.status)}</div>` : ''}`).show();
        } else {
          $('.selected-result-summary').hide().empty();
        }
      };

      const clearSelectedResult = () => {
        selectedResultKey = null;
        selectedResultSummary = null;
        selectedRefValue = null;
        resultsCollapsed = false;
        hasResolvedReference = false;
        setInsertButtonState(false);
        $('#open-on-sefaria').prop('disabled', true);
        data = {};
        clearVersionSelectors();
        updatePesukimAvailability(null);
        $('.result-item').removeClass('selected').attr('aria-pressed', 'false');
        $('.suggestions').html("<b>Select a result to preview it.</b>");
        updateActionabilityUI({ isInsertable: false });
        updateResultsVisibility();
      };

      const renderResultGroup = (selector, items, groupName) => {
        const $list = $(selector);
        $list.empty();
        if (!items.length) {
          $list.append(`<li class='result-subtitle'>No ${groupName.toLowerCase()}.</li>`);
          return;
        }

        let lastCluster = '';
        items.forEach((item) => {
          const cluster = String((item.clusterLabel || item.typeLabel || groupName) || '').trim();
          if (cluster && cluster !== lastCluster) {
            $list.append(`<li class='result-cluster-label'>${escapeHTML(cluster)}</li>`);
            lastCluster = cluster;
          }
          const selectedClass = item.key === selectedResultKey ? 'selected' : '';
          const typeBadge = item.typeLabel ? `<div class='result-type'>${escapeHTML(item.typeLabel)}</div>` : '';
          const subtitle = item.subtitle ? `<div class='result-subtitle'>${escapeHTML(item.subtitle)}</div>` : '';
          const snippet = item.snippet ? `<div class='result-snippet'>${item.snippet}</div>` : '';
          $list.append(`<li class='result-item ${selectedClass}' data-key='${escapeHTML(item.key)}' data-ref='${escapeHTML(item.ref)}' role='button' tabindex='0' aria-pressed='${item.key === selectedResultKey ? 'true' : 'false'}'>${typeBadge}<div class='result-title'>${escapeHTML(item.label)}</div>${subtitle}${snippet}</li>`);
        });
      };

      const renderResults = () => {
        renderResultGroup('.library-results', queryState.libraryMatches, 'Library matches');
        renderResultGroup('.search-results', queryState.searchResults, 'Search results');
        updateResultsVisibility();
      };

      const compareResultsAlphabetically = (a, b, direction) => {
        const left = String((a && (a.label || a.ref)) || '').toLowerCase();
        const right = String((b && (b.label || b.ref)) || '').toLowerCase();
        return direction === 'desc' ? right.localeCompare(left) : left.localeCompare(right);
      };

      const itemMatchesTranslationLanguages = (item, languages) => {
        if (!item || item.hasTranslation === false) return false;
        const selected = Array.isArray(languages) ? languages.filter(Boolean) : [];
        if (!selected.length) return item.hasTranslation !== false;
        const available = Array.isArray(item.availableLangs) ? item.availableLangs.map((lang) => String(lang || '').toLowerCase()) : [];
        if (!available.length) {
          return selected.indexOf('en') >= 0 && item.hasTranslation !== false;
        }
        return selected.some((lang) => available.indexOf(String(lang || '').toLowerCase()) >= 0);
      };

      const applyClientSideSearchFilters = (items, searchParameters) => {
        let filtered = Array.isArray(items) ? items.slice() : [];
        if (searchParameters && searchParameters.translationOnly) {
          filtered = filtered.filter((item) => itemMatchesTranslationLanguages(item, searchParameters.translationLanguages));
        }
        if (searchParameters && searchParameters.sortMode === 'alphabetical-asc') {

        const availableLangs = Array.isArray(source && source.availableLangs)

        const clusterLabel = source.primary_category || (Array.isArray(source.categories) ? source.categories[0] : '') || typeLabel;
        return {
          key: `${keyPrefix}-${index}-${ref || index}`,
          ref,
          label: sourcePath[sourcePath.length - 1] || display.label || ref || 'Result',
          subtitle: breadcrumb,
          snippet,

          hasTranslation: source && (source.hasEn !== false && source.availableLangs ? source.availableLangs.indexOf('en') >= 0 : (Array.isArray(source.versions) ? source.versions.some((version) => version && version.language === 'en') : true))

      const runUnifiedQuery = () => {

        const prefixTitles = titles

        }).withFailureHandler(() => {

          const libraryPathHits = [];

          hits.forEach((hit, index) => {

            const snippet = hit && hit.highlight && hit.highlight.naive_lemmatizer && hit.highlight.naive_lemmatizer[0] ? hit.highlight.naive_lemmatizer[0] : '';
            const pathDepth = Array.isArray(source.path)

          queryState.libraryMatches = applyClientSideSearchFilters(queryState.libraryMatches.concat(filteredLibraryPathHits), searchParameters).slice(0, 10);

      function escapeHTML(value) {
        return String(value || "")
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatBreadcrumb(refValue) {
        let ref = String(refValue || '').trim();
        if (!ref) {
          return '';
        }

        let commaParts = ref.split(',').map((part) => part.trim()).filter(Boolean);
        if (commaParts.length <= 1) {
          return ref;
        }

        let title = commaParts[0];
        let pathPart = commaParts.slice(1).join(', ');
        let pathPieces = pathPart.split(':').map((part) => part.trim()).filter(Boolean);
        if (!pathPieces.length) {
          return ref;
        }

        return [title].concat(pathPieces).join(' › ');
      }

      function buildPreviewMeta(primaryRef, fallbackRef) {
        let breadcrumb = formatBreadcrumb(primaryRef);
        if (!breadcrumb && fallbackRef && fallbackRef.indexTitle && Array.isArray(fallbackRef.sections)) {
          breadcrumb = [fallbackRef.indexTitle].concat(fallbackRef.sections).join(' › ');
        }
        let fallback = '';
        if (typeof fallbackRef === 'string') {
          fallback = fallbackRef.trim();
        } else if (fallbackRef && typeof fallbackRef === 'object') {
          fallback = String(fallbackRef.ref || fallbackRef.heRef || primaryRef || '').trim();
        } else {
          fallback = String(primaryRef || '').trim();
        }
        let display = breadcrumb || fallback;
        return `<div class='preview-meta'>${escapeHTML(display)}</div>`;
      }

      function normalizeLanguage(version) {
        const suffixLanguageLUT = {
          en: 'English',
          he: 'Hebrew',
          ro: 'Romanian',
          yi: 'Yiddish',
          fr: 'French',
          de: 'German',
          es: 'Spanish',
          pt: 'Portuguese',
          ru: 'Russian',
          it: 'Italian',
          ar: 'Arabic',
          nl: 'Dutch',
          pl: 'Polish',
          hu: 'Hungarian',
          cs: 'Czech',
          uk: 'Ukrainian',
          tr: 'Turkish',
          lad: 'Ladino',
          su: 'Sundanese'
        };

        let lang = ((version.actualLanguage || version.language || "") + "").toLowerCase().trim();
        let family = (version.languageFamilyName || "").toString().trim();
        let normalizedFamily = family ? family.charAt(0).toUpperCase() + family.slice(1) : "";
        let title = (version.versionTitle || version.shortVersionTitle || '').toString().trim();
        let suffixMatch = title.match(/\[([a-z]{2,3})\]\s*$/i);
        let suffix = suffixMatch ? suffixMatch[1].toLowerCase() : '';
        let suffixLabel = suffixLanguageLUT[suffix] || '';
        let metadataLooksEnglish = ["en", "eng", "english"].indexOf(lang) >= 0 || /english/i.test(family);

        if (["he", "heb", "hebrew"].indexOf(lang) >= 0 || /hebrew/i.test(family)) {
          return { key: "he", label: "Hebrew" };
        }
        if (metadataLooksEnglish) {
          if (suffix && suffix !== 'en' && suffixLabel) {
            return { key: `other:${suffix}`, label: suffixLabel };
          }
          return { key: "en", label: "English" };
        }
        if (suffixLabel && normalizedFamily && /english/i.test(normalizedFamily) && suffix !== 'en') {
          return { key: `other:${suffix}`, label: suffixLabel };
        }
        if (!lang && normalizedFamily) {
          return { key: `other:${normalizedFamily.toLowerCase()}`, label: normalizedFamily };
        }
        if (!lang && suffixLabel) {
          return { key: `other:${suffix}`, label: suffixLabel };
        }
        if (!lang) {
          return { key: "en", label: "English" };
        }

        return { key: `other:${lang}`, label: normalizedFamily || suffixLabel || lang };
      }

      function extractYear(version) {
        let currentYear = (new Date()).getFullYear() + 1;
        let fields = [version.shortVersionTitle, version.versionTitle, version.versionNotes]
          .filter((value) => value)
          .map((value) => value.toString());

        let candidates = [];
        for (const field of fields) {
          let matches = field.match(/\b(1\d{3}|20\d{2}|2100)\b/g);
          if (!matches) continue;
          for (const m of matches) {
            let numeric = parseInt(m, 10);
            if (numeric >= 1000 && numeric <= currentYear) {
              candidates.push(numeric);
            }
          }
        }

        if (candidates.length === 0) {
          return null;
        }
        return Math.max.apply(null, candidates);
      }

      function buildVersionModel(dataIn) {
        let versions = Array.isArray(dataIn.versions) ? dataIn.versions : [];
        let seen = {};
        let normalized = [];

        versions.forEach((version, index) => {
          let safeVersion = version || {};
          let language = normalizeLanguage(safeVersion);
          let versionTitle = safeVersion.versionTitle || safeVersion.shortVersionTitle || `Untitled version #${index + 1}`;
          let dedupeKey = `${language.key}::${versionTitle}::${safeVersion.versionSource || ""}`;
          if (seen[dedupeKey]) {
            return;
          }
          seen[dedupeKey] = true;

          normalized.push({
            index,
            versionTitle,
            label: safeVersion.shortVersionTitle || safeVersion.versionTitle || versionTitle,
            fullTitle: safeVersion.versionTitle || versionTitle,
            languageKey: language.key,
            languageLabel: language.label,
            direction: safeVersion.direction,
            priority: Number(safeVersion.priority) || 0,
            isPrimary: !!safeVersion.isPrimary,
            year: extractYear(safeVersion)
          });
        });

        return normalized;
      }

      function sortVersionEntries(entries) {
        return entries.slice().sort((a, b) => {
          if (a.year !== null && b.year !== null && a.year !== b.year) {
            return b.year - a.year;
          }
          if (a.year !== null && b.year === null) {
            return -1;
          }
          if (a.year === null && b.year !== null) {
            return 1;
          }
          if (a.priority !== b.priority) {
            return b.priority - a.priority;
          }
          return a.index - b.index;
        });
      }

      function renderPreviewHTML(dataIn, inputTitle) {
        let mode = $('.output-mode-selection').val();
        if (mode === 'he') {
          return `${buildPreviewMeta(dataIn.heRef, dataIn)}<div class='preview-he'>${dataIn.he || '<p class="preview-state-message">No source text available.</p>'}</div>`;
        }
        if (mode === 'en') {
          return `${buildPreviewMeta(dataIn.ref, inputTitle)}<div>${dataIn.text || '<p class="preview-state-message">No translation text available.</p>'}</div>`;
        }
        return `<table class='preview-table'><tr><td>${buildPreviewMeta(dataIn.ref, inputTitle)}${dataIn.text || '<p class="preview-state-message">No translation text available.</p>'}</td><td class='preview-he'>${buildPreviewMeta(dataIn.heRef, dataIn)}${dataIn.he || '<p class="preview-state-message">No source text available.</p>'}</td></tr></table>`;
      }

      function updateSuggestion(dataIn, inputTitle) {
        const resolvedRef = dataIn && dataIn.ref ? dataIn.ref : inputTitle;
        let versionEntries = buildVersionModel(dataIn);
        let enSelectedVersionTitle = dataIn.versionTitle || "";
        let heSelectedVersionTitle = dataIn.heVersionTitle || "";

        let hebrewEntries = sortVersionEntries(versionEntries.filter((entry) => entry.languageKey === 'he'));
        let translationEntries = sortVersionEntries(versionEntries.filter((entry) => entry.languageKey !== 'he'));

        let selectVersionHebrew = `<div class="version-control-header"><label class="version-label" for="he-version-selection">Source version</label><span class="version-count">${hebrewEntries.length} available</span></div><select id="he-version-selection" class="versioning-select he-version-selection">`;
        hebrewEntries.forEach((entry) => {
          let selected = (entry.versionTitle === heSelectedVersionTitle) ? "selected" : "";
          selectVersionHebrew += `<option value="${escapeHTML(entry.versionTitle)}" ${selected}>${escapeHTML(entry.label)}</option>`;
        });
        selectVersionHebrew += `</select>`;

        let translationInput = `<div class="version-control-header"><label class="version-label" for="translation-version-filter">Translation versions</label><span class="version-count">${translationEntries.length} available</span></div><input type="text" id="translation-version-filter" class="translation-filter-input" placeholder="Filter by language or version name" aria-label="Filter translation versions"><select id="translation-version-selection" class="translation-version-select" size="6" aria-label="Translation versions"></select><div class="translation-selected-display" aria-live="polite"></div>`;

        let languageGroups = {};
        translationEntries.forEach((entry) => {
          if (!languageGroups[entry.languageLabel]) {
            languageGroups[entry.languageLabel] = [];
          }
          languageGroups[entry.languageLabel].push(entry);
        });

        let translationGroupLabels = Object.keys(languageGroups).sort((a, b) => {
          if (a === 'English') return -1;
          if (b === 'English') return 1;
          return a.localeCompare(b);
        });

        let translationItems = [];
        translationGroupLabels.forEach((groupLabel) => {
          let cleanGroupLabel = normalizeOptionText(groupLabel) || 'Other';
          if (!languageGroups[groupLabel] || languageGroups[groupLabel].length === 0) {
            return;
          }
          languageGroups[groupLabel].forEach((entry) => {
            let cleanLabel = normalizeOptionText(entry.fullTitle || entry.label || entry.versionTitle);
            let fallbackLabel = normalizeOptionText(entry.versionTitle);
            let normalizedLabel = cleanLabel || fallbackLabel || `Translation ${entry.index + 1}`;
            let optionLabel = normalizeOptionText(`${cleanGroupLabel} — ${normalizedLabel}`);
            translationItems.push({
              label: normalizedLabel,
              optionLabel,
              unavailableLabel: buildTranslationUnavailableLabel(optionLabel),
              value: entry.versionTitle,
              category: cleanGroupLabel,
              searchable: `${normalizedLabel} ${entry.versionTitle} ${cleanGroupLabel}`.toLowerCase(),
              availableForRef: Object.prototype.hasOwnProperty.call(translationAvailabilityByRef, `${resolvedRef}::${entry.versionTitle}`)
                ? translationAvailabilityByRef[`${resolvedRef}::${entry.versionTitle}`]
                : entry.versionTitle === enSelectedVersionTitle
            });
          });
        });

        let suggestion = renderPreviewHTML(dataIn, inputTitle);
        $('.translation-version-control').html(translationInput);
        $('.hebrew-version-control').html(selectVersionHebrew);
        $('.suggestions').html(suggestion);

        if (pendingPreferredVersions) {
          const preferredEn = pendingPreferredVersions.en || '';
          const preferredHe = pendingPreferredVersions.he || '';
          if (preferredEn && translationEntries.some((entry) => entry.versionTitle === preferredEn)) {
            enSelectedVersionTitle = preferredEn;
          }
          if (preferredHe && hebrewEntries.some((entry) => entry.versionTitle === preferredHe)) {
            heSelectedVersionTitle = preferredHe;
          }
        }

        let currentEnVersion = enSelectedVersionTitle;

        const syncSelectedTranslationDisplay = () => {
          let selectedOption = $('.translation-version-select option:selected');
          let selectedText = selectedOption.length ? selectedOption.text().trim() : '';
          let selectedTitle = selectedOption.length ? (selectedOption.attr('title') || '') : '';
          let displayText = selectedText || selectedTitle || 'No translation selected.';
          $('.translation-selected-display').text(displayText).attr('title', displayText);
        };

        const markTranslationAvailability = (resolvedVersionTitle, attemptedVersionTitle) => {
          let resolved = String(resolvedVersionTitle || '').trim();
          let attempted = String(attemptedVersionTitle || '').trim();
          if (!attempted) {
            return;
          }

          let wasResolved = !!(resolved && resolved === attempted);
          translationAvailabilityByRef[`${resolvedRef}::${attempted}`] = wasResolved;
          translationItems.forEach((item) => {
            if (item.value === attempted) {
              item.availableForRef = wasResolved;
            }
          });
        };

        const renderTranslationOptions = (filterTerm) => {
          let query = String(filterTerm || '').trim().toLowerCase();
          let filtered = translationItems.filter((item) => !query || item.searchable.indexOf(query) >= 0);
          let optionsHTML = '';
          let hasSelectableOption = false;

          if (!filtered.length) {
            optionsHTML = `<option value="" disabled>No matching translations</option>`;
          } else {
            filtered.forEach((item) => {
              let isUnavailable = item.availableForRef === false;
              let selected = item.value === currentEnVersion && !isUnavailable ? 'selected' : '';
              let disabled = isUnavailable ? 'disabled' : '';
              let optionClass = isUnavailable ? 'class="translation-unavailable"' : '';
              let label = isUnavailable ? item.unavailableLabel : item.optionLabel;
              if (!isUnavailable) {
                hasSelectableOption = true;
              }
              optionsHTML += `<option value="${escapeHTML(item.value)}" ${selected} ${disabled} ${optionClass} title="${escapeHTML(label)}">${escapeHTML(label)}</option>`;
            });
          }

          if (!hasSelectableOption && filtered.length) {
            optionsHTML += `<option value="" disabled>No available translations for this ref</option>`;
          }

          $('.translation-version-select').html(optionsHTML);
          if (!$('.translation-version-select').val()) {
            let firstEnabled = $('.translation-version-select option:not(:disabled)').first();
            if (firstEnabled.length) {
              firstEnabled.prop('selected', true);
              currentEnVersion = firstEnabled.val();
            }
          }
          if (currentEnVersion && !$('.translation-version-select option:selected').length) {
            currentEnVersion = '';
          }
          syncSelectedTranslationDisplay();
        };

        let getVersions = (targetTranslationVersion) => {
          let selectedTranslation = targetTranslationVersion || $('.translation-version-select').val();
          let enVersion = selectedTranslation || currentEnVersion || enSelectedVersionTitle;
          let heVersion = $('.he-version-selection').val();
          let versions = {"en": enVersion, "he": heVersion};
          let requestId = ++latestResolveRequestId;
          hasResolvedReference = false;
          setInsertButtonState(false);
          $('.suggestions').html(buildPreviewLoadingHTML('Refreshing preview…'));
          google.script.run.withSuccessHandler((response) => {
            if (requestId !== latestResolveRequestId) {
              return;
            }
            const nodeState = getResolvedNodeState(response);
            if (!nodeState.isInsertable) {
              hasResolvedReference = false;
              setInsertButtonState(false);
              clearVersionSelectors();
              updatePesukimAvailability(null);
              updateActionabilityUI(nodeState);
              $('.suggestions').html(`<br>${buildNonInsertableMessage(response)}`);
              return;
            }

            const resolvedTranslation = String((response && response.versionTitle) || '').trim();
            markTranslationAvailability(resolvedTranslation, enVersion);
            if (enVersion && resolvedTranslation && resolvedTranslation !== enVersion) {
              renderTranslationOptions($('.translation-filter-input').val());
            }

            updateSuggestion(response, inputTitle);
            updatePesukimAvailability(response);
            updateActionabilityUI(nodeState);
            data = response;
            hasResolvedReference = true;
            setInsertButtonState(true);
            console.log(`data changed to ${data.heVersionTitle} and ${data.versionTitle}`);
          }).withFailureHandler(() => {
            if (requestId !== latestResolveRequestId) {
              return;
            }
            markTranslationAvailability('', enVersion);
            renderTranslationOptions($('.translation-filter-input').val());
            hasResolvedReference = false;
            setInsertButtonState(false);
            clearVersionSelectors();
            updatePesukimAvailability(null);
            updateActionabilityUI({ isInsertable: false });
          }).findReference(resolvedRef, versions);
        };

        renderTranslationOptions('');

        $('.translation-filter-input').on('input', function() {
          renderTranslationOptions($(this).val());
        }).on('keydown', function(event) {
          if (event.key === 'ArrowDown') {
            event.preventDefault();
            $('.translation-version-select').focus();
          }
        });

        $('.translation-version-select').on('change', function() {
          let selected = $(this).val();
          syncSelectedTranslationDisplay();
          if (!selected) {
            return;
          }
          currentEnVersion = selected;
          getVersions(selected);
        });

        $('.he-version-selection').on('change', () => {
          getVersions();
        });

        if (pendingPreferredVersions) {
          const preferredEn = pendingPreferredVersions.en || '';
          const preferredHe = pendingPreferredVersions.he || '';
          pendingPreferredVersions = null;
          if (preferredEn || preferredHe) {
            const currentEn = $('.translation-version-select').val() || currentEnVersion || enSelectedVersionTitle;
            const currentHe = $('.he-version-selection').val() || heSelectedVersionTitle;
            if (currentEn !== (dataIn.versionTitle || '') || currentHe !== (dataIn.heVersionTitle || '')) {
              getVersions();
            }
          }
        }
      }

      $('.close').click(() => {
        google.script.host.close();
      });

    }

    google.script.run.withSuccessHandler(function(titles) {
      initializeSidebar(Array.isArray(titles) ? titles : []);
    }).withFailureHandler(function() {
      initializeSidebar([]);
    }).returnTitles();
</script>
