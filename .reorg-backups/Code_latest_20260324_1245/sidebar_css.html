<style>
  @import url("https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Frank+Ruhl+Libre:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap");

  /* =========================
     1. DESIGN TOKENS
     ========================= */
  :root {
    --bg: #fbfbfa;
    --border: #d9d8d3;
    --card: #f3f1ed;
    --muted: #666;
    --panel: #fff;
    --selected: #18345d;
    --selected-hover: #22426f;
    --selected-soft: #ddeeff;
    --text: #222;
    --sefaria-blue: #18345d;
    --lighter-grey: #ededec;

    --tanakh-teal: #004e5f;
    --mishnah-blue: #5a99b7;
    --talmud-gold: #ccb479;
    --midrash-green: #5d956f;
    --halakhah-red: #802f3e;
    --kabbalah-purple: #594176;
    --liturgy-rose: #ab4e66;
    --philosophy-purple: #7f85a9;
    --chasidut-green: #97b386;
    --musar-purple: #7c416f;
    --commentary-blue: #4b71b7;
    --reference-orange: #d4896c;
    --modern-works-blue: #b8d4d3;
    --apocrypha-pink: #c6a7b4;
    --tanaitic-green: #00827f;
  }

  /* =========================
     2. BASE / PAGE
     ========================= */
  aside {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 5;
    display: none;
    width: 100%;
    height: 100%;
    background: #fff;
    color: #000;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Roboto", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  main {
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 0;
    height: 100vh;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
    padding: 12px 12px 0;
  }

  .unified-sidebar {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--bg);
  }

  .sidebar-scroll {
    display: flex;
    flex: 1 1 auto;
    flex-direction: column;
    min-height: 0;
    overflow-x: hidden;
    overflow-y: auto;
    padding-bottom: 16px;
  }

  .sidebar-footer {
    position: sticky;
    right: 0;
    bottom: 0;
    left: 0;
    flex: 0 0 auto;
    padding: 8px 12px 10px;
    background: var(--lighter-grey);
    border-top: 1px solid var(--border);
    box-shadow: 0 -1px 0 rgba(24, 52, 93, 0.03);
  }

  body.custom-mode .default-only,
  body.default-mode .advanced-only,
  body.default-mode .custom-only,
  body.default-mode details.sidebar-accordion[open] > .accordion-panel.custom-sensitive,
  body.smart-mode .advanced-only,
  .basic-mode .more-options-accordion,
  [data-mode="basic"] .more-options-accordion,
  .session-library-panel.mode-basic-hidden,
  .mode-basic .session-library-panel,
  [data-mode="basic"] .advanced-version-details,
  body.mode-basic .advanced-version-details,
  .ui-hidden-checkbox,
  select.visually-hidden,
  input.visually-hidden,
  #translation-language-menu input[type="checkbox"] {
    display: none !important;
  }

  /* =========================
     3. GENERIC UTILITIES
     ========================= */
  .alef {
    font-size: 1.15em;
  }

  .branding-text {
    padding-top: 0.5em;
  }

  .helper-text,
  .experience-copy,
  .experience-note,
  .advanced-version-note {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.35;
  }

  .helper-text {
    margin: 4px 0 0;
  }

  .section-label {
    margin: 14px 0 8px;
    color: #444;
    font-size: 13px;
    font-weight: 600;
  }

  .subsection-label,
  .compact-section-label,
  .session-library-title {
    color: #4d596d;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .subsection-label {
    margin: 12px 0 6px;
    color: #5d6878;
  }

  .section-muted {
    opacity: 0.55;
  }

  .brand-header {
    margin-bottom: 10px;
    padding: 14px 14px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
  }

  .brand-eyebrow {
    margin-bottom: 4px;
    color: var(--sefaria-blue);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .brand-title {
    margin: 0;
    color: var(--sefaria-blue);
    font-family: "Frank Ruhl Libre", "Noto Serif Hebrew", serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1.15;
  }

  .brand-subtitle {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.45;
  }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    border: 0;
    clip: rect(0, 0, 0, 0);
  }

  [class="hide"] > img {
    position: absolute;
    top: 48%;
    left: 48%;
  }

  /* =========================
     4. PANELS / SHELLS
     ========================= */
  .unified-search-row,
  .results-panel,
  .display-layout-shell,
  .versions-section,
  .preview-section,
  .session-library-panel {
    padding: 10px;
    background: #fff;
    border: 1px solid var(--lighter-grey);
    border-radius: 14px;
    box-shadow: 0 1px 0 rgba(24, 52, 93, 0.03);
  }

  .results-panel,
  .session-library-panel,
  .versions-section > details,
  .display-layout-shell > details,
  .preview-section > details {
    box-shadow: 0 1px 0 rgba(24, 52, 93, 0.05);
  }

  .options-panel,
  .preview-panel,
  .versions-panel {
    padding: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .results-panel {
    position: relative;
    z-index: 1;
    display: block;
    margin-top: 12px;
    overflow: visible;
  }

  .recent-results-panel {
    margin-top: 12px;
    padding: 10px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .preview-panel {
    min-height: 160px;
    max-height: 280px;
    overflow: hidden;
    padding-right: 0;
    background: #fff;
    border: 1px solid #ece9e3;
    border-radius: 12px;
  }

  #previewContainer,
  .preview-panel .suggestions {
    background: #fff;
    border-radius: 12px;
  }

  .preview-panel .suggestions {
    max-height: 246px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .versions-panel,
  .more-options-card {
    background: #fff;
    border: 1px solid #ece7df;
    border-radius: 12px;
  }

  .versions-panel.more-options-card {
    background: #fcfcfb;
    border-color: #ece9e3;
  }

  .display-layout-section {
    display: grid;
    gap: 8px;
  }

  .display-layout-shell,
  .versions-section,
  .preview-section {
    margin-top: 10px;
  }

  .nested-accordion {
    margin-top: 12px;
  }

  /* =========================
     5. FORMS / INPUTS / SELECTS
     ========================= */
  .filter-field label,
  .version-label {
    display: block;
    margin-bottom: 4px;
    color: #555;
    font-size: 12px;
    font-weight: 600;
  }

  .filter-field label {
    color: #666;
    font-size: 11px;
  }

  .input {
    display: block;
    box-sizing: border-box;
    width: 100%;
    margin: 0;
    padding: 10px 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: "EB Garamond", Georgia, serif;
    font-size: 18px;
    height: auto;
  }

  .search-filter-select,
  .search-sort-select,
  .translation-filter-input,
  .translation-version-select,
  .versioning-select,
  .results-tool,
  .translation-language-toggle,
  .corpus-filter-select,
  .session-library-filter-select {
    box-sizing: border-box;
    width: 100%;
    background: #f8f6f2;
    border: 1px solid #dbd7cf;
    border-radius: 10px;
    color: #445267;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
    min-height: 32px;
    padding: 8px 10px;
  }

  .search-filter-select,
  .search-sort-select {
    appearance: none;
    background-image: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    font-size: 13px;
  }

  .search-filter-select[multiple] {
    min-height: 132px;
    padding: 6px;
  }

  .search-filter-select:focus,
  .search-filter-select:hover,
  .search-sort-select:focus,
  .search-sort-select:hover {
    background: #fff;
    border-color: var(--selected);
  }

  .search-sort-select {
    width: auto;
    min-width: 74px;
    max-width: 74px;
    height: 28px;
    min-height: 28px;
    padding: 0 10px;
    border-radius: 14px;
    font-weight: 700;
  }

  .translation-version-select {
    min-height: 150px;
    margin-top: 6px;
    padding: 4px;
    text-indent: 0;
  }

  .translation-version-select option,
  .he-version-selection option {
    padding-left: 6px;
    text-indent: 0;
  }

  .translation-version-select option {
    margin-left: 0;
  }

  .translation-version-select option.translation-unavailable {
    color: #7a7a7a;
    font-style: italic;
  }

  .he-version-selection {
    text-indent: 0;
  }

  .corpus-filter-select {
    min-width: 124px;
    max-width: 124px;
  }

  .session-library-filter-select {
    min-width: 132px;
    max-width: 132px;
  }

  .translation-selected-display {
    max-height: 88px;
    margin-top: 6px;
    padding: 6px 8px;
    overflow: auto;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.4;
    white-space: normal;
    word-break: break-word;
  }

  .version-control + .version-control {
    margin-top: 10px;
  }

  .version-control-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  .version-count {
    color: var(--muted);
    font-size: 11px;
  }

  /* =========================
     6. MULTI-SELECT / LANGUAGE MENU
     ========================= */
  .multi-select-dropdown,
  .translation-language-compact {
    position: relative;
    width: 100%;
    min-width: 0;
  }

  .multi-select-button {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    width: 100%;
    min-height: 38px;
    padding: 8px 10px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .multi-select-button-text,
  .translation-language-button-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .multi-select-caret {
    color: #666;
    font-size: 12px;
  }

  .multi-select-dropdown.open .multi-select-menu {
    display: block;
  }

  .multi-select-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    left: 0;
    z-index: 15;
    display: none;
    max-height: 240px;
    overflow-y: auto;
    padding: 6px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
  }

  .multi-select-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    cursor: pointer;
    border-radius: 8px;
    font-size: 13px;
  }

  .multi-select-option:hover {
    background: #f4f6f9;
  }

  .multi-select-option input,
  .translation-language-row input {
    margin: 0;
  }

  .translation-language-toggle {
    min-width: 68px;
    max-width: 82px;
    padding-inline: 8px;
  }

  .lang-tool-button,
  .results-tool.lang-tool-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-width: 74px;
    max-width: 74px;
    height: 28px;
    min-height: 28px;
    padding: 0 10px;
    border-radius: 14px;
  }

  .translation-language-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    left: auto;
    z-index: 40;
    width: min(220px, calc(100vw - 56px));
    min-width: 190px;
    margin-top: 0;
    padding: 10px;
    background: #fff;
    border: 1px solid #d8d2c8;
    border-radius: 14px;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
  }

  .translation-language-menu.hidden,
  .translation-language-more.hidden {
    display: none;
  }

  .translation-language-top-list,
  .translation-language-more,
  .translation-language-common,
  .translation-language-primary {
    display: grid;
    gap: 2px;
  }

  .translation-language-top-list,
  .translation-language-more {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #ebe6dc;
  }

  .translation-language-top-list {
    margin-top: 0;
    padding-top: 0;
    border-top: 0;
  }

  .translation-language-primary,
  .translation-language-more {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .translation-language-choice,
  .translation-language-more-toggle {
    appearance: none;
    -webkit-appearance: none;
    min-width: 0;
    min-height: 30px;
    height: 24px;
    margin: 0;
    padding: 0 7px;
    color: #1f3b68;
    cursor: pointer;
    white-space: nowrap;
    background: #fff;
    border: 1px solid #d8d6d0;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
  }

  .translation-language-choice[data-lang="any"] {
    padding-inline: 8px;
  }

  .translation-language-choice[data-lang="jrb"],
  .translation-language-choice[data-lang="lad"],
  .translation-language-choice[data-lang="itk"] {
    padding-inline: 6px;
  }

  .translation-language-choice.active,
  .translation-language-choice:hover,
  .translation-language-more-toggle:hover {
    background: #e8eef7;
    border-color: #bfd0ea;
    color: #1f3b68;
  }

  .translation-language-more-toggle {
    width: 24px;
    font-size: 12px;
  }

  .translation-language-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    color: #243b67;
    cursor: pointer;
    font-size: 13px;
  }

  /* =========================
     7. SEARCH / FILTER LAYOUT
     ========================= */
  .query-hint {
    color: var(--muted);
    font-size: 12px;
  }

  .query-intel-row,
  .results-header-actions {
    display: none;
  }

  .reference-row,
  .reference-row.unified-search-row {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .reference-row.unified-search-row {
    padding: 0;
    background: transparent;
    border: 0;
    border-radius: 0;
    box-shadow: none;
  }

  .reference-input-shell {
    position: relative;
    display: flex;
    flex: 1 1 auto;
    align-items: center;
    min-width: 0;
    min-height: 56px;
    padding: 0 16px 0 14px;
    overflow: hidden;
    background: #f5f3ef;
    border: 1px solid var(--border);
    border-left: 0;
    border-radius: 24px;
    box-shadow: none;
  }

  .reference-input-shell::before {
    display: block;
    width: 5px;
    height: 34px;
    margin-right: 14px;
    content: "";
    background: var(--tanakh-teal);
    border-radius: 3px;
  }

  .mode-advanced .reference-input-shell::before {
    background: var(--commentary-blue);
  }

  .mode-voices .reference-input-shell::before {
    display: none;
  }

  .reference-row .input,
  .reference-input-shell .input {
    margin: 0;
    padding: 0;
    background: transparent;
    border: 0;
    box-shadow: none;
    font-family: "EB Garamond", Georgia, serif;
    font-size: 18px;
  }

  .reference-input-shell .input:focus,
  .reference-row .input:focus {
    outline: none;
    box-shadow: none;
  }

  .reference-row .input::placeholder {
    color: #7d7d7d;
  }

  .search-control-row {
    display: grid;
    grid-template-columns: 1fr;
    align-items: stretch;
    gap: 8px;
    margin-top: 8px;
  }

  .search-filter-card {
    display: grid;
    gap: 8px;
    padding: 10px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .search-filter-grid {
    display: grid;
    align-items: start;
    gap: 8px;
    grid-template-columns: minmax(0, 1fr) 110px;
  }

  .search-filter-grid.refined-search-filter-grid {
    grid-template-columns: minmax(0, 1fr) 120px;
  }

  .search-filter-header {
    margin: 0;
    color: #444;
    font-size: 12px;
    font-weight: 700;
  }

  .search-filter-toggles {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .translation-language-panel {
    margin-top: -2px;
  }

  .refined-search-toggles {
    display: grid;
    gap: 10px;
    margin-top: 10px;
  }

  .dual-toggle-grid,
  .dual-toggle-grid.hebrew-options-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .dual-toggle-grid .toggle-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 8px;
  }

  .dual-toggle-grid .toggle-row > label:first-child,
  .dual-toggle-grid.hebrew-options-row .compact-option-toggle-row > label:first-child {
    margin: 0;
    white-space: nowrap;
  }

  .dual-toggle-grid .switch,
  .dual-toggle-grid.hebrew-options-row .switch {
    margin-left: 0;
    flex: 0 0 auto;
  }

  .dual-toggle-grid.hebrew-options-row .compact-option-toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
  }

  .dual-toggle-grid.hebrew-options-row .compact-option-toggle-row > label:first-child {
    font-size: 14px;
  }

  .option-toggle-row,
  .translation-filter-row {
    margin: 0;
    min-height: 36px;
  }

  .unified-search-row {
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 6px;
    overflow: visible;
    background: #fff;
    border: 1px solid #dcd8d0;
    border-radius: 18px;
    box-shadow: 0 1px 0 rgba(24, 52, 93, 0.05);
  }

  .search-submit,
  #run-sefaria {
    display: inline-flex;
    flex: 0 0 42px;
    align-items: center;
    justify-content: center;
    min-width: 42px;
    min-height: 42px;
    padding: 0;
    color: #fff;
    background: #18345d;
    border: 1px solid #18345d;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
  }

  .search-submit:hover,
  #run-sefaria:not(:disabled):hover {
    background: #22426f;
    border-color: #22426f;
  }

  .search-submit-icon {
    display: inline-block;
    font-size: 15px;
    line-height: 1;
    transform: translateY(1px);
  }

  .mode-voices .text-mode-only,
  .mode-voices .display-layout-shell,
  .mode-voices .versions-section,
  .mode-voices .preview-section,
  .mode-voices .library-results,
  .mode-voices .results-lists > .text-mode-only {
    display: none !important;
  }

  .mode-voices .search-results-label::before {
    content: "Source Sheets";
  }

  .mode-voices .search-results {
    margin-top: 0;
  }

  .mode-voices .reference-row .input {
    padding-left: 0 !important;
  }

  .voices-only .helper-text {
    margin-top: 0;
  }

  .mode-context-note {
    margin-top: -2px;
    margin-bottom: 8px;
  }

  .mode-context-note .helper-text,
  .experience-note {
    padding: 8px 10px;
    background: #fff;
    border: 1px solid var(--lighter-grey);
    border-radius: 10px;
  }

  /* =========================
     8. BUTTONS / PRIMARY ACTIONS
     ========================= */
  #insert-source,
  #open-on-sefaria,
  #run-sefaria,
  .primary-action-button,
  .secondary-action-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    font-weight: 700;
  }

  #insert-source,
  #open-on-sefaria {
    width: 100%;
    min-height: 44px;
    margin-top: 12px;
    font-size: 14px;
  }

  #insert-source,
  #run-sefaria,
  .primary-action-button {
    color: #fff;
    background: var(--selected);
    border: 1px solid var(--selected);
  }

  #open-on-sefaria,
  .secondary-action-button {
    color: #456184;
    background: #f8fbff;
    border: 1px solid #8fa9c8;
    font-family: "Frank Ruhl Libre", "Noto Serif Hebrew", Georgia, serif;
  }

  #insert-source:disabled,
  #open-on-sefaria:disabled,
  #run-sefaria:disabled,
  .primary-action-button[disabled],
  .secondary-action-button[disabled] {
    opacity: 0.55;
  }

  #insert-source:not(:disabled):hover,

  /* =========================

     ========================= */
  .toggle-row,

    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .toggle-row + .toggle-row {

  .relevance-toggle {
    display: inline-flex;

    font-size: 12px;
    user-select: none;
    white-space: nowrap;
  }

  .switch {
    position: relative;
    display: inline-block;
    flex: 0 0 auto;
    width: 42px;
    height: 24px;
  }

  .switch input {
    position: absolute;
    width: 0;
    height: 0;
    opacity: 0;
  }

  .slider {
    position: absolute;
    inset: 0;
    cursor: pointer;
    background: #c7c7c7;
    border-radius: 999px;
    transition: 0.2s;
  }

  .slider::before {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    content: "";
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    transition: 0.2s;
  }

  .switch input:checked + .slider {
    background: var(--selected);
  }

  .switch input:checked + .slider::before {
    transform: translateX(18px);
  }

  .compact-option-toggle-row {
    min-width: 0;
    min-height: 30px;
  }

  .compact-option-toggle-row > label:first-child {

    line-height: 1.2;
    white-space: nowrap;
  }

  .compact-option-toggle-row .switch {
    width: 34px;
    height: 18px;
  }

  .compact-option-toggle-row .slider::before {
    top: 3px;
    left: 3px;
    width: 12px;
    height: 12px;
  }

  .compact-option-toggle-row .switch input:checked + .slider::before {
    transform: translateX(16px);
  }
